fter you arrive at the airport in Tokyo, be sure to take out your passport when you go through customs.","ex_zh":"到達東京的機場後，務必在辦理海關手續時拿出護照。","level":17},{"word":"flavor","phon":"'flevɚ","pos":"n./vt.","meaning":"風味，口味，特色／（給）調味","ex_en":"Chili pepper adds flavor to the fish, and it will be the most popular dish at the party.","ex_zh":"辣椒為這道魚增添風味，它將是派對上最受歡迎的菜餚。","level":17},{"word":"eager","phon":"'igɚ","pos":"adj.","meaning":"渴望的，熱切的，急切的","ex_en":"Since Jason has been single for years, he is eager to find girls and find a girlfriend.","ex_zh":"因為 Jason 已單身好幾年了，他很渴望認識女生並找到一位女朋友。","level":17},{"word":"elect","phon":"ɪ'lɛkt","pos":"vt.","meaning":"選擇，選舉","ex_en":"Julian was elected the class leader as all the other classmates consider him the most capable in the class.","ex_zh":"Julian 被選為班長，因為其他同學都認為他在班上最有能力的。","level":17},{"word":"insist","phon":"ɪnˈsɪst","pos":"vi./vt.","meaning":"堅持","ex_en":"My parents insist on picking me up from school every day, and they never allow me to walk home alone.","ex_zh":"我父母親堅持每天從學校接我放學。他們從不允許我自己走路回家。","level":17},{"word":"ladder","phon":"'lædɚ","pos":"n.","meaning":"梯子","ex_en":"My father had to use a ladder to climb up to the roof in order to fix the hole up there.","ex_zh":"我父親必須用梯子爬到屋頂上，以便修理上面的破洞。","level":17},{"word":"reject","phon":"rɪ'dʤɛkt","pos":"vt.","meaning":"拒絕接受，不相信，不錄取","ex_en":"I have to reject your idea of selling our products to Europe because shipping them out there is too expensive.","ex_zh":"我必須否決你要把我們的產品銷售到歐洲的想法，因為把產品運送到那裡去太貴了。","level":17},{"word":"harvest","phon":"'harvɪst","pos":"vt./n.","meaning":"收穫，收割／收成，收穫","ex_en":"In South Asia, rice can be harvested three times a year and it can feed many people.","ex_zh":"在南亞，稻米一年可收成三次，且能餵養許多人。","level":17},{"word":"semester","phon":"sə'mɛstɚ","pos":"n.","meaning":"學期","ex_en":"In Taiwan, students usually begin their new semester in September and around February.","ex_zh":"在臺灣，學生們通常在九月和二月時開始新學期。","level":17},{"word":"warn","phon":"wɔrn","pos":"vt.","meaning":"警告","ex_en":"The police tried to warn those swimmers of the deep waters and strong waves and asked them not to get close to the sea.","ex_zh":"警方試圖警告那些泳客水深及大浪，並要求他們不要靠近海邊。","level":17},{"word":"shelf","phon":"ʃɛlf","pos":"n.","meaning":"架子（複：shelves）","ex_en":"When the earthquake hit, all the things placed on the shelves fell on the ground, and glass bottles were broken into pieces.","ex_zh":"地震發生時，放在架子上的所有東西都掉到地上，玻璃瓶碎了一地。","level":17},{"word":"nephew","phon":"'nɛfju","pos":"n.","meaning":"外甥，姪子","ex_en":"After my sister gave birth to a little boy, I have a nephew and I am an uncle now.","ex_zh":"在我姊姊生了一個小男孩後，我有了外甥，我現在成為舅舅了。","level":17},{"word":"behave","phon":"bɪ'hev","pos":"vi.","meaning":"行為舉止","ex_en":"When Ben is in front of a girl, he usually doesn't know what to say or how to behave.","ex_zh":"Ben 在女孩子面前總是不知道該說，或是手足無措。","level":17},{"word":"arrange","phon":"ə'rendʤ","pos":"vt.","meaning":"安排，整理","ex_en":"If you want to change the schedule, just call my secretary and she will arrange it for you.","ex_zh":"如果你想更改時間表，請致電找我的秘書，她會為你安排。","level":17},{"word":"deaf","phon":"dɛf","pos":"adj.","meaning":"耳聾的，聽不見的","ex_en":"A strange disease made him lose his hearing, and he turned totally deaf years later.","ex_zh":"一場奇怪的疾病讓他喪失聽力，幾年後他就完全失聰了。","level":17},{"word":"sore","phon":"sor","pos":"adj.","meaning":"痠的，痠痛的","ex_en":"I think I might get a cold. Now I have a sore throat and a high fever.","ex_zh":"我覺得我可能感冒了。我現在喉嚥痛且發高燒。","level":17},{"word":"weigh","phon":"we","pos":"vi./vt.","meaning":"稱重，衡量","ex_en":"Maggie is afraid of getting fat, so she weighs herself three times a day and keeps track of what she eats.","ex_zh":"Maggie很怕變肥，所以她一天量三次體重，並記錄她的食物。","level":17},{"word":"upload","phon":"ʌpˈlod","pos":"vt.","meaning":"上傳","ex_en":"Students are asked to write a report about their favorite city and upload it to Google Classroom.","ex_zh":"學生被要求寫一份有關自己喜歡的城市的報告，並將其上傳到Google教室。","level":17},{"word":"propose","phon":"prə'poz","pos":"vi./vt.","meaning":"提議／求婚","ex_en":"To reach the goal of making her company a market leader, Michelle proposed a plan to open ten new stores around the country this year.","ex_zh":"為了使公司成為市場龍頭，Michelle 提出今年要在全國拓展十間新店的計畫。","level":17},{"word":"circus","phon":"'sɝkəs","pos":"n.","meaning":"馬戲團","ex_en":"After watching the show in the circus, the kid said that he wanted to become a lion tainer.","ex_zh":"看完馬戲團的表演後，這個孩子說他想成為一名馴獸師。","level":17},{"word":"satisfy","phon":"ˈsætɪsˌfaɪ","pos":"vt.","meaning":"使...滿意，滿足","ex_en":"Bob is a good cook, who always tries to satisfy every customer with his dishes.","ex_zh":"Bob是個好廚師，總是試著用他的菜餚滿足每位顧客。","level":17},{"word":"organize","phon":"'orgən.aɪz","pos":"vt.","meaning":"組織，籌劃","ex_en":"Anna's friends organized a baby shower for her one month before the baby was due.","ex_zh":"Anna 的朋友在她寶寶出生的前一個月，為她舉辦了一場驚喜送禮會。","level":17},{"word":"rub","phon":"rʌb","pos":"vi./vt.","meaning":"搓揉，擦，摩擦","ex_en":"Woken up by me in the early morning, Tim rubbed his eyes, looked at me in confusion and asked what was going on.","ex_zh":"因為我清晨被我喚醒，Tim 揉著眼睛，困惑地看著我問我發生了什麼事。","level":17},{"word":"sweep","phon":"swip","pos":"vi./vt.","meaning":"打掃，清掃","ex_en":"A super typhoon swept through the Philippines and caused lots of damage and deaths.","ex_zh":"一個超強颱風橫掃菲律賓，造成大量損害及多人死亡。","level":17},{"word":"flu","phon":"flu","pos":"n.","meaning":"流行性感冒","ex_en":"Cathy came down with the flu, so she had no choice but to rest at home.","ex_zh":"Cathy 患了流感，所以只好待在家休息。","level":17},{"word":"melt","phon":"mɛlt","pos":"vi./vt.","meaning":"融化，（態度）軟化","ex_en":"One way of eating ice cream is to put it in a soda and let it melt away in the drink.","ex_zh":"冰淇淋的其中一種吃法就是把它放在汽水裡，並讓它在飲料中融化。","level":17},{"word":"waist","phon":"west","pos":"n.","meaning":"腰","ex_en":"The dress is kind of plain, so I tie a red belt around my waist. What do you think?","ex_zh":"這件洋裝有點普通，所以我在腰間繫了一條紅色腰帶。你覺得怎麼樣？","level":17},{"word":"employ","phon":"ɪm'plɔɪ","pos":"vt.","meaning":"僱用，使用","ex_en":"Renac has nothing but beauty. We wonder why she is employed as a secretary instead of other skilled people.","ex_zh":"Renac 空有美貌。我們很好奇為什麼是她而不是其他技術更熟練的人被錄用做秘書一職。","level":17},{"word":"pillow","phon":"'pɪlo","pos":"n.","meaning":"枕頭","ex_en":"If your pillow is too soft, it will not provide enough support for your neck when you sleep.","ex_zh":"如果你的枕頭太軟，在睡覺時它將無法為你的頸部提供足夠的支撐。","level":17},{"word":"puzzle","phon":"'pʌzl","pos":"n.","meaning":"使感到費解、迷惑／費解之事、難題、謎、猜謎","ex_en":"What puzzles me is why John left without telling anyone. It is not at all what I would have expected.","ex_zh":"讓我感到困惑的是，John 為什麼不告而別。這完全不符我預料之中的事。","level":17},{"word":"sigh","phon":"saɪ","pos":"vi./n.","meaning":"嘆氣，嘆息／嘆氣，好一口氣","ex_en":"Mom shook her head and sighed after finding out Rick failed English again. She really didn't know what to say.","ex_zh":"發現 Rick 的英文又被當了之後，媽媽搖搖頭嘆了口氣。她真的不知道還能說什麼。","level":17},{"word":"punish","phon":"'pʌnɪʃ","pos":"vt.","meaning":"懲罰，懲處","ex_en":"Ted forgot to bring his textbook, so the teacher punished him and asked him to stand at the back of the classroom for an entire class.","ex_zh":"Ted 忘了帶課本，所以老師處罰他，要他站在教室後面一整節課。","level":17},{"word":"dull","phon":"dʌl","pos":"adj.","meaning":"沉悶的，愚鈍的（刀子）鈍的，不鮮明的","ex_en":"Mike is a machine operator. His life in the factory is so dull that he often sings to make himself happy.","ex_zh":"Mike 是機器操作員。他在工廠裡的生活很沉悶，以至於他經常唱歌來讓自己開心。","level":17},{"word":"float","phon":"flot","pos":"vi./vt.","meaning":"（使）漂浮，漂流","ex_en":"Look at those clouds floating in the sky. They are like cute little animals.","ex_zh":"看看那些漂浮在天空中的雲。它們就像可愛的小動物。","level":18},{"word":"jar","phon":"dʤar","pos":"n.","meaning":"罐子，廣口瓶","ex_en":"The kid wanted to have some jam in the jar but couldn't open the lid no matter how hard he tried.","ex_zh":"這個孩子想吃罐子裡的果醬，但是無論他多麼用力，都開不了瓶子。","level":18},{"word":"dial","phon":"'daɪəl","pos":"vi./vt.","meaning":"撥打電話，儀表盤","ex_en":"For more information, dial the number. Someone will answer the phone and give you a detailed account.","ex_zh":"若要取得更多資訊，請打這個號碼。會有人接聽電話並提供你詳細的說明。","level":18},{"word":"sleeve","phon":"sliv","pos":"n.","meaning":"袖子","ex_en":"Anna found the room very dirty, so she rolled up her sleeves and started to clean it.","ex_zh":"Anna 發現房間很髒，所以她捲起袖子開始打掃。","level":18},{"word":"thankful","phon":"'θæŋkfl","pos":"adj.","meaning":"感激的，欣慰的，慶幸的","ex_en":"You should be thankful for their timely help instead of taking it for granted.","ex_zh":"你該感激他們的及時幫助，而不是將之視為理所當然。","level":18},{"word":"triangle","phon":"ˈtraɪˌæŋgl","pos":"n.","meaning":"三角形","ex_en":"A triangle is a shape with three straight sides and three angles.","ex_zh":"三角形是有三個直邊和三個角的一種形狀。","level":18},{"word":"crane","phon":"kren","pos":"n./vi.","meaning":"鶴（鳥類）／起重機","ex_en":"Cranes are water birds that usually feed on fish in ponds or small insects in the open fields.","ex_zh":"鶴是以池塘裡的魚類或是原野上的小型昆蟲為主食的水鳥。","level":18},{"word":"garlic","phon":"'garlɪk","pos":"n.","meaning":"大蒜","ex_en":"Garlic, onions and ginger can not only make food taste better but also keep us healthy.","ex_zh":"大蒜、洋蔥和生薑不但可以使食物更美味，也能讓我們更健康。","level":18},{"word":"polite","phon":"pəˈlaɪt","pos":"adj.","meaning":"禮貌的","ex_en":"A polite person would always say 'please, thank you, and sorry.'","ex_zh":"一個有禮貌的人總會說「請、謝謝、對不起」。","level":18},{"word":"leisure","phon":"'liʤɚ","pos":"n.","meaning":"閒暇，休閒（不可數）","ex_en":"Teenagers spend most of their leisure time hanging out with their friends instead of their parents.","ex_zh":"青少年的空閒時間大部分都和朋友在一起，而不是父母。","level":18},{"word":"outline","phon":"'aʊt.laɪn","pos":"n./vt.","meaning":"輪廓，大綱／列出大綱，略述","ex_en":"Because of the thick smoke, we can't see the clear outline of the building.","ex_zh":"由於濃煙，我們看不清楚建築物的輪廓。","level":18},{"word":"bake","phon":"bek","pos":"vi./vt.","meaning":"烘焙","ex_en":"To surprise her boyfriend, Vivian plans to bake a cake for him on his birthday.","ex_zh":"為了給男友一個驚喜，Vivian計畫在他生日那天為他烘焙蛋糕。","level":18},{"word":"lone","phon":"lon","pos":"adj.","meaning":"孤單的，唯一的","ex_en":"Sean is the lone survivor in the terrible bus accident. The other passengers died on the spot.","ex_zh":"Sean 是這場可怕的公車事故中唯一的倖存者，其它乘客當場死亡。","level":18},{"word":"wool","phon":"wʊl","pos":"n.","meaning":"羊毛","ex_en":"Wool is a kind of soft and thick hair growing on sheep, and it is usually made into sweaters.","ex_zh":"羊毛是一種生長在綿羊身上又厚又軟的毛料，通常被用來製成毛衣。","level":18},{"word":"hometown","phon":"'hom.taʊn","pos":"n.","meaning":"家鄉，故鄉","ex_en":"Although he has left his hometown for more than 30 years, he can still clearly picture the streets and the houses there.","ex_zh":"雖然他已離鄉超過 30 年，他仍能清楚地描出在那裡的街道及房子。","level":18},{"word":"nickname","phon":"'nɪk.nem","pos":"n./vt.","meaning":"綽號／取綽號","ex_en":"\"Mr. Gardener\" is Tom's nickname given by his classmates because of his interest in taking care of plants.","ex_zh":"「園丁先生」是同學給 Tom 取的綽號，因為他對照顧植物很有興趣。","level":18},{"word":"fog","phon":"fag","pos":"n.","meaning":"霧，霧氣","ex_en":"There is sometimes dense fog in the Miaoli section of the highway, so be sure to drive more carefully.","ex_zh":"高速公路苗栗路段有時會有濃霧，所以務必要更小心駕駛。","level":18},{"word":"balloon","phon":"bə'lun","pos":"n.","meaning":"氣球","ex_en":"Would you blow up these balloons for me? They are for my son's birthday party.","ex_zh":"你可以幫我把這些氣球吹起來嗎？是為我兒子的生日派對要用的。","level":18},{"word":"gesture","phon":"'dʤɛstʃɚ","pos":"n./vi.","meaning":"手勢，姿勢，表現方式、行為／做手勢，用手勢示意","ex_en":"Hand gestures are a necessary part in a good speech. They help make the speaker look more natural.","ex_zh":"一場好的演講中，手勢是必要的，它們可以讓演說者看起來更自然。","level":18},{"word":"conclude","phon":"kən'klud","pos":"vt.","meaning":"做出結論，結束","ex_en":"At the end of the speech, the speaker concluded that everything in the world happens for a reason.","ex_zh":"在演講的尾聲，講者下結論說，世界上的一切都是有原因的。","level":18},{"word":"bury","phon":"'bɛri","pos":"vt.","meaning":"埋葬，掩埋","ex_en":"Dozens of people were buried alive in the strong earthquake last week.","ex_zh":"上週的強烈地震中，數十人被活埋。","level":18},{"word":"fond","phon":"fand","pos":"adj.","meaning":"喜愛的，深好的","ex_en":"Larry is fond of rock music, and he is thinking about starting a rock band.","ex_zh":"Larry 喜歡搖滾樂，他正在考慮組搖滾樂團。","level":18},{"word":"misery","phon":"'mɪzəri","pos":"n.","meaning":"不幸，悲慘","ex_en":"The victims of the earthquake live in misery, and they are in need of our help.","ex_zh":"地震的災民們過得很悲慘，需要我們的幫助。","level":18},{"word":"foolish","phon":"'fulɪʃ","pos":"adj.","meaning":"愚蠢的","ex_en":"It's foolish of you to wish your ex-boyfriend to come back to you. He already has a new girlfriend.","ex_zh":"希望你的前男友回來找你真是愚蠢。他已經有了一個新女友。","level":18},{"word":"cocktail","phon":"'kak.tel","pos":"n.","meaning":"雞尾酒","ex_en":"Cocktails taste like juice or soda pop, yet they actually contain alcohol. You may get drunk if you have too much.","ex_zh":"雞尾酒喝起來像果汁或汽水，但它其實含有酒精，且喝太多也會讓你醉的。","level":18},{"word":"sour","phon":"saʊr","pos":"adj.","meaning":"有酸味的，不友好的","ex_en":"On a hot summer day, store food in the fridge, or it may turn sour in a few hours.","ex_zh":"在炎熱的夏天裡將食物放在冰箱，否則可能在數小時內變酸。","level":18},{"word":"shiny","phon":"'ʃaɪni","pos":"adj.","meaning":"閃亮的","ex_en":"When I feel sad, I watch the shiny stars in the sky. They seem to tell me that there is still hope.","ex_zh":"當我感到難過時，我會看看天空中閃亮的星星。它們似乎在告訴我，仍然有希望。","level":18},{"word":"whistle","phon":"'hwɪsl","pos":"n./vi./vt.","meaning":"哨子，口哨，哨音／吹哨，對⋯吹口哨","ex_en":"The police officer blew his whistle to signal the car driver to pull over for a breath test.","ex_zh":"警察對著鳴聲吹哨子，示意他這位學車停受酒測測試。","level":18},{"word":"swallow","phon":"'swalo","pos":"vi./vt./n.","meaning":"吞食／燕子","ex_en":"The flu is making Joe's throat sore, and it hurts when he swallows.","ex_zh":"流感使 Joe 的喉嚴疼痛，當他吞嚥時很疼痛。","level":18},{"word":"appetite","phon":"'æpə.taɪt","pos":"n.","meaning":"食慾，胃口","ex_en":"Whenever I have a cold, I usually lose my appetite and don't feel like eating anything.","ex_zh":"每當感冒時，我都會失去食慾，不想吃任何東西。","level":18},{"word":"upstairs","phon":"'ʌp.stɛrz","pos":"adj./adv.","meaning":"在樓上的（地）","ex_en":"Upon hearing her baby crying on the second floor, Jessica ran upstairs to see what's wrong.","ex_zh":"當聽到寶寶在二樓哭泣，Jessica 跑上樓去看是怎麼回事。","level":18},{"word":"curtain","phon":"'kɝtn","pos":"n.","meaning":"窗簾，布幕","ex_en":"In the morning, I draw the curtains to let sunlight in and then start to make breakfast.","ex_zh":"早晨時，我拉開窗簾讓陽光透進來，然後開始做早餐。","level":18},{"word":"bark","phon":"bark","pos":"vi./n.","meaning":"（狗）狀叫，對…咆哮／樹皮／狗狀聲","ex_en":"The dog often barks late at night, which really irritates everyone living nearby.","ex_zh":"那隻狗經常在半夜狀叫，真的令在附近的人們不滿其吵。","level":18},{"word":"necklace","phon":"'nɛklɪs","pos":"n.","meaning":"項鍊","ex_en":"Mark gave his girlfriend a beautiful necklace as a birthday present.","ex_zh":"Mark 送給女友一條漂亮的項鍊當生日禮物。","level":18},{"word":"envy","phon":"'ɛnvi","pos":"vt./n.","meaning":"羨慕／羨慕（不可數）","ex_en":"We should never envy what others have but treasure what we already have.","ex_zh":"我們不應該羨慕別人所擁有的，而是該珍惜我們已經擁有的一切。","level":18},{"word":"boil","phon":"bɔɪl","pos":"vi./vt.","meaning":"煮沸，沸騰","ex_en":"To make a nice soft egg, put an egg in cold water and boil it for around 5 minutes.","ex_zh":"要煮出一顆好吃的水煮蛋，請將雞蛋放入冷水中再煮約五分鐘即可。","level":18},{"word":"obey","phon":"oˈbe","pos":"vi./vt.","meaning":"遵守","ex_en":"For your own safety, you should obey traffic rules.","ex_zh":"為了自身安全，你應該遵守交通規則。","level":18},{"word":"merry","phon":"'mɛri","pos":"adj.","meaning":"歡樂的，快樂的","ex_en":"My youngest daughter is a merry little girl. Every day, she is happy, smiling all the time.","ex_zh":"我最小的女兒是個快樂小女孩。每天她都很開心，總是笑容滿面。","level":18},{"word":"dessert","phon":"dɪ'zɝt","pos":"n.","meaning":"甜點","ex_en":"What would you like to have for dessert? Cheesecake or ice cream?","ex_zh":"你甜點想吃什麼？起司蛋糕還是冰淇淋？","level":18},{"word":"naughty","phon":"'nɔti","pos":"adj.","meaning":"頑皮的，淘氣的","ex_en":"The naughty boy puts a toy cockroach on his teacher's desk, trying to scare her.","ex_zh":"那位頑皮的男孩把玩具蟑螂放在老師桌上，想要嚇嚇她。","level":18},{"word":"afterward","phon":"'æftɚwɚd","pos":"adv.","meaning":"後來","ex_en":"The man was severely injured in last weekend's tragic car accident and died shortly afterwards.","ex_zh":"那個人在上週末一場悲劇般的車禍中受了重傷，不久後就過世了。","level":19},{"word":"pardon","phon":"'pardn","pos":"vt./n.","meaning":"原諒，赦免","ex_en":"Please pardon me for my messy room, but I really don't have time to clean everything up.","ex_zh":"不好意思請原諒我房間很凌亂，我實在沒時間把所有東西都整理好。","level":19},{"word":"persuade","phon":"pɚ'swed","pos":"vt.","meaning":"說服","ex_en":"The teacher tries to persuade Vic to enter the sports game as it is one great opportunity.","ex_zh":"老師試著說服 Vic 參加這項運動比賽，因為那是個大好機會。","level":19},{"word":"lid","phon":"lɪd","pos":"n.","meaning":"蓋子","ex_en":"Put cucumber and cabbage with salt in a jar, and put the lid on. A few days later, you'll have pickles to enjoy.","ex_zh":"把小黃瓜、高麗菜和鹽巴一起放在罐子裡，蓋上蓋子。幾天後你就會有泡菜可以享用。","level":19},{"word":"pupil","phon":"'pjupl","pos":"n.","meaning":"小學生，學生／瞳孔","ex_en":"This elementary school has only sixty pupils, and it's a very tiny school.","ex_zh":"這所小學只有六十位學生，是一所很迷你的學校。","level":19},{"word":"melody","phon":"'mɛlədi","pos":"n.","meaning":"旋律","ex_en":"I know the melody of this song, so I can easily sing along.","ex_zh":"我知道這首歌的旋律，所以我可以很輕易地跟著唱。","level":19},{"word":"ribbon","phon":"'rɪbən","pos":"n.","meaning":"緞帶","ex_en":"After Julie carefully put the gift into the box, she decorated the gift box with a pink ribbon.","ex_zh":"在 Julie 小心地把禮物放進盒子後，她用一條粉紅色的緞帶裝飾禮盒。","level":19},{"word":"carpenter","phon":"'karpəntɚ","pos":"n.","meaning":"木匠","ex_en":"The young man is very interested in making wood furniture. He wants to become a carpenter.","ex_zh":"這位年輕人對製作木製家具很感興趣。他想成為木匠。","level":19},{"word":"crow","phon":"kro","pos":"n./vi.","meaning":"烏鴉／（公雞）啼叫","ex_en":"Crows, a kind of black birds, are usually seen as an unlucky sign in Chinese culture.","ex_zh":"烏鴉是一種黑色的鳥類，在中國文化中常被視為不祥之兆。","level":19},{"word":"peel","phon":"pil","pos":"vt./n.","meaning":"剝皮／果皮（不可數）","ex_en":"As garlic needs to be peeled by hand, preparing it for cooking takes a lot of time.","ex_zh":"由於大蒜需手動剝皮，因此準備它來烹飪需花較多的時間。","level":19},{"word":"explode","phon":"ɪk'splod","pos":"vi./vt.","meaning":"爆炸，爆破／（情感）突然併發","ex_en":"An airplane exploded a few minutes after it took off, and its broken pieces were not yet found.","ex_zh":"一架飛機在起飛幾分鐘後就爆炸了，它的殘骸仍未被尋獲。","level":19},{"word":"restrict","phon":"rɪ'strɪkt","pos":"vt.","meaning":"限制，侵犯","ex_en":"The drug problem is universal. It is not restricted to one country.","ex_zh":"毒品問題是全球性的，並非只與單一國家有關。","level":19},{"word":"gamble","phon":"'gæmbl","pos":"vi./vt.","meaning":"賭博，冒險","ex_en":"Peter's wife was very angry because he gambled his money on a poker and lost all of it.","ex_zh":"Peter 的妻子非常生氣，因為他打牌賭錢並輸光了所有的錢。","level":19},{"word":"hesitate","phon":"'hɛzə.tet","pos":"vi.","meaning":"猶豫，猶豫","ex_en":"When Jack asked Helen to go to the movies with him, she hesitated over the invitation, but minutes later, she agreed.","ex_zh":"當 Jack 邀 Helen 和他一起去看電影時，她對於這個邀請猶豫了一下，但幾分鐘後她同意了。","level":19},{"word":"kindergarten","phon":"'kɪndɚ.gartn","pos":"n.","meaning":"幼稚園","ex_en":"Nicole likes young kids, so she plans to become a kindergarten teacher in the future.","ex_zh":"Nicole 喜歡小孩子，因此她計畫將來成為幼兒園老師。","level":19},{"word":"faint","phon":"fent","pos":"vi./adj.","meaning":"昏倒（=pass out）／微弱的，虛弱的","ex_en":"Mike fainted under the hot sun in his rice field. When he came to, he saw a stranger beside him.","ex_zh":"Mike 在大太陽底下暈倒在他的稻田裡。當他醒過來時，他看到身邊有個陌生人。","level":19},{"word":"sailor","phon":"'selɚ","pos":"n.","meaning":"水手","ex_en":"John's father is a sailor, working on a big ship. He comes home every six months.","ex_zh":"John 的父親是一名水手，在一艘大船上工作。他每六個月回家一次。","level":19},{"word":"balcony","phon":"'bælkəni","pos":"n.","meaning":"陽臺，露臺，（戲院的）包廂","ex_en":"I enjoy sitting on my balcony, watching the cars running on the busy street and the tall mountain far away.","ex_zh":"我喜歡坐在我的陽臺上看著繁忙街道上的車輛及遠方的高山。","level":19},{"word":"backpack","phon":"'bæk.pæk","pos":"n./vi.","meaning":"背包，旅行包／背包旅行（當背包客）","ex_en":"For a two-day trip, you don't need baggage; a backpack will do.","ex_zh":"兩天的旅行你不需要行李箱，背包就足夠了！","level":19},{"word":"chop","phon":"tʃap","pos":"vt.","meaning":"剁，劈砍，（帶骨的）肉塊","ex_en":"These trees are rare, but people still chop them down and sell them for money.","ex_zh":"這些樹很罕見，但人們仍然砍伐它們來賣錢。","level":19},{"word":"textbook","phon":"'tɛkst.bʊk","pos":"n.","meaning":"教科書","ex_en":"Mrs. Lee was surprised to find no textbook but a few novels in her son's school bag.","ex_zh":"李太太驚訝地發現兒子的書包裡沒有教科書，只有幾本小說。","level":19},{"word":"café","phon":"kə'fe","pos":"n.","meaning":"小餐館，咖啡館","ex_en":"I'm a bit tired now. Why don't we find a café and sit down to drink something?","ex_zh":"我現在有點累了，我們何不找間咖啡館坐下來喝點東西？","level":19},{"word":"vivid","phon":"'vɪvɪd","pos":"adj.","meaning":"生動的，栩栩如生的","ex_en":"Steve's description of the place was so vivid that I could almost picture it in my mind.","ex_zh":"Steve 對該地的描述是如此生動以至於我的腦海中幾乎能浮現那個畫面。","level":19},{"word":"greedy","phon":"'gridi","pos":"adj.","meaning":"貪心的，貪婪的","ex_en":"The businessman was greedy for more money. He was not happy about the amount he had already made.","ex_zh":"那位商人貪婪地想要更多錢，他並不滿意他已賺到的數目。","level":19},{"word":"salty","phon":"'sɔlti","pos":"adj.","meaning":"鹹的","ex_en":"Those French fries are too salty. After eating them, I feel thirsty and keep drinking water.","ex_zh":"那些薯條太鹹了。吃過之後我覺得好渴且不停地喝水。","level":19},{"word":"baggage","phon":"'bægɪdʤ","pos":"n.","meaning":"行李，行李箱【英式】","ex_en":"This airline allows you to check in one piece of baggage less than 20 kilograms for free.","ex_zh":"這家航空公司允許你免費託運一件 20 公斤以下的行李。","level":19},{"word":"whisper","phon":"'hwɪspɚ","pos":"vi./vt.","meaning":"低語，耳語（別人）","ex_en":"The teachers in the hallway talked in whispers because students were studying quietly in the classroom.","ex_zh":"走廊上的老師低聲交談，因為學生們正在教室裡安靜地學習。","level":19},{"word":"greet","phon":"grit","pos":"vt.","meaning":"迎接，打招呼","ex_en":"Mrs. Mores is a kind and friendly lady, who always greets us with a smile whenever she sees us.","ex_zh":"Mores太太是個親切友善的婦人，總是面帶笑容跟我們打招呼。","level":19},{"word":"magnet","phon":"'mægnɪt","pos":"n.","meaning":"磁鐵，有吸引力的人（事、物）","ex_en":"Santorini, an island in Greece, is like a magnet that attracts visitors all over the world.","ex_zh":"聖托里尼島是希臘的一座島嶼，它就像磁鐵一樣，吸引了世界各地的觀光客。","level":19},{"word":"mug","phon":"mʌg","pos":"n.","meaning":"馬克杯","ex_en":"Cindy made herself a large mug of latte. She enjoyed it while watching movies on Netflix.","ex_zh":"Cindy 為自己沖了一大杯拿鐵咖啡。她一邊看 Netflix 的電影一邊享用它。","level":19},{"word":"grape","phon":"grep","pos":"n.","meaning":"葡萄","ex_en":"Oranges and grapes are common fruits. They are both delicious and healthy food in people's diet.","ex_zh":"柳丁和葡萄是常見的水果。它們都是人們飲食中美味又健康的食物。","level":19},{"word":"haircut","phon":"'hɛr.kʌt","pos":"n.","meaning":"理髮，髮型","ex_en":"The stylist says that this haircut is perfect for my face shape and will make me look more energetic.","ex_zh":"設計師說這個髮型很適合我的臉型，且會使我看起來更有精神。","level":19},{"word":"scrub","phon":"skrʌb","pos":"vi./vt.","meaning":"（用硬刷用力）刷洗","ex_en":"Jenny spent 30 minutes scrubbing the dirty frying pan, and now it looks like a new one.","ex_zh":"Jenny 花了30分鐘刷洗這個髒的煎鍋，現在它看起來就像是新的一樣。","level":19},{"word":"emphasize","phon":"'ɛmfə.saɪz","pos":"vt.","meaning":"強調","ex_en":"The Tourism Bureau plans to emphasize sports tourism, promoting Taiwan as a place for golfing and mountain climbing.","ex_zh":"觀光局計畫要強調運動觀光產業，把臺灣推廣為高爾夫球和爬山的勝地。","level":19},{"word":"drown","phon":"draʊn","pos":"vi./vt.","meaning":"（使）溺死／（被）淹沒，蓋過","ex_en":"Kyle could not swim and he nearly drowned in the lake; fortunately, one of his friends saved him.","ex_zh":"Kyle 不會游泳且差一點溺死在湖裡，還好，他的一位朋友救了他。","level":19},{"word":"scarf","phon":"skarf","pos":"n.","meaning":"圍巾，領巾","ex_en":"Since it's very cold outside, I need to put a scarf around my neck to keep myself warm.","ex_zh":"因為外面很冷，我需要在脖子上圍巾以保持溫暖。","level":19},{"word":"sleepy","phon":"ˈslipi","pos":"adj.","meaning":"想睡的","ex_en":"Daric stayed up all night doing his report, so he was sleepy in the morning class.","ex_zh":"Daric整晚熬夜做報告，所以早上上課時昏昏欲睡。","level":19},{"word":"snail","phon":"snel","pos":"n.","meaning":"蝸牛","ex_en":"Which animal moves more slowly? A turtle or a snail?","ex_zh":"哪個動物移動得比較慢？是烏龜還是蝸牛？","level":19},{"word":"wander","phon":"'wandɚ","pos":"vi.","meaning":"漫步，閒晃，遊蕩","ex_en":"Lost and scared, the little dog wandered along the streets, looking for its master.","ex_zh":"那隻迷路又害怕的小狗在街上四處遊蕩，尋找牠的主人。","level":19},{"word":"confuse","phon":"kən'fjuz","pos":"vt.","meaning":"使困惑","ex_en":"What you just said confuses me. I still don't know whether you agree with my points or not.","ex_zh":"你剛剛說的話使我感到困惑。我還是不知道你到底同意還是不同意我的看法。","level":19},{"word":"gradual","phon":"'grædʤʊəl","pos":"adj.","meaning":"逐漸的","ex_en":"My grandmother has been suffering from a gradual loss of memory over the past ten years, causing her to slowly forget people and things.","ex_zh":"我祖母過去這十年記憶力逐漸衰退，以至於她漸漸忘記人們以及一些事物。","level":20},{"word":"dime","phon":"daɪm","pos":"n.","meaning":"十分硬幣，一角","ex_en":"Your novel won't be worth a dime if you don't get it published.","ex_zh":"如果你的小說沒有出版，將一文不值。","level":20},{"word":"knit","phon":"nɪt","pos":"vi./vt.","meaning":"（用毛線棒針）編織","ex_en":"The grandma is knitting a sweater for her granddaughter as her Christmas gift.","ex_zh":"那位奶奶正在編織一件毛衣給她孫女作聖誕禮物。","level":20},{"word":"erase","phon":"ɪ'res","pos":"vt.","meaning":"擦掉，清除","ex_en":"Jack's excellent performance in last week's game has erased all the doubts about his ability to play on our school basketball team.","ex_zh":"Jack 在上週的比賽中表現出色，消除了人們對於他是否有能力參加籃球校隊比賽的疑慮。","level":20},{"word":"bamboo","phon":"bæm'bu","pos":"n.","meaning":"竹子","ex_en":"Wild pandas are rare animals found in China. They feed on bamboo leaves.","ex_zh":"野生大熊貓是在中國發現的稀有動物，牠們以竹葉為食。","level":20},{"word":"camel","phon":"'kæml","pos":"n.","meaning":"駱駝","ex_en":"Camels are animals used by people living in the desert to carry heavy things.","ex_zh":"駱駝是生活在沙漠中的人們用來負載重物的動物。","level":20},{"word":"swell","phon":"swɛl","pos":"vi.","meaning":"腫脹","ex_en":"My finger swelled up to twice its normal size after it got stung by a bee.","ex_zh":"我的手指在被蜜蜂螫之後腫脹得兩倍大。","level":20},{"word":"inspect","phon":"ɪn'spɛkt","pos":"vt.","meaning":"檢查，審視","ex_en":"The police officer inspected the crime scene, trying to find out what had exactly happened.","ex_zh":"這位警官檢視犯罪現場，想知道究竟發生了什麼事。","level":20},{"word":"barbecue","phon":"ˈbɑrbɪkju","pos":"n.","meaning":"烤肉","ex_en":"In our new house, there is a big yard, where we can have a barbecue on the weekend.","ex_zh":"我們的新房子裡有一個大院子，我們週末可以在裡面烤肉。","level":20},{"word":"cheerful","phon":"'tʃɪrfl","pos":"adj.","meaning":"愉快的，令人高興的","ex_en":"Eddie is always in a cheerful mood. He always wears a smile no matter whom he speaks to.","ex_zh":"Eddie 總是保持好心情愉快。無論和誰說話，他總是面帶微笑。","level":20},{"word":"bravery","phon":"'brevəri","pos":"n.","meaning":"勇敢，勇氣（不可數）","ex_en":"Firefighters show great bravery as they rush into a burning building to save people.","ex_zh":"消防員在衝入火場救人時展現出無比的勇敢。","level":20},{"word":"cabbage","phon":"'kæbɪdʤ","pos":"n.","meaning":"高麗菜，甘藍","ex_en":"The most common Taiwanese-style pickle is usually made of cabbage.","ex_zh":"最常見的臺灣風味泡菜通常是由高麗菜做成的。","level":20},{"word":"dryer","phon":"ˈdraɪɚ","pos":"n.","meaning":"烘乾機","ex_en":"Since the winter here is cold and wet, you will need a dryer after you wash your clothes.","ex_zh":"因為這裡的冬天又溼又冷，你洗完衣服之後將需要烘乾機。","level":20},{"word":"almond","phon":"'amənd","pos":"n.","meaning":"杏仁","ex_en":"The cookies have the flavor of almonds. They are my favorite.","ex_zh":"這些餅乾是杏仁口味，它們是我的最愛。","level":20},{"word":"marvelous","phon":"'marvələs","pos":"adj.","meaning":"令人驚嘆的","ex_en":"Rita is a marvelous singer. Every time she performs on the stage, she amazes the audience.","ex_zh":"Rita 是一位了不起的歌手。每次她在舞臺上表演，都會讓觀眾驚嘆。","level":20},{"word":"flute","phon":"flut","pos":"n.","meaning":"笛子","ex_en":"Betty played the flute at her cousin's wedding. The music made the wedding more beautiful.","ex_zh":"Betty 在表妹的婚禮上吹長笛。音樂使婚禮更加美好。","level":20},{"word":"humid","phon":"'hjumɪd","pos":"adj.","meaning":"（天氣或空氣）潮濕的","ex_en":"The summer in Taiwan is humid; the large quantity of water in the air makes it feel even hotter and more uncomfortable.","ex_zh":"臺灣的夏天很潮濕；空氣中大量的水分讓人感覺起來更熱且更不舒服。","level":20},{"word":"gardener","phon":"'gardnɚ","pos":"n.","meaning":"園丁","ex_en":"Mr. Gonzales works as a gardener for a rich family. He helps plant flowers and take care of the trees for them.","ex_zh":"Gonzales 先生在一戶有錢人家中當園丁。他幫忙種花及照顧樹木。","level":20},{"word":"biscuit","phon":"'bɪskɪt","pos":"n.","meaning":"餅乾【英式】","ex_en":"After Mrs. Donald made biscuits out of flour, eggs and milk, she put them into the oven to have them baked.","ex_zh":"Donald 太太用麵粉、雞蛋和牛奶做好小餅乾後，將它們放進烤箱裡烘焙。","level":20},{"word":"postcard","phon":"'post.kard","pos":"n.","meaning":"明信片","ex_en":"Don't forget to send me a postcard when you arrive in Paris.","ex_zh":"到達巴黎後，別忘了寄明信片給我。","level":20},{"word":"ache","phon":"ek","pos":"vi./n.","meaning":"疼痛／（持續的）疼痛，痼痛性疼痛","ex_en":"If you do not properly warm up before you exercise, your muscles may ache the next day.","ex_zh":"如果你運動前不適當地暖身，隔天你的肌肉就會疼痛。","level":20},{"word":"dizzy","phon":"'dɪzi","pos":"adj.","meaning":"頭暈的","ex_en":"I feel dizzy because I skipped breakfast. I need to grab a bite to make my blood sugar level return to normal.","ex_zh":"我因為沒吃早餐而感到頭暈。我需要點東西吃使我的血糖值恢復正常。","level":20},{"word":"joyful","phon":"'dʤɔɪfl","pos":"adj.","meaning":"喜悅的，快樂的","ex_en":"This is a joyful year to me. I got an ideal job, moved into a big house and found a new boyfriend.","ex_zh":"對我來說，今年是快樂的一年。我找到了一份理想的工作、搬進了一棟大房子，而且交了一個新的男朋友。","level":20},{"word":"decorate","phon":"'dɛkə.ret","pos":"vt.","meaning":"裝飾","ex_en":"The children decorated the Christmas tree with many little light bulbs and a big star.","ex_zh":"孩子們用許多小燈泡和一顆大星星裝飾聖誕樹。","level":20},{"word":"rooster","phon":"'rustɚ","pos":"n.","meaning":"公雞","ex_en":"My day in the countryside starts when the roosters crow. I rise and quickly get ready for the farm work.","ex_zh":"我在鄉下的一天從公雞鳴叫後揭開序幕。我起身並迅速準備好到農場上幹活。","level":20},{"word":"jog","phon":"dʤɔg","pos":"vi./n.","meaning":"慢跑","ex_en":"Frank goes jogging every morning. He usually runs slowly through the park for at least one hour.","ex_zh":"Frank每天早上都去慢跑。他通常花至少一小時的時間慢慢跑步穿越公園。","level":20},{"word":"badminton","phon":"'bædmɪntən","pos":"n.","meaning":"羽毛球","ex_en":"My father is getting old. He thinks playing badminton may hurt his knees, so he switches to swimming.","ex_zh":"我父親年紀漸大。他認為打羽毛球傷膝，因此改去游泳。","level":20},{"word":"hanger","phon":"'hæŋɚ","pos":"n.","meaning":"衣架","ex_en":"The clothes on those hangers are on sale. They are half of their original prices.","ex_zh":"那些衣架上的衣服正在特賣。它們現在半價。","level":20},{"word":"bathe","phon":"beð","pos":"vt.","meaning":"給某人洗澡、泡，使沈浸於","ex_en":"Teddy got so dirty playing in the mud that his mother had to bathe him and change his clothes for him.","ex_zh":"Teddy 玩泥巴弄得如此髒，以至於他媽媽得幫他洗澡並換衣服。","level":20},{"word":"pave","phon":"pev","pos":"vt.","meaning":"鋪（路）","ex_en":"A number of scientific discoveries were made in the 19th century, and they paved the way for modern physics.","ex_zh":"19世紀有許多科學上的發現，為現代物理學奠下了基礎。","level":20},{"word":"fireman","phon":"'faɪrmən","pos":"n.","meaning":"消防員","ex_en":"A group of firemen rushed into the burning apartment, trying to save those who were still in the building.","ex_zh":"一群消防員衝進著火的公寓中，試圖救出仍在裡面的人。","level":20},{"word":"amaze","phon":"ə'mez","pos":"vt.","meaning":"使大為吃驚","ex_en":"Jane amazed her teacher by passing the exam with a nearly perfect score; she almost failed the course last semester.","ex_zh":"Jane 以近乎完美的成績通過考試，這讓她的老師大吃一驚；她上學期還一科幾乎被當。","level":20},{"word":"deepen","phon":"'dipən","pos":"vi./vt.","meaning":"加深，使（感受等）更深","ex_en":"After Mark went through so many ups and downs in life, his wife is still there with him. This deepens his love for her.","ex_zh":"Mark 經歷過人生如此多的起落之後，他的妻子仍不離不棄，這加深了他對太太的愛。","level":20},{"word":"soybean","phon":"'sɔɪ.bin","pos":"n.","meaning":"黃豆，大豆","ex_en":"Soybeans are widely used in Chinese cooking. They can be made into sauce, tofu and other delicious dishes.","ex_zh":"大豆被廣泛使用在中式料理中。它們能被製成醬油、豆腐以及其他美味的菜餚。","level":20},{"word":"slipper","phon":"'slɪpɚ","pos":"n.","meaning":"拖鞋","ex_en":"In Taiwan, people usually take off their shoes and then put on slippers after they enter the house.","ex_zh":"在臺灣，人們進屋後通常會脫鞋並穿上拖鞋。","level":20},{"word":"faucet","phon":"'fɔsɪt","pos":"n.","meaning":"水龍頭【美式】","ex_en":"Don't leave the water running while you are brushing your teeth. Turn off the faucet!","ex_zh":"刷牙時不要讓水一直流。把水龍頭關掉！","level":20},{"word":"crayon","phon":"'kreən","pos":"n.","meaning":"蠟筆","ex_en":"The kids are busy drawing and coloring their pictures with crayons.","ex_zh":"孩子們正忙著用蠟筆畫圖著色。","level":20},{"word":"shopkeeper","phon":"'ʃap.kipɚ","pos":"n.","meaning":"商店老闊，店長","ex_en":"The shopkeeper caught the boy stealing a bag of potato chips in his store and sent him to the police station.","ex_zh":"店長抓到小男孩在他店內偷了一包洋芋片並將他送到警局去。","level":20},{"word":"congratulation","phon":"kən.grætʃə'leʃən","pos":"n.","meaning":"祝賀，恭喜","ex_en":"Congratulations! You have been accepted by two of the best universities in Taiwan.","ex_zh":"恭喜！你已經被臺灣兩所最棒的大學錄取。","level":20},{"word":"countable","phon":"'kaʊntəbl","pos":"adj.","meaning":"可數的","ex_en":"The teacher is trying to explain to the kids that English words like \"friend\" and \"car\" are countable.","ex_zh":"老師試圖向孩子們解釋英文單字像 friend 和 car 是可數的。","level":20}];
</script>
<script>
/* ============================================================
   勇者之塔：英語單字大冒險
   Full game script — data, logic, rendering, storage
   ============================================================ */

/* ---------- Utility ---------- */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function sample(arr, n) {
  return shuffle(arr).slice(0, n);
}

function uid() {
  return 'p_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 10);
}

const STORAGE_KEYS = {
  PLAYER_ID: 'player:id',
  PLAYER_DATA: 'player:data',
  LEADERBOARD: 'leaderboard:data',
};

/* ---------- Storage helpers (window.storage API) ---------- */
// Wraps a promise with a timeout so a hung/unsupported storage backend
// can never freeze the game UI. Always resolves (never rejects, never hangs).
function withTimeout(promise, ms) {
  return new Promise(resolve => {
    let settled = false;
    const timer = setTimeout(() => {
      if (!settled) { settled = true; resolve({ ok: false, timedOut: true }); }
    }, ms);
    Promise.resolve(promise).then(
      value => { if (!settled) { settled = true; clearTimeout(timer); resolve({ ok: true, value }); } },
      err => { if (!settled) { settled = true; clearTimeout(timer); resolve({ ok: false, error: err }); } }
    );
  });
}

async function storageGet(key, shared) {
  try {
    if (!window.storage || typeof window.storage.get !== 'function') return null;
    const outcome = await withTimeout(window.storage.get(key, !!shared), 4000);
    if (!outcome.ok) return null;
    return outcome.value ? outcome.value.value : null;
  } catch (e) {
    return null;
  }
}
async function storageSet(key, value, shared) {
  try {
    if (!window.storage || typeof window.storage.set !== 'function') return false;
    const outcome = await withTimeout(window.storage.set(key, value, !!shared), 4000);
    if (!outcome.ok) {
      console.error('storage set failed (no response within timeout)', key);
      return false;
    }
    return true;
  } catch (e) {
    console.error('storage set failed', key, e);
    return false;
  }
}

/* ---------- Game State ---------- */
const FLOOR_COUNT = 20;
const BOSS_FLOORS = [5, 10, 15, 20];
const QUESTIONS_PER_FLOOR = 20;
const PASS_THRESHOLD = 0.6;

let state = {
  playerId: null,
  nickname: '',
  progress: { floors: {}, totalScore: 0, wrongWords: [] },
  session: null,
  screen: 'loading',
};

function floorWords(level) {
  return VOCAB.filter(w => w.level === level);
}

function isFloorUnlocked(level) {
  if (level === 1) return true;
  return !!state.progress.floors[level];
}

function highestPassedFloor() {
  let max = 0;
  for (const lvl in state.progress.floors) {
    if (state.progress.floors[lvl].passed) max = Math.max(max, parseInt(lvl, 10));
  }
  return max;
}

/* ---------- Persistence ---------- */
async function loadPlayer() {
  let pid = await storageGet(STORAGE_KEYS.PLAYER_ID, false);
  if (!pid) {
    pid = uid();
    await storageSet(STORAGE_KEYS.PLAYER_ID, pid, false);
  }
  state.playerId = pid;

  const dataRaw = await storageGet(STORAGE_KEYS.PLAYER_DATA, false);
  if (dataRaw) {
    try {
      const data = JSON.parse(dataRaw);
      state.nickname = data.nickname || '';
      state.progress = data.progress || { floors: {}, totalScore: 0, wrongWords: [] };
      if (!state.progress.floors) state.progress.floors = {};
      if (!Array.isArray(state.progress.wrongWords)) state.progress.wrongWords = [];
      if (typeof state.progress.totalScore !== 'number') state.progress.totalScore = 0;
    } catch (e) {
      state.progress = { floors: {}, totalScore: 0, wrongWords: [] };
    }
  }
}

async function savePlayerData() {
  await storageSet(
    STORAGE_KEYS.PLAYER_DATA,
    JSON.stringify({ nickname: state.nickname, progress: state.progress }),
    false
  );
}

async function pushLeaderboard() {
  const listRaw = await storageGet(STORAGE_KEYS.LEADERBOARD, true);
  let entries = [];
  if (listRaw) {
    try {
      entries = JSON.parse(listRaw);
      if (!Array.isArray(entries)) entries = [];
    } catch (e) {
      entries = [];
    }
  }
  const myEntry = {
    playerId: state.playerId,
    nickname: state.nickname,
    totalScore: state.progress.totalScore,
    highestFloor: highestPassedFloor(),
    updatedAt: Date.now(),
  };
  const idx = entries.findIndex(e => e.playerId === state.playerId);
  if (idx >= 0) entries[idx] = myEntry;
  else entries.push(myEntry);

  await storageSet(STORAGE_KEYS.LEADERBOARD, JSON.stringify(entries), true);
}

async function fetchLeaderboard() {
  const listRaw = await storageGet(STORAGE_KEYS.LEADERBOARD, true);
  let entries = [];
  if (listRaw) {
    try {
      entries = JSON.parse(listRaw);
      if (!Array.isArray(entries)) entries = [];
    } catch (e) {
      entries = [];
    }
  }
  entries.sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));
  return entries.slice(0, 50);
}

/* ---------- Wrong-word review tracking ---------- */
function addWrongWord(word) {
  if (!state.progress.wrongWords.includes(word)) {
    state.progress.wrongWords.push(word);
  }
}
function removeWrongWord(word) {
  const idx = state.progress.wrongWords.indexOf(word);
  if (idx >= 0) state.progress.wrongWords.splice(idx, 1);
}

/* ---------- Save code (account-independent backup) ---------- */
function encodeSaveCode() {
  const payload = { v: 1, nickname: state.nickname, progress: state.progress };
  const json = JSON.stringify(payload);
  return btoa(unescape(encodeURIComponent(json)));
}
function decodeSaveCode(code) {
  try {
    const json = decodeURIComponent(escape(atob(code.trim())));
    const payload = JSON.parse(json);
    if (!payload || typeof payload !== 'object' || !payload.progress) return null;
    return payload;
  } catch (e) {
    return null;
  }
}
function normalizeProgress(progress) {
  const p = progress || {};
  if (!p.floors) p.floors = {};
  if (!Array.isArray(p.wrongWords)) p.wrongWords = [];
  if (typeof p.totalScore !== 'number') p.totalScore = 0;
  return p;
}
async function applyImportedSave(payload) {
  state.nickname = payload.nickname || state.nickname;
  state.progress = normalizeProgress(payload.progress);
  savePlayerData();
  pushLeaderboard();
}

/* ---------- Quiz session ---------- */
function buildQuestion(word, pool) {
  const type = Math.random() < 0.6 ? 'en2zh' : 'zh2en';
  const distractorsPool = pool.filter(w => w.word !== word.word);
  const distractors = sample(distractorsPool, 3);
  const options = shuffle([word, ...distractors]);
  return { word, type, options, answeredCorrectly: null, selected: null };
}

function startFloorSession(level) {
  const pool = floorWords(level);
  const n = Math.min(QUESTIONS_PER_FLOOR, pool.length);
  const chosen = sample(pool, n);
  const questions = chosen.map(w => buildQuestion(w, pool));
  state.session = {
    mode: 'floor',
    level,
    questions,
    index: 0,
    correctCount: 0,
    combo: 0,
    maxCombo: 0,
    score: 0,
  };
}

function startReviewSession() {
  const words = state.progress.wrongWords
    .map(w => VOCAB.find(v => v.word === w))
    .filter(Boolean);
  const n = Math.min(QUESTIONS_PER_FLOOR, words.length);
  const chosen = sample(words, n);
  const questions = chosen.map(w => buildQuestion(w, floorWords(w.level)));
  state.session = {
    mode: 'review',
    level: null,
    questions,
    index: 0,
    correctCount: 0,
    combo: 0,
    maxCombo: 0,
    score: 0,
  };
}

function comboMultiplier(combo) {
  return Math.min(1 + combo * 0.1, 2.5);
}

function answerQuestion(selectedWord) {
  const s = state.session;
  const q = s.questions[s.index];
  const isCorrect = selectedWord.word === q.word.word;
  q.answeredCorrectly = isCorrect;
  q.selected = selectedWord;
  if (isCorrect) {
    s.combo += 1;
    s.maxCombo = Math.max(s.maxCombo, s.combo);
    const mult = comboMultiplier(s.combo);
    s.score += Math.round(10 * mult);
    s.correctCount += 1;
    removeWrongWord(q.word.word);
  } else {
    s.combo = 0;
    addWrongWord(q.word.word);
  }
  return isCorrect;
}

async function finishSession() {
  const s = state.session;
  const accuracy = s.correctCount / s.questions.length;
  let stars = 0;
  if (accuracy >= 0.9) stars = 3;
  else if (accuracy >= 0.75) stars = 2;
  else if (accuracy >= PASS_THRESHOLD) stars = 1;
  const passed = accuracy >= PASS_THRESHOLD;

  if (s.mode === 'floor') {
    const prevFloor = state.progress.floors[s.level] || { stars: 0, bestScore: 0, passed: false };
    state.progress.floors[s.level] = {
      stars: Math.max(prevFloor.stars, stars),
      bestScore: Math.max(prevFloor.bestScore, s.score),
      passed: prevFloor.passed || passed,
    };

    if (passed && s.level < FLOOR_COUNT) {
      const nf = state.progress.floors[s.level + 1] || { stars: 0, bestScore: 0, passed: false };
      state.progress.floors[s.level + 1] = nf;
    }

    state.progress.totalScore = Object.values(state.progress.floors)
      .reduce((sum, f) => sum + (f.bestScore || 0), 0);
  }

  // Save & leaderboard sync happen in the background — never block
  // moving on to the result screen, even if storage is slow/unavailable.
  savePlayerData();
  if (s.mode === 'floor') {
    pushLeaderboard();
  }

  return {
    mode: s.mode,
    level: s.level,
    accuracy,
    stars,
    passed,
    score: s.score,
    correctCount: s.correctCount,
    total: s.questions.length,
    maxCombo: s.maxCombo,
  };
}

/* ---------- Rendering ---------- */
const app = document.getElementById('app');

function render() {
  if (state.screen === 'start') renderStart();
  else if (state.screen === 'tower') renderTower();
  else if (state.screen === 'quiz') renderQuiz();
  else if (state.screen === 'result') renderResult(state._lastResult);
  else if (state.screen === 'leaderboard') renderLeaderboard();
  else if (state.screen === 'review') renderReview();
  else if (state.screen === 'savecode') renderSaveCode();
}

function go(screen) {
  state.screen = screen;
  render();
}

function renderStart() {
  app.innerHTML = `
    <div class="screen screen-start">
      <div class="start-card">
        <div class="start-emblem">⚔️</div>
        <h1 class="game-title">勇者之塔</h1>
        <p class="game-subtitle">英語單字大冒險</p>
        <p class="start-desc">攀登 ${FLOOR_COUNT} 層詞彙之塔，擊敗每一層的挑戰，成為真正的單字勇者！</p>
        <label class="nick-label" for="nick-input">為你的勇者命名</label>
        <input id="nick-input" class="nick-input" type="text" maxlength="12" placeholder="輸入暱稱..." value="${escapeHtml(state.nickname)}" />
        <button id="start-btn" class="btn btn-primary btn-large">開始冒險</button>
        <button id="show-import-btn" class="btn btn-ghost btn-small start-import-toggle">已經玩過、有存檔碼？點此還原進度</button>
        <div id="start-import-area" class="hidden"></div>
        <p class="start-note">排行榜為跨裝置共享，你的暱稱與分數將會被其他玩家看到喔！進度會自動儲存，但若換裝置或清除瀏覽器資料，請使用存檔碼還原。</p>
      </div>
    </div>
  `;
  const input = document.getElementById('nick-input');
  const btn = document.getElementById('start-btn');
  btn.addEventListener('click', async () => {
    const val = input.value.trim();
    if (!val) {
      input.focus();
      input.classList.add('shake');
      setTimeout(() => input.classList.remove('shake'), 500);
      return;
    }
    state.nickname = val.slice(0, 12);
    savePlayerData();
    go('tower');
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') btn.click();
  });

  document.getElementById('show-import-btn').addEventListener('click', () => {
    const area = document.getElementById('start-import-area');
    if (!area.classList.contains('hidden')) return;
    area.classList.remove('hidden');
    area.innerHTML = `
      <textarea id="start-import-box" class="save-textarea" placeholder="貼上你的存檔碼..."></textarea>
      <button id="start-import-confirm" class="btn btn-primary btn-small">匯入並還原進度</button>
      <p id="start-import-msg" class="import-msg"></p>
    `;
    document.getElementById('start-import-confirm').addEventListener('click', async () => {
      const val = document.getElementById('start-import-box').value;
      const payload = decodeSaveCode(val);
      const msgEl = document.getElementById('start-import-msg');
      if (!payload) {
        msgEl.textContent = '存檔碼無效，請確認是否貼上完整代碼。';
        msgEl.style.color = 'var(--accent-rose)';
        return;
      }
      await applyImportedSave(payload);
      msgEl.textContent = '還原成功！正在進入塔...';
      msgEl.style.color = 'var(--accent-mint)';
      setTimeout(() => go('tower'), 500);
    });
  });
}

function floorLabel(level) {
  return BOSS_FLOORS.includes(level) ? `首領 · 第 ${level} 層` : `第 ${level} 層`;
}

function renderTower() {
  const nodes = [];
  for (let lvl = FLOOR_COUNT; lvl >= 1; lvl--) {
    const unlocked = isFloorUnlocked(lvl);
    const f = state.progress.floors[lvl];
    const isBoss = BOSS_FLOORS.includes(lvl);
    const side = lvl % 2 === 0 ? 'right' : 'left';
    const stars = f ? f.stars : 0;
    const starStr = unlocked ? '★'.repeat(stars) + '☆'.repeat(3 - stars) : '';
    nodes.push(`
      <div class="floor-row floor-${side}">
        <button class="floor-node ${unlocked ? 'unlocked' : 'locked'} ${isBoss ? 'boss' : ''}"
                data-level="${lvl}" ${unlocked ? '' : 'disabled'}>
          <span class="floor-icon">${isBoss ? '👑' : (unlocked ? '🔥' : '🔒')}</span>
          <span class="floor-num">${lvl}</span>
        </button>
        <div class="floor-meta">
          <span class="floor-name">${escapeHtml(floorLabel(lvl))}</span>
          ${unlocked ? `<span class="floor-stars">${starStr}</span>` : '<span class="floor-stars locked-text">未解鎖</span>'}
        </div>
      </div>
    `);
  }

  app.innerHTML = `
    <div class="screen screen-tower">
      <div class="tower-header">
        <div class="header-left">
          <span class="player-badge">🧙 ${escapeHtml(state.nickname)}</span>
        </div>
        <div class="header-right">
          <span class="score-badge">💰 ${state.progress.totalScore}</span>
        </div>
      </div>
      <div class="tower-toolbar">
        <button id="review-btn" class="btn btn-ghost btn-small">📖 錯題 (${state.progress.wrongWords.length})</button>
        <button id="leaderboard-btn" class="btn btn-ghost btn-small">🏆 排行榜</button>
        <button id="savecode-btn" class="btn btn-ghost btn-small">💾 存檔碼</button>
      </div>
      <div class="tower-path">
        ${nodes.join('')}
      </div>
    </div>
  `;
  document.getElementById('review-btn').addEventListener('click', () => go('review'));
  document.getElementById('savecode-btn').addEventListener('click', () => go('savecode'));
  document.getElementById('leaderboard-btn').addEventListener('click', () => go('leaderboard'));
  document.querySelectorAll('.floor-node.unlocked').forEach(btn => {
    btn.addEventListener('click', () => {
      const lvl = parseInt(btn.dataset.level, 10);
      startFloorSession(lvl);
      go('quiz');
    });
  });
  // scroll to current floor
  const cur = highestPassedFloor() + 1;
  setTimeout(() => {
    const target = document.querySelector(`.floor-node[data-level="${Math.min(cur, FLOOR_COUNT)}"]`);
    if (target && typeof target.scrollIntoView === 'function') {
      try { target.scrollIntoView({ block: 'center' }); } catch (e) {}
    }
  }, 50);
}

function renderQuiz() {
  const s = state.session;
  const q = s.questions[s.index];
  const isBoss = s.mode === 'floor' && BOSS_FLOORS.includes(s.level);
  const progressPct = Math.round((s.index / s.questions.length) * 100);

  let promptHtml, optionsHtml;
  if (q.type === 'en2zh') {
    promptHtml = `
      <div class="prompt-word">${escapeHtml(q.word.word)}</div>
      <div class="prompt-phon">/${escapeHtml(q.word.phon)}/ ${escapeHtml(q.word.pos)}</div>
    `;
    optionsHtml = q.options.map((o, i) => `
      <button class="option-btn" data-idx="${i}">${escapeHtml(o.meaning)}</button>
    `).join('');
  } else {
    promptHtml = `
      <div class="prompt-zh">${escapeHtml(q.word.meaning)}</div>
      <div class="prompt-zh-hint">請選出正確的英文單字</div>
    `;
    optionsHtml = q.options.map((o, i) => `
      <button class="option-btn option-en" data-idx="${i}">${escapeHtml(o.word)}</button>
    `).join('');
  }

  app.innerHTML = `
    <div class="screen screen-quiz ${isBoss ? 'boss-mode' : ''}">
      <div class="quiz-hud">
        <div class="hud-row">
          <span class="hud-floor">${s.mode === 'review' ? '📖 錯題複習' : (isBoss ? '👑 首領戰 · ' : '') + '第 ' + s.level + ' 層'}</span>
          <span class="hud-progress-text">${s.index + 1} / ${s.questions.length}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
        <div class="hud-row hud-stats">
          <span class="combo-badge ${s.combo > 1 ? 'combo-active' : ''}">🔥 連擊 x${s.combo}</span>
          <span class="score-live">⭐ ${s.score}</span>
        </div>
      </div>
      <div class="quiz-card">
        ${promptHtml}
      </div>
      <div class="options-grid">
        ${optionsHtml}
      </div>
      <div id="feedback-overlay" class="feedback-overlay hidden"></div>
    </div>
  `;

  document.querySelectorAll('.option-btn').forEach(btn => {
    btn.addEventListener('click', () => onOptionClick(btn, q));
  });
}

function onOptionClick(btn, q) {
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
  const idx = parseInt(btn.dataset.idx, 10);
  const selected = q.options[idx];
  const correct = answerQuestion(selected);

  if (correct) {
    btn.classList.add('correct-flash');
    showQuickFeedback(true, () => proceedToNext());
  } else {
    btn.classList.add('wrong-flash');
    const correctIdx = q.options.findIndex(o => o.word === q.word.word);
    const correctBtn = document.querySelectorAll('.option-btn')[correctIdx];
    if (correctBtn) correctBtn.classList.add('correct-reveal');
    showExplanation(q, () => proceedToNext());
  }
}

function showQuickFeedback(isCorrect, cb) {
  const overlay = document.getElementById('feedback-overlay');
  overlay.className = 'feedback-overlay feedback-correct visible';
  overlay.innerHTML = `<div class="feedback-pop">✓ 答對了！</div>`;
  setTimeout(() => {
    overlay.classList.remove('visible');
    cb();
  }, 700);
}

function showExplanation(q, cb) {
  const overlay = document.getElementById('feedback-overlay');
  overlay.className = 'feedback-overlay feedback-wrong visible';
  overlay.innerHTML = `
    <div class="explain-card">
      <div class="explain-title">✗ 答錯了，再接再厲！</div>
      <div class="explain-word">${escapeHtml(q.word.word)} <span class="explain-phon">/${escapeHtml(q.word.phon)}/</span> ${escapeHtml(q.word.pos)}</div>
      <div class="explain-meaning">${escapeHtml(q.word.meaning)}</div>
      <div class="explain-ex-en">${escapeHtml(q.word.ex_en)}</div>
      <div class="explain-ex-zh">${escapeHtml(q.word.ex_zh)}</div>
      <button id="explain-continue" class="btn btn-primary">繼續</button>
    </div>
  `;
  document.getElementById('explain-continue').addEventListener('click', () => {
    overlay.classList.remove('visible');
    cb();
  });
}

function proceedToNext() {
  const s = state.session;
  s.index += 1;
  if (s.index >= s.questions.length) {
    finishSession().then(result => {
      state._lastResult = result;
      go('result');
    });
  } else {
    renderQuiz();
  }
}

function renderResult(result) {
  if (result.mode === 'review') {
    renderReviewResult(result);
    return;
  }
  const s = state.session;
  const starsHtml = '★'.repeat(result.stars) + '☆'.repeat(3 - result.stars);
  const nextLevel = s.level + 1;
  const canGoNext = result.passed && nextLevel <= FLOOR_COUNT;

  app.innerHTML = `
    <div class="screen screen-result">
      <div class="result-card ${result.passed ? 'result-pass' : 'result-fail'}">
        <div class="result-banner">${result.passed ? (BOSS_FLOORS.includes(s.level) ? '👑 首領擊敗！' : '🎉 過關成功！') : '💔 尚未通關'}</div>
        <div class="result-stars">${starsHtml}</div>
        <div class="result-stats">
          <div class="stat-row"><span>正確率</span><span>${result.correctCount} / ${result.total}</span></div>
          <div class="stat-row"><span>本層分數</span><span>${result.score}</span></div>
          <div class="stat-row"><span>最高連擊</span><span>🔥 x${result.maxCombo}</span></div>
        </div>
        ${result.passed ? '' : `<p class="result-hint">正確率需達 60% 才能過關，再試一次吧！</p>`}
        <div class="result-actions">
          ${canGoNext ? `<button id="next-floor-btn" class="btn btn-primary">前往第 ${nextLevel} 層</button>` : ''}
          <button id="retry-btn" class="btn ${canGoNext ? 'btn-ghost' : 'btn-primary'}">重新挑戰本層</button>
          <button id="back-tower-btn" class="btn btn-ghost">回到塔地圖</button>
        </div>
      </div>
    </div>
  `;
  const nextBtn = document.getElementById('next-floor-btn');
  if (nextBtn) nextBtn.addEventListener('click', () => {
    startFloorSession(nextLevel);
    go('quiz');
  });
  document.getElementById('retry-btn').addEventListener('click', () => {
    startFloorSession(s.level);
    go('quiz');
  });
  document.getElementById('back-tower-btn').addEventListener('click', () => go('tower'));
}

function renderReviewResult(result) {
  const starsHtml = '★'.repeat(result.stars) + '☆'.repeat(3 - result.stars);
  const remaining = state.progress.wrongWords.length;
  app.innerHTML = `
    <div class="screen screen-result">
      <div class="result-card result-pass">
        <div class="result-banner">📖 複習完成！</div>
        <div class="result-stars">${starsHtml}</div>
        <div class="result-stats">
          <div class="stat-row"><span>本次正確率</span><span>${result.correctCount} / ${result.total}</span></div>
          <div class="stat-row"><span>本次分數</span><span>${result.score}</span></div>
          <div class="stat-row"><span>剩餘待複習</span><span>${remaining} 個</span></div>
        </div>
        <div class="result-actions">
          ${remaining > 0 ? '<button id="review-again-btn" class="btn btn-primary">回到複習列表</button>' : ''}
          <button id="back-tower-btn" class="btn ${remaining > 0 ? 'btn-ghost' : 'btn-primary'}">回到塔地圖</button>
        </div>
      </div>
    </div>
  `;
  const againBtn = document.getElementById('review-again-btn');
  if (againBtn) againBtn.addEventListener('click', () => go('review'));
  document.getElementById('back-tower-btn').addEventListener('click', () => go('tower'));
}

function renderLeaderboard() {
  app.innerHTML = `
    <div class="screen screen-leaderboard">
      <div class="leaderboard-card">
        <h2 class="lb-title">🏆 排行榜</h2>
        <p class="lb-sub">跨裝置共享 · 所有玩家可見</p>
        <div id="lb-list" class="lb-list"><div class="lb-loading">載入中...</div></div>
        <button id="lb-close" class="btn btn-ghost">返回</button>
      </div>
    </div>
  `;
  document.getElementById('lb-close').addEventListener('click', () => go('tower'));
  fetchLeaderboard().then(entries => {
    const list = document.getElementById('lb-list');
    if (!entries.length) {
      list.innerHTML = '<div class="lb-empty">還沒有玩家上榜，成為第一位勇者吧！</div>';
      return;
    }
    list.innerHTML = entries.map((e, i) => `
      <div class="lb-row ${e.nickname === state.nickname ? 'lb-self' : ''}">
        <span class="lb-rank">${i + 1}</span>
        <span class="lb-name">${escapeHtml(e.nickname || '???')}</span>
        <span class="lb-floor">第 ${e.highestFloor || 0} 層</span>
        <span class="lb-score">${e.totalScore || 0}</span>
      </div>
    `).join('');
  });
}

function renderReview() {
  const words = state.progress.wrongWords
    .map(w => VOCAB.find(v => v.word === w))
    .filter(Boolean);
  const count = words.length;
  const rows = words.map(w => `
    <div class="review-row">
      <div class="review-word-line">
        <span class="review-word">${escapeHtml(w.word)}</span>
        <span class="review-phon">/${escapeHtml(w.phon)}/ ${escapeHtml(w.pos)}</span>
      </div>
      <div class="review-meaning">${escapeHtml(w.meaning)}</div>
    </div>
  `).join('');

  app.innerHTML = `
    <div class="screen screen-review">
      <div class="review-header">
        <button id="review-back" class="btn btn-ghost btn-small">← 返回</button>
        <h2 class="review-title">📖 錯題複習</h2>
      </div>
      ${count === 0
        ? `<div class="review-empty">目前沒有錯題，太棒了！🎉<br>繼續闖關累積更多挑戰吧。</div>`
        : `
          <p class="review-count">目前有 <strong>${count}</strong> 個單字待複習</p>
          <button id="review-start" class="btn btn-primary btn-large">開始複習（隨機 ${Math.min(count, QUESTIONS_PER_FLOOR)} 題）</button>
          <div class="review-list">${rows}</div>
        `}
    </div>
  `;
  document.getElementById('review-back').addEventListener('click', () => go('tower'));
  const startBtn = document.getElementById('review-start');
  if (startBtn) startBtn.addEventListener('click', () => {
    startReviewSession();
    go('quiz');
  });
}

let pendingImportPayload = null;

function renderSaveCode() {
  const code = encodeSaveCode();
  pendingImportPayload = null;
  app.innerHTML = `
    <div class="screen screen-save">
      <div class="save-card">
        <h2 class="save-title">💾 存檔碼</h2>
        <p class="save-desc">複製下方代碼保存起來（例如貼到記事本 App），下次在任何裝置開啟此遊戲時，貼回下方欄位即可還原進度。進度也會自動儲存在本機，但存檔碼是最保險的備份方式。</p>
        <textarea id="save-code-box" class="save-textarea" readonly>${escapeHtml(code)}</textarea>
        <button id="copy-code-btn" class="btn btn-primary">複製存檔碼</button>
        <p id="copy-msg" class="import-msg"></p>
        <div class="save-divider">或匯入已有的存檔碼</div>
        <textarea id="import-code-box" class="save-textarea" placeholder="貼上你的存檔碼..."></textarea>
        <button id="import-code-btn" class="btn btn-ghost">匯入並還原進度</button>
        <div id="import-confirm-area"></div>
        <p id="import-msg" class="import-msg"></p>
        <button id="save-back-btn" class="btn btn-ghost">返回塔地圖</button>
      </div>
    </div>
  `;
  document.getElementById('save-back-btn').addEventListener('click', () => go('tower'));

  document.getElementById('copy-code-btn').addEventListener('click', () => {
    const box = document.getElementById('save-code-box');
    box.focus();
    box.select();
    const msg = document.getElementById('copy-msg');
    let copied = false;
    try {
      copied = document.execCommand('copy');
    } catch (e) {
      copied = false;
    }
    if (copied) {
      msg.textContent = '已複製到剪貼簿！';
      msg.style.color = 'var(--accent-mint)';
    } else if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(() => {
        msg.textContent = '已複製到剪貼簿！';
        msg.style.color = 'var(--accent-mint)';
      }).catch(() => {
        msg.textContent = '自動複製失敗，文字已選取，請手動按 Ctrl+C（或長按）複製。';
        msg.style.color = 'var(--accent-gold)';
      });
    } else {
      msg.textContent = '文字已選取，請手動按 Ctrl+C（或長按）複製。';
      msg.style.color = 'var(--accent-gold)';
    }
  });

  document.getElementById('import-code-btn').addEventListener('click', () => {
    const val = document.getElementById('import-code-box').value;
    const payload = decodeSaveCode(val);
    const msgEl = document.getElementById('import-msg');
    const confirmArea = document.getElementById('import-confirm-area');
    if (!payload) {
      msgEl.textContent = '存檔碼無效，請確認是否貼上完整代碼。';
      msgEl.style.color = 'var(--accent-rose)';
      confirmArea.innerHTML = '';
      return;
    }
    msgEl.textContent = '';
    pendingImportPayload = payload;
    confirmArea.innerHTML = `
      <p class="import-confirm-text">⚠️ 匯入將覆蓋目前進度，確定要繼續嗎？</p>
      <div class="import-confirm-actions">
        <button id="import-confirm-yes" class="btn btn-primary btn-small">確定匯入</button>
        <button id="import-confirm-no" class="btn btn-ghost btn-small">取消</button>
      </div>
    `;
    document.getElementById('import-confirm-yes').addEventListener('click', async () => {
      const p = pendingImportPayload;
      pendingImportPayload = null;
      if (!p) return;
      await applyImportedSave(p);
      confirmArea.innerHTML = '';
      msgEl.textContent = '還原成功！';
      msgEl.style.color = 'var(--accent-mint)';
      setTimeout(() => go('tower'), 500);
    });
    document.getElementById('import-confirm-no').addEventListener('click', () => {
      pendingImportPayload = null;
      confirmArea.innerHTML = '';
    });
  });
}

/* ---------- Boot ---------- */
async function boot() {
  await loadPlayer();
  if (state.nickname) {
    go('tower');
  } else {
    go('start');
  }
}

boot();

// debug accessor (harmless; lets developers inspect state via console)
window.__debugState = () => state;

</script>
</body>
</html>
