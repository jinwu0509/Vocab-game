<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>勇者之塔：英語單字大冒險</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Baloo+2:wght@500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #150f2e;
  --bg-surface: #251c47;
  --bg-surface-2: #322657;
  --bg-surface-3: #3b2d68;
  --accent-gold: #f2b134;
  --accent-gold-soft: #f7cc6e;
  --accent-ember: #ff6b4a;
  --accent-mint: #4ade80;
  --accent-rose: #f25c6b;
  --text-light: #f5f0ff;
  --text-muted: #b3a6dd;
  --border-soft: rgba(242, 177, 52, 0.25);
  --shadow-deep: 0 12px 40px rgba(0, 0, 0, 0.45);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-deep);
  color: var(--text-light);
  font-family: 'Noto Sans TC', 'Baloo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  background-image:
    radial-gradient(circle at 20% 10%, rgba(242, 177, 52, 0.08), transparent 40%),
    radial-gradient(circle at 80% 0%, rgba(255, 107, 74, 0.10), transparent 45%),
    radial-gradient(circle at 50% 100%, rgba(74, 222, 128, 0.05), transparent 50%);
}

#app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  padding-bottom: 24px;
}

.screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 20px 16px;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
}

.hidden { display: none !important; }

/* ---------- Buttons ---------- */
.btn {
  font-family: 'Baloo 2', 'Noto Sans TC', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  padding: 12px 24px;
  border-radius: 14px;
  transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
  letter-spacing: 0.02em;
}
.btn:active { transform: scale(0.96); }

.btn-primary {
  background: linear-gradient(180deg, var(--accent-gold-soft), var(--accent-gold));
  color: #2a1a05;
  box-shadow: 0 6px 0 #b9821c, 0 10px 20px rgba(242, 177, 52, 0.25);
}
.btn-primary:hover { filter: brightness(1.05); }

.btn-ghost {
  background: var(--bg-surface-2);
  color: var(--text-light);
  border: 1px solid var(--border-soft);
}

.btn-large { width: 100%; padding: 16px; font-size: 1.15rem; }
.btn-small { padding: 8px 14px; font-size: 0.85rem; }

/* ---------- Start screen ---------- */
.screen-start { justify-content: center; }
.start-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-soft);
  border-radius: 24px;
  padding: 36px 28px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow-deep);
}
.start-emblem { font-size: 3rem; margin-bottom: 4px; }
.game-title {
  font-family: 'Cinzel', serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--accent-gold);
  margin: 0;
  text-shadow: 0 2px 12px rgba(242, 177, 52, 0.4);
  letter-spacing: 0.04em;
}
.game-subtitle {
  font-size: 1.05rem;
  color: var(--text-muted);
  margin: 4px 0 18px;
  letter-spacing: 0.05em;
}
.start-desc {
  font-size: 0.92rem;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 24px;
}
.nick-label {
  display: block;
  text-align: left;
  font-size: 0.85rem;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.nick-input {
  width: 100%;
  padding: 14px 16px;
  border-radius: 12px;
  border: 1px solid var(--border-soft);
  background: var(--bg-deep);
  color: var(--text-light);
  font-size: 1.05rem;
  margin-bottom: 18px;
  font-family: 'Noto Sans TC', sans-serif;
}
.nick-input:focus { outline: 2px solid var(--accent-gold); }
.nick-input.shake { animation: shake 0.4s; }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
.start-note {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 16px;
  line-height: 1.5;
  opacity: 0.85;
}

/* ---------- Tower screen ---------- */
.screen-tower { padding-top: 14px; }
.tower-header {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
  gap: 8px;
}
.tower-toolbar {
  width: 100%;
  display: flex;
  gap: 8px;
  margin-bottom: 22px;
  flex-wrap: wrap;
}
.tower-toolbar .btn { flex: 1; white-space: nowrap; }
.header-left, .header-right { display: flex; align-items: center; gap: 8px; }
.player-badge, .score-badge {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-soft);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 0.88rem;
  font-weight: 700;
  white-space: nowrap;
}
.score-badge { color: var(--accent-gold); font-family: 'JetBrains Mono', monospace; }

.tower-path {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 6px;
  position: relative;
}
.tower-path::before {
  content: '';
  position: absolute;
  left: 50%;
  top: 0;
  bottom: 0;
  width: 3px;
  background: repeating-linear-gradient(to bottom, var(--border-soft) 0 8px, transparent 8px 16px);
  transform: translateX(-50%);
  z-index: 0;
}
.floor-row {
  display: flex;
  align-items: center;
  gap: 14px;
  position: relative;
  z-index: 1;
  padding: 6px 0;
}
.floor-left { flex-direction: row; justify-content: flex-start; }
.floor-right { flex-direction: row-reverse; justify-content: flex-start; }
.floor-right .floor-meta { text-align: right; }

.floor-node {
  width: 56px;
  height: 56px;
  min-width: 56px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-surface-2);
  border: 2px solid var(--border-soft);
  color: var(--text-light);
  position: relative;
}
.floor-node.unlocked {
  background: radial-gradient(circle at 30% 30%, var(--accent-gold-soft), var(--accent-ember));
  border-color: var(--accent-gold);
  box-shadow: 0 0 16px rgba(242, 177, 52, 0.5);
  color: #2a1505;
}
.floor-node.locked { opacity: 0.45; }
.floor-node.boss.unlocked {
  background: radial-gradient(circle at 30% 30%, #ffe7a8, var(--accent-rose));
  border-color: var(--accent-rose);
  box-shadow: 0 0 20px rgba(242, 92, 107, 0.55);
  width: 64px; height: 64px; min-width: 64px;
}
.floor-icon { font-size: 1.1rem; line-height: 1; }
.floor-num { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; font-weight: 700; }

.floor-meta { display: flex; flex-direction: column; gap: 2px; }
.floor-name { font-size: 0.82rem; font-weight: 700; color: var(--text-light); }
.floor-stars { font-size: 0.78rem; color: var(--accent-gold); letter-spacing: 1px; }
.floor-stars.locked-text { color: var(--text-muted); opacity: 0.7; }

/* ---------- Quiz screen ---------- */
.screen-quiz { padding-top: 16px; justify-content: flex-start; }
.quiz-hud { width: 100%; margin-bottom: 18px; }
.hud-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hud-floor { font-weight: 700; font-size: 0.95rem; }
.hud-progress-text { font-family: 'JetBrains Mono', monospace; color: var(--text-muted); font-size: 0.85rem; }
.progress-bar {
  width: 100%; height: 8px; border-radius: 999px;
  background: var(--bg-surface-2); overflow: hidden; margin-bottom: 8px;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent-gold), var(--accent-ember));
  transition: width 0.3s ease;
}
.hud-stats { margin-top: 4px; }
.combo-badge {
  font-size: 0.85rem; font-weight: 700; color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
}
.combo-badge.combo-active { color: var(--accent-ember); text-shadow: 0 0 8px rgba(255, 107, 74, 0.6); }
.score-live { font-family: 'JetBrains Mono', monospace; color: var(--accent-gold); font-weight: 700; font-size: 0.85rem; }

.quiz-card {
  width: 100%;
  background: var(--bg-surface);
  border: 1px solid var(--border-soft);
  border-radius: 20px;
  padding: 36px 20px;
  text-align: center;
  margin-bottom: 18px;
  box-shadow: var(--shadow-deep);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.prompt-word {
  font-family: 'Cinzel', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent-gold-soft);
  word-break: break-word;
}
.prompt-phon { font-size: 0.92rem; color: var(--text-muted); margin-top: 6px; }
.prompt-zh { font-size: 1.6rem; font-weight: 700; color: var(--text-light); line-height: 1.5; }
.prompt-zh-hint { font-size: 0.82rem; color: var(--text-muted); margin-top: 8px; }

.options-grid {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.option-btn {
  background: var(--bg-surface-2);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  color: var(--text-light);
  padding: 16px 10px;
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.4;
  transition: transform 0.12s ease, background 0.2s ease, border-color 0.2s ease;
  min-height: 64px;
}
.option-btn:not(:disabled):hover { transform: translateY(-2px); border-color: var(--accent-gold); }
.option-en { font-family: 'Baloo 2', sans-serif; font-size: 1.1rem; }
.option-btn.correct-flash, .option-btn.correct-reveal {
  background: linear-gradient(180deg, #5be08a, var(--accent-mint));
  border-color: var(--accent-mint);
  color: #053318;
}
.option-btn.wrong-flash {
  background: linear-gradient(180deg, #f57c8a, var(--accent-rose));
  border-color: var(--accent-rose);
  color: #340811;
}
.option-btn:disabled { opacity: 0.85; }

.boss-mode .quiz-card { border-color: var(--accent-rose); box-shadow: 0 0 30px rgba(242, 92, 107, 0.25), var(--shadow-deep); }

.feedback-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 6, 24, 0.78);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  padding: 20px;
}
.feedback-overlay.visible { opacity: 1; pointer-events: all; }
.feedback-pop {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--accent-mint);
  background: var(--bg-surface);
  border: 2px solid var(--accent-mint);
  border-radius: 16px;
  padding: 18px 32px;
  animation: popIn 0.3s ease;
}
@keyframes popIn {
  0% { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.explain-card {
  background: var(--bg-surface);
  border: 2px solid var(--accent-rose);
  border-radius: 20px;
  padding: 24px 22px;
  max-width: 380px;
  width: 100%;
  text-align: left;
  box-shadow: var(--shadow-deep);
}
.explain-title { font-weight: 700; color: var(--accent-rose); margin-bottom: 14px; font-size: 1.05rem; }
.explain-word { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--accent-gold-soft); margin-bottom: 6px; }
.explain-phon { font-family: 'Noto Sans TC', sans-serif; font-size: 0.85rem; color: var(--text-muted); }
.explain-meaning { font-size: 1rem; margin-bottom: 14px; color: var(--text-light); }
.explain-ex-en { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 4px; line-height: 1.5; font-style: italic; }
.explain-ex-zh { font-size: 0.9rem; color: var(--text-light); margin-bottom: 18px; line-height: 1.5; }
.explain-card .btn { width: 100%; }

/* ---------- Result screen ---------- */
.screen-result { justify-content: center; }
.result-card {
  background: var(--bg-surface);
  border-radius: 24px;
  padding: 32px 24px;
  width: 100%;
  text-align: center;
  box-shadow: var(--shadow-deep);
  border: 2px solid var(--border-soft);
}
.result-pass { border-color: var(--accent-gold); }
.result-fail { border-color: var(--accent-rose); }
.result-banner { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; }
.result-stars { font-size: 2.4rem; color: var(--accent-gold); margin-bottom: 18px; letter-spacing: 4px; }
.result-stats { background: var(--bg-surface-2); border-radius: 14px; padding: 14px 18px; margin-bottom: 16px; }
.stat-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.95rem; }
.stat-row span:last-child { font-family: 'JetBrains Mono', monospace; font-weight: 700; color: var(--accent-gold-soft); }
.result-hint { font-size: 0.85rem; color: var(--accent-rose); margin-bottom: 14px; }
.result-actions { display: flex; flex-direction: column; gap: 10px; }

/* ---------- Leaderboard screen ---------- */
.screen-leaderboard { justify-content: center; }
.leaderboard-card {
  background: var(--bg-surface);
  border-radius: 24px;
  padding: 28px 22px;
  width: 100%;
  box-shadow: var(--shadow-deep);
  border: 1px solid var(--border-soft);
}
.lb-title { font-family: 'Cinzel', serif; color: var(--accent-gold); text-align: center; margin: 0 0 4px; }
.lb-sub { text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-bottom: 18px; }
.lb-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; max-height: 50vh; overflow-y: auto; }
.lb-row {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  gap: 10px;
  align-items: center;
  background: var(--bg-surface-2);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 0.88rem;
}
.lb-row.lb-self { border: 1px solid var(--accent-gold); }
.lb-rank { font-family: 'JetBrains Mono', monospace; color: var(--accent-gold); font-weight: 700; }
.lb-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-floor { color: var(--text-muted); font-size: 0.8rem; white-space: nowrap; }
.lb-score { font-family: 'JetBrains Mono', monospace; color: var(--accent-gold-soft); font-weight: 700; white-space: nowrap; }
.lb-loading, .lb-empty { text-align: center; color: var(--text-muted); padding: 24px 0; }
.leaderboard-card .btn { width: 100%; }

/* ---------- Review screen ---------- */
.screen-review { padding-top: 16px; align-items: stretch; }
.review-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.review-title { font-family: 'Cinzel', serif; color: var(--accent-gold); font-size: 1.3rem; margin: 0; }
.review-count { text-align: center; color: var(--text-muted); margin-bottom: 14px; }
.review-count strong { color: var(--accent-gold-soft); font-family: 'JetBrains Mono', monospace; }
.review-empty {
  text-align: center;
  color: var(--text-muted);
  background: var(--bg-surface);
  border: 1px solid var(--border-soft);
  border-radius: 16px;
  padding: 40px 20px;
  line-height: 1.8;
}
.review-list { display: flex; flex-direction: column; gap: 10px; margin-top: 18px; }
.review-row {
  background: var(--bg-surface);
  border: 1px solid var(--border-soft);
  border-radius: 14px;
  padding: 12px 16px;
}
.review-word-line { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.review-word { font-family: 'Cinzel', serif; font-weight: 700; color: var(--accent-gold-soft); font-size: 1.05rem; }
.review-phon { font-size: 0.78rem; color: var(--text-muted); }
.review-meaning { font-size: 0.92rem; color: var(--text-light); }

/* ---------- Save code screen ---------- */
.screen-save { padding-top: 16px; }
.save-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-soft);
  border-radius: 20px;
  padding: 26px 22px;
  width: 100%;
  box-shadow: var(--shadow-deep);
}
.save-title { font-family: 'Cinzel', serif; color: var(--accent-gold); text-align: center; margin: 0 0 10px; }
.save-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 16px; }
.save-textarea {
  width: 100%;
  min-height: 88px;
  background: var(--bg-deep);
  border: 1px solid var(--border-soft);
  border-radius: 12px;
  color: var(--text-light);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  padding: 10px 12px;
  resize: vertical;
  margin-bottom: 10px;
  word-break: break-all;
}
.save-card .btn { width: 100%; margin-bottom: 6px; }
.save-divider {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.82rem;
  margin: 18px 0 14px;
  position: relative;
}
.import-msg { font-size: 0.82rem; min-height: 1.2em; margin: 4px 0 10px; text-align: center; }
.import-confirm-text { font-size: 0.88rem; color: var(--accent-gold-soft); text-align: center; margin-bottom: 10px; }
.import-confirm-actions { display: flex; gap: 8px; margin-bottom: 10px; }
.import-confirm-actions .btn { flex: 1; }

.start-import-toggle { margin-top: 6px; width: 100%; }
#start-import-area { margin-top: 14px; text-align: left; }

/* ---------- Responsive ---------- */
@media (max-width: 380px) {
  .game-title { font-size: 1.9rem; }
  .prompt-word { font-size: 1.7rem; }
  .floor-node { width: 48px; height: 48px; min-width: 48px; }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

</style>
</head>
<body>
<div id="app"></div>
<script>
const VOCAB = [{"word":"state","phon":"stet","pos":"n./vt.","meaning":"情況，狀態，州／聲明，敘述","ex_en":"After the terrible accident, the driver was still in a state of great shock, unable to say a word.","ex_zh":"在經歷可怕的意外後，駕駛仍處於極度驚嚇的狀態，無法言語。","level":1},{"word":"found","phon":"faʊnd","pos":"vt.","meaning":"創立，建立","ex_en":"After working in a big company for years, Bob decided to quit the job and found a company of his own.","ex_zh":"在大公司裡工作數年之後，Bob 決定辭職並創立自己的公司。","level":1},{"word":"company","phon":"'kʌmpəni","pos":"n.","meaning":"公司，同伴","ex_en":"I don't like the feeling of being alone. I need someone to keep me company.","ex_zh":"我不喜歡獨自一個人的感覺。我需要有人陪伴我。","level":1},{"word":"government","phon":"ˈgʌvɚnmənt","pos":"n.","meaning":"政府","ex_en":"It's every government's job to make sure that its people live a good and safe life.","ex_zh":"確保人民過得好且安全的生活是每個政府的職責所在。","level":1},{"word":"system","phon":"'sɪstəm","pos":"n.","meaning":"系統，制度","ex_en":"Students are asked to take different courses based on their interests under the new educational system.","ex_zh":"新的教育制度下，學生被要求根據自己的興趣修不同的課程。","level":1},{"word":"support","phon":"səˈpɔrt","pos":"vt./n.","meaning":"支持，幫助，供養","ex_en":"It's hard to believe that Tom has to support such a big family on his own.","ex_zh":"很難相信Tom需要獨自供養如此大的一個家庭。","level":1},{"word":"general","phon":"ˈdʤɛnərəl","pos":"adj./n.","meaning":"一般的，通常的／將軍","ex_en":"In general, boys do better in subjects like math and science while girls have better grades in language.","ex_zh":"大致上來說，男生在數學和科學類的科目表現較好，而女生在語言方面則有較好的成績。","level":1},{"word":"following","phon":"'faləwɪŋ","pos":"adj./prep.","meaning":"接著的，下列的／接⋯之後","ex_en":"Be sure to read the following articles and write down their main ideas before our next class.","ex_zh":"在我們下一堂課之前，務必閱讀以下的文章並寫好主旨。","level":1},{"word":"president","phon":"'prɛzɪdənt","pos":"n.","meaning":"總統，總裁，董事長","ex_en":"Ms. Tsai Ing-Wen is the first female president in Taiwan's history.","ex_zh":"蔡英文女士是臺灣歷史上首位女性總統。","level":1},{"word":"local","phon":"ˈlokl","pos":"adj./n.","meaning":"當地的／在地人，當地人","ex_en":"This is a local TV station, which only reports news happening in this city.","ex_zh":"這是一家當地的電視臺，只報導這座城市裡的新聞。","level":1},{"word":"court","phon":"kort","pos":"n.","meaning":"法庭，法院，（籃球、網球等）球場","ex_en":"Mrs. Lee tells us that if we do not pay the rent on time, she will take legal action and take us to court.","ex_zh":"李太太告訴我們，如果我們不準時繳交房租，她就會採取法律行動並控告我們。","level":1},{"word":"single","phon":"ˈsɪŋgl","pos":"adj./n./vt.","meaning":"單一的，唯一的，單身的","ex_en":"Anna feels that in the world, there is not a single person who understands how she feels.","ex_zh":"Anna覺得世界上沒有一個人能理解她的感受。","level":1},{"word":"control","phon":"kən'trol","pos":"vt./n.","meaning":"控制","ex_en":"When all the people in town were worried sick, the mayor stood up and said, \"Don't worry! Everything is under control.\"","ex_zh":"當鎮上所有人都非常擔心時，鎮長站出來說：「別擔心！一切都在掌控之中。」","level":1},{"word":"due","phon":"dju","pos":"adj.","meaning":"到期的","ex_en":"Your paper is due next week. You'd better start working on it.","ex_zh":"你的報告下週要繳交了。你最好開始做。","level":1},{"word":"cause","phon":"kɔz","pos":"vt./n.","meaning":"造成，引起／原因，起因","ex_en":"Air pollution will cause people to have difficulty breathing.","ex_zh":"空氣汙染會造成人們呼吸困難。","level":1},{"word":"human","phon":"ˈhjumən","pos":"n./adj.","meaning":"人，人類／人的，人類的","ex_en":"Human beings are not the only animals that know how to use tools.","ex_zh":"人類並非唯一懂得使用工具的動物。","level":1},{"word":"saw","phon":"sɔ","pos":"n./vi./vt.","meaning":"鋸子／（用鋸子）鋸，來回拉動","ex_en":"The gardener climbed onto the tree and sawed the dead twigs and branches off.","ex_zh":"園丁爬到樹上，把枯死的枝枒和樹枝鋸掉。","level":1},{"word":"data","phon":"ˈdetə","pos":"n.","meaning":"數據，資料","ex_en":"After the experiment, the scientists need to gather numbers and results and use them as data in their studies.","ex_zh":"實驗之後，科學家需要蒐集數字及結果，並把它們當作資料運用在研究中。","level":1},{"word":"rather","phon":"'ræðɚ","pos":"adv.","meaning":"相當","ex_en":"This online course is rather difficult. Maybe you should take an easier one.","ex_zh":"這個線上課程相當困難。也許你應該選一個簡單一點的。","level":1},{"word":"further","phon":"'fɝðɚ","pos":"adv./adj.","meaning":"更遠地（的），【程度上】進一步地（的）","ex_en":"Many students choose to go abroad for further studies instead of going to college in Taiwan.","ex_zh":"許多學生選擇出國深造而不是留在臺灣念大學。","level":1},{"word":"major","phon":"ˈmedʤɚ","pos":"adj./vi./n.","meaning":"主要的，重大的／主修","ex_en":"Too much stress and too little exercise are the major causes of his illness.","ex_zh":"壓力太大以及運動太少是造成他生病的主因。","level":1},{"word":"former","phon":"'fɔrmɚ","pos":"adj.","meaning":"以前的，較早的","ex_en":"The shirt comes in yellow and black, but I think the former on you as bright colors make you look young.","ex_zh":"這件襯衫有黃色和黑色，但我認為前者較適合你，因為鮮豔的顏色令你看起來更年輕。","level":1},{"word":"available","phon":"əˈveləbl","pos":"adj.","meaning":"可獲得的，可利用的","ex_en":"If you want to borrow magazines, tapes, or CDs, you can visit the library. They are all available there.","ex_zh":"如果你想借雜誌、錄音帶或CD，你可以去圖書館，那邊都有。","level":1},{"word":"education","phon":".ɛdʒu'keʃən","pos":"n.","meaning":"教育","ex_en":"Malala Yousafzai tells the world that every girl should have a right to education.","ex_zh":"馬拉拉告訴全世界，女孩應有權接受教育。","level":1},{"word":"college","phon":"ˈkɑlɪdʤ","pos":"n.","meaning":"大學，學院","ex_en":"Greg's parents don't understand why he doesn't plan to go to college after he finishes high school.","ex_zh":"Greg的父母實在不了解為何他高中畢業不打算上大學。","level":1},{"word":"current","phon":"'kɝənt","pos":"adj./n.","meaning":"目前的，現行的／水流，電流，氣流","ex_en":"Languages change all the time. Many words that were found in Shakespeare's works are no longer in current use.","ex_zh":"語言一直在改變。許多莎士比亞作品中的字詞已不再使用。","level":1},{"word":"board","phon":"bord","pos":"n./vi.","meaning":"板子，董事會／登機（船、火車）","ex_en":"The Lins are going to sell their house, so they put up a board with \"For Sale\" written on it in front of their house.","ex_zh":"林家一家人打算把房子賣掉，所以他們在家門前立起一塊板，上面寫著「出售」。","level":1},{"word":"field","phon":"fild","pos":"n.","meaning":"田野，運動場，界，領域","ex_en":"During break time, many students play soccer and baseball on the sports field.","ex_zh":"下課時間，許多學生會在運動場踢足球或是打棒球。","level":1},{"word":"instead","phon":"ɪn'stɛd","pos":"adv.","meaning":"替代地，反而","ex_en":"Ms. Jones didn't get angry with me. Instead, she said something nice to me.","ex_zh":"Jones 女士沒有對我生氣。相反，她對我說了些溫柔的話。","level":1},{"word":"term","phon":"tɝm","pos":"n.","meaning":"術語，學期","ex_en":"This paper is full of too many difficult legal terms, so I'll need someone to explain them in simpler words for me.","ex_zh":"這份報告中充滿太多艱難的法律術語，所以我需要找人用簡單一點的字眼幫我解釋。","level":1},{"word":"force","phon":"fɔrs","pos":"n./vt.","meaning":"力量，武力／逼使","ex_en":"We couldn't believe that Kevin took Julie's wallet by force just because she refused to lend him money.","ex_zh":"我們不敢相信 Kevin 強行搶走了 Julie 的錢包，只因為她拒絕借錢給他。","level":1},{"word":"energy","phon":"'ɛnədʤi","pos":"n.","meaning":"精力，能源","ex_en":"Sarah's five-year-old son is full of energy. It's hard to make him to stay quiet for ten minutes.","ex_zh":"Sarah 五歲的兒子精力旺盛，要他保持安靜十分鐘很困難。","level":1},{"word":"sex","phon":"sɛks","pos":"n.","meaning":"性，性別","ex_en":"Many Chinese parents do not like to talk about sex in front of their kids and would avoid the subject.","ex_zh":"許多中國父母不喜歡在孩子面前談論「性」，因此會避開這個話題。","level":1},{"word":"project","phon":"ˈprɑdʤɛkt","pos":"n./vt.","meaning":"計畫，方案，課題／投影，投射","ex_en":"The team was formed for the new project, and all the team members worked hard to come up with good ideas.","ex_zh":"這個團隊是為了新計畫而成立的，所有的成員都努力提出好的想法。","level":1},{"word":"record","phon":"ˈrɛkɚd","pos":"vt./n.","meaning":"錄音（影）／紀錄","ex_en":"Many drivers will now set up a camera in their car to record everything that happens when they hit the road.","ex_zh":"許多駕駛現在會在車內安裝攝影機，錄下開車上路後所發生的所有事。","level":1},{"word":"account","phon":"ə'kaʊnt","pos":"n./vi.","meaning":"帳戶，描述、理由／說明原因","ex_en":"Peter gave a clear account of what he had seen in the accident yesterday.","ex_zh":"Peter 清楚地說明了昨天在事故中所看到的一切。","level":1},{"word":"include","phon":"ɪnˈklud","pos":"vt.","meaning":"包含，包括","ex_en":"The price doesn't include taxes. You have to pay $450 after tax.","ex_zh":"此價格不含稅。加上稅之後，你需要付450美元。","level":1},{"word":"similar","phon":"ˈsɪmələ","pos":"adj.","meaning":"相似的","ex_en":"Mark's report is similar to Maggie's. The teacher wonders if he copied her report.","ex_zh":"Mark的報告與Maggie的相似。老師猜想他是否抄了她的報告。","level":1},{"word":"position","phon":"pə'zɪʃən","pos":"n.","meaning":"處境，位置，姿勢，職位","ex_en":"Whenever my wife and my mom have a fight, I am always put in a difficult position because I cannot side with either of them.","ex_zh":"每當我太太跟我媽媽吵架時，我總陷入困境，因為我不能偏袒她們任何一方。","level":1},{"word":"likely","phon":"'laɪkli","pos":"adj./adv.","meaning":"可能的（性）","ex_en":"Since we are short of manpower in the factory, it is very likely we will hire some people next month.","ex_zh":"因為工廠人力不足，我們很可能下個月會雇用一些人。","level":1},{"word":"perfect","phon":"ˈpɝfɪkt","pos":"adj./vt.","meaning":"完美的／使完美","ex_en":"She thinks Bob is perfect for a husband, who will take care of her and spend the rest of his life with her.","ex_zh":"她認為Bob是完美的老公人選，他會照顧她，並與她共度一生。","level":2},{"word":"military","phon":"'mɪlə.tɛri","pos":"n./adj.","meaning":"軍隊／軍事的","ex_en":"If wars break out, do you think the military of our country is powerful enough to protect us?","ex_zh":"如果戰爭爆發，你覺得我們國家的軍隊有強到能保護我們嗎？","level":2},{"word":"personal","phon":"ˈpɚsənl","pos":"adj.","meaning":"個人的，私人的","ex_en":"The mayor will not answer questions about his personal life; please focus on public affairs.","ex_zh":"市長不會回答有關他個人生活的問題；請聚焦在公共事務上。","level":2},{"word":"view","phon":"vju","pos":"n./vi./vt.","meaning":"景觀，看法，觀點／看，觀看","ex_en":"The view from the mountain top is wonderful. You can see our town clearly there.","ex_zh":"從山頂往下看的景觀很棒。你可以在上面很清楚地看到我們的城鎮。","level":2},{"word":"sense","phon":"sɛns","pos":"n./vt.","meaning":"感覺／感覺，察覺","ex_en":"It was getting dark, and I suddenly lost my sense of direction. I couldn't find my way back to the hotel.","ex_zh":"天快黑了，我突然失去了方向感，找不回到飯店的路。","level":2},{"word":"county","phon":"'kaʊnti","pos":"n.","meaning":"縣，郡","ex_en":"The Disneyland in Orange County, California, attracts lots of tourists every day.","ex_zh":"加州橙郡的迪士尼樂園每天都吸引著大量遊客。","level":2},{"word":"couple","phon":"ˈkʌpl","pos":"n.","meaning":"一對，夫婦，情侶","ex_en":"A young married couple just moved into the house next to me. I hope they are good neighbors.","ex_zh":"一對年輕夫婦剛搬進我旁邊的房子。我希望他們是好鄰居。","level":2},{"word":"private","phon":"'praɪvɪt","pos":"adj.","meaning":"私人的、私的","ex_en":"The pop singer never talks about her life in public; therefore, no one knows what she is like in private.","ex_zh":"這位流行歌手從不公開談論自己的生活。因此，沒人知道她私底下的樣子。","level":2},{"word":"industry","phon":"'ɪndəstri","pos":"n.","meaning":"工業，產業","ex_en":"Jessica moved to Los Angeles to work in the film industry, hoping that she would become famous in a few years.","ex_zh":"Jessica 搬到洛杉磯從事電影業，她希望能在幾年後成名。","level":2},{"word":"event","phon":"ɪˈvɛnt","pos":"n.","meaning":"事件，大事","ex_en":"The sports day is one of the biggest events in our school. All students look forward to it every year.","ex_zh":"運動會是我們學校最大的活動之一，所有學生每年都很期待。","level":2},{"word":"result","phon":"rɪˈzʌlt","pos":"n./vi.","meaning":"結果，成效／發生，產生","ex_en":"Doctors point out that the rise in lung cancers is a result of cigarette smoking and air pollution.","ex_zh":"醫生們指出肺癌案例的增加是抽菸以及空氣汙染的結果。","level":2},{"word":"gold","phon":"gold","pos":"n.","meaning":"黃金","ex_en":"The gold watch Larry is wearing is a present from his wife, and he likes it very much.","ex_zh":"Larry 戴的金錶是他妻子送的禮物，他非常喜歡。","level":2},{"word":"design","phon":"dɪˈzaɪn","pos":"vt./n.","meaning":"設計","ex_en":"My parents allow me to design my new bedroom. They say the style is up to me.","ex_zh":"我的父母允許我自行設計自己的新房間。他們說設計風格由我自己決定。","level":2},{"word":"society","phon":"sə'saɪəti","pos":"n.","meaning":"社會","ex_en":"We are lucky to enjoy a lot of freedom in today's society.","ex_zh":"我們很幸運在當今社會享有很多自由。","level":2},{"word":"role","phon":"rol","pos":"n.","meaning":"角色","ex_en":"Parents play an important role in a child's early life.","ex_zh":"父母在孩子早期的生活中扮演重要的角色。","level":2},{"word":"press","phon":"prɛs","pos":"vt./n.","meaning":"壓，按／新聞界","ex_en":"The secretary pressed the wrong key, and all the files on her computer were gone.","ex_zh":"這位秘書按錯了按鍵，結果電腦上所有的檔案都不見了。","level":2},{"word":"worth","phon":"wɝθ","pos":"adj./n.","meaning":"值得的／價值","ex_en":"Ms. Wang thinks this book is worth reading, so she will buy 40 copies and give them to her students for free.","ex_zh":"王老師認為這本書值得一讀，因此她將購買 40 本，免費贈予學生。","level":2},{"word":"average","phon":"ˈævərɪdʤ","pos":"adj.","meaning":"平均的，一般的","ex_en":"Typhoon Maggie brought to I-lan a huge amount of rainfall, much greater than the average rainfall of the season.","ex_zh":"瑪姬颱風為宜蘭帶來大量的雨，比該區當季的平均雨量還要多。","level":2},{"word":"medical","phon":"ˈmɛdɪkl","pos":"adj.","meaning":"醫學的，醫療的","ex_en":"Some African countries have very poor medical care and people there die of various diseases easily.","ex_zh":"一些非洲國家相當缺乏醫療照護，人們容易死於各種疾病。","level":2},{"word":"bill","phon":"bɪl","pos":"n.","meaning":"帳單，法案，議案","ex_en":"Vicky talked with her boyfriend on the phone every night. When she got the phone bill, she was shocked by the sum.","ex_zh":"Vicky 每晚都和男友講電話。當她收到電話帳單時，被金額嚇了一跳。","level":2},{"word":"value","phon":"ˈvælju","pos":"n./vt.","meaning":"價值／重視，珍視","ex_en":"This vase is 200 years old. It's of great value.","ex_zh":"這個花瓶已有200年歷史了，價值非凡。","level":2},{"word":"source","phon":"sors","pos":"n.","meaning":"來源","ex_en":"Why don't you eat more oranges or lemons? They are good sources of vitamin C.","ex_zh":"你為什麼不多吃柳橙或檸檬呢？它們富含維生素C。","level":2},{"word":"provide","phon":"prəˈvaɪd","pos":"vt.","meaning":"提供","ex_en":"This restaurant often provides free food for the needy, and their kind act has been reported by the media.","ex_zh":"這家餐廳經常提供免費食物給窮困的人，而他們的善行已被媒體報導。","level":2},{"word":"official","phon":"əˈfɪʃəl","pos":"adj./n.","meaning":"官方的，正式的／官員","ex_en":"I've heard that Sam will become our new manager, but the news is not yet official.","ex_zh":"我聽說Sam將成為我們的新經理，但該消息尚未正式發布。","level":2},{"word":"step","phon":"stɛp","pos":"n./vi.","meaning":"腳步，步驟／邁步，踩，踏","ex_en":"You need to tell your grandfather to watch his step when he gets off the train.","ex_zh":"當你的祖父下火車時，你需要告訴他留心腳步。","level":2},{"word":"match","phon":"mætʃ","pos":"vt./n.","meaning":"相配，比得過／配對，火柴，旗鼓相當的對手","ex_en":"Your coat matches your skirt. You do have very good taste.","ex_zh":"你的外套和裙子很相配。你的品味確實很好。","level":2},{"word":"model","phon":"'madl","pos":"n./vi./vt.","meaning":"模特兒，模範，模型／當模特兒，穿戴展示／展示，穿戴展示","ex_en":"Parents need to set a good example for their children as they are often their children's first role models.","ex_zh":"父母親需要為小孩立下良好的典範，因為他們通常是小孩的第一個榜樣。","level":2},{"word":"amount","phon":"ə'maʊnt","pos":"n./vi.","meaning":"數量／總計","ex_en":"If this movie becomes successful, the director will surely make a huge amount of money.","ex_zh":"如果這部電影成功的話，導演肯定能大賺一筆。","level":2},{"word":"range","phon":"rendʤ","pos":"n./vi.","meaning":"範圍，幅度，一系列","ex_en":"The patient's heart rate is not within a normal range of 60-90 beats per minute. It's way too fast!","ex_zh":"這位患者的心率不在每分鐘60到90下的正常範圍內。它跳太快了！","level":2},{"word":"trade","phon":"tred","pos":"n./vi./vt.","meaning":"貿易，買賣，交易／交換，做買賣","ex_en":"The trade in rare animals is not allowed because the rights of animals should be protected.","ex_zh":"稀有動物的交易是被禁止的，因為動物的權利應當受到保護。","level":2},{"word":"review","phon":"rɪ'vju","pos":"vi./vt./n.","meaning":"複習，複審，評論／複習，複審，評論","ex_en":"If you want to have better grades, you should review your lessons every day instead of cramming for an exam at the last minute.","ex_zh":"如果你想要獲得更好的成績，你應該每天複習功課，而不是在最後一刻臨時抱佛腳準備考試。","level":2},{"word":"central","phon":"'sɛntrəl","pos":"adj.","meaning":"中央的、中部的，重要的","ex_en":"Taichung lies in central Taiwan. It's a city with fine weather and delicious food.","ex_zh":"臺中位於臺灣中部，是一個天氣晴朗、食物美味的城市。","level":2},{"word":"forward","phon":"'fɔrwɚd","pos":"adv./vt.","meaning":"向前方，向前進的（的）／轉寄（電子郵件）","ex_en":"When skating, you need to keep your body a bit forward so as to keep balance.","ex_zh":"溜冰時，你需要將身體微向前以取得平衡。","level":2},{"word":"vote","phon":"vot","pos":"vi./vt.","meaning":"投票，表決","ex_en":"In most countries, people are allowed to vote and choose an ideal person for public office when they are over 18.","ex_zh":"在大部分的國家，超過十八歲的人民被允許前往票選出他們理想的公職人選。","level":2},{"word":"chief","phon":"tʃif","pos":"adj./n.","meaning":"首要的，最主要的／領導人，酋長，酋長（CEO 執行長）","ex_en":"The chief problem we are facing now is the lack of money. It is the first thing we need to deal with.","ex_zh":"我們現在面對的問題是金錢不足，這是我們必須先解決的。","level":2},{"word":"lower","phon":"'loɚ","pos":"vt./adj.","meaning":"降低，使減少／較低的，底層的","ex_en":"We kept asking the shop owner to lower the price, but he said that he had already given us the best offer.","ex_zh":"我們不停要求老闆再降低價格，但他說他已經給了我們最好的價錢了。","level":2},{"word":"style","phon":"staɪl","pos":"n.","meaning":"風格，作風","ex_en":"Mr. Chung is very strict with his students. That's his style.","ex_zh":"鍾老師對學生非常嚴格。那就是他的風格。","level":2},{"word":"natural","phon":"ˈnætʃərəl","pos":"adj.","meaning":"自然的，天然的／合乎常情的","ex_en":"The child is very interested in the natural world, so he likes to watch the Discovery channel.","ex_zh":"這孩子對自然界非常感興趣，因此他喜歡看探索頻道。","level":2},{"word":"quality","phon":"ˈkwɑləti","pos":"n.","meaning":"品質，特質","ex_en":"Products made in China are considered to be of poor quality. They are often much cheaper.","ex_zh":"中國製造的產品常被認為品質低劣。它們通常較為便宜。","level":2},{"word":"attention","phon":"ə'tɛnʃən","pos":"n.","meaning":"注意，注意力","ex_en":"Dr. Chu's speech on the new energy source attracted great attention from the audience at the conference.","ex_zh":"朱博士關於新能源的演講在會議上吸引了許多觀眾的注意。","level":2},{"word":"character","phon":"'kærəktɚ","pos":"n.","meaning":"性格，特徵，字，符號，（書或戲劇中的）角色","ex_en":"Being friendly and willing to help others is one of the nice characters shared by most Taiwanese people.","ex_zh":"友善且樂於助人是許多臺灣人都有的一項良好特質。","level":3},{"word":"blood","phon":"blʌd","pos":"n.","meaning":"血，血液","ex_en":"Sherry cut her finger by accident, and blood came out of the cut right away.","ex_zh":"Sherry不小心割傷手指，血馬上就從傷口中汩汩流出。","level":3},{"word":"china","phon":"'tʃaɪnə","pos":"n.","meaning":"瓷器","ex_en":"For the tea party, Mrs. Newton is going to get her best china out, including a set of her favorite cups.","ex_zh":"為了這個茶會，Newton 夫人將把自己最好的瓷器拿出來，包括一組她最愛的茶杯。","level":3},{"word":"stage","phon":"stedʤ","pos":"n.","meaning":"舞臺，階段","ex_en":"Greg doesn't like to speak in public. Whenever he is on stage, he becomes very nervous.","ex_zh":"Greg 不喜歡在大眾面前講話。每次上臺，他就會變得很緊張。","level":3},{"word":"entire","phon":"ɪn'taɪr","pos":"adj.","meaning":"全部的，整個的","ex_en":"Mom looked through the entire room, from the drawers to the closet, but still couldn't find her ring.","ex_zh":"媽媽把整個房間都找遍了，從抽屜到衣櫥，但還是找不到她的戒指。","level":3},{"word":"article","phon":"ˈɑrtɪkl","pos":"n.","meaning":"文章，一件（物品等）","ex_en":"When my first article was printed in the newspaper, my dad was so excited that he bought ten copies.","ex_zh":"當我的第一篇文章被刊登在報紙上時，我父親非常興奮，他買了十份報紙。","level":3},{"word":"technology","phon":"tɛkˈnɑlədʤi","pos":"n.","meaning":"科技","ex_en":"The fast development of technology has made people's life easier and more convenient.","ex_zh":"科技的快速發展使人們的生活簡單且更便利。","level":3},{"word":"sign","phon":"saɪn","pos":"n./vt.","meaning":"告示，標誌，象徵／簽名，簽署","ex_en":"In Taiwan, some high school uniforms are signs of excellence and honor.","ex_zh":"在臺灣，某些高中的制服是優秀及榮譽的象徵。","level":3},{"word":"legal","phon":"ˈligl","pos":"adj.","meaning":"合法的，法律的","ex_en":"Owning a gun in some states of America is legal, but it will not be allowed by law in Taiwan.","ex_zh":"在美國某些州持有槍械是合法的，但在臺灣將違反不被法律允許。","level":3},{"word":"simply","phon":"ˈsɪmpli","pos":"adv.","meaning":"僅僅，只要，簡單地","ex_en":"If you wish to know more about the event, simply call the number, and there will be someone giving you more information.","ex_zh":"如果你想更了解這個活動，只要撥打這個號碼，就會有人提供你更多資訊。","level":3},{"word":"continue","phon":"kənˈtɪnju","pos":"vi./vt.","meaning":"繼續，持續","ex_en":"The teacher wanted us to take a break for thirty minutes and continue our practice later.","ex_zh":"老師要我們休息三十分鐘，之後再繼續練習。","level":3},{"word":"increase","phon":"ɪnˈkris","pos":"vi./vt./n.","meaning":"增加","ex_en":"With the population increasing day by day, more and more space is needed for public activities.","ex_zh":"隨著人口逐漸增多，公共活動需要愈來愈多的空間。","level":3},{"word":"loss","phon":"lɔs","pos":"n.","meaning":"失去，喪失，損失","ex_en":"If you don't hold on to this chance, it'll be your greatest loss. You will feel sorry later.","ex_zh":"如果你不把握這個機會，那將會是你巨大的損失。你之後必會後悔。","level":3},{"word":"career","phon":"kə'rɪr","pos":"n.","meaning":"事業，職涯","ex_en":"Mary started her career as a high school teacher as soon as she graduated from college, and is still in love with her job at this moment.","ex_zh":"Mary 大學畢業後就開始了高中老師的職涯，此刻她仍然很喜愛這份工作。","level":3},{"word":"figure","phon":"'fɪgjɚ","pos":"n./vi.","meaning":"數據，數字，身材，人物／想，認為","ex_en":"When the manager saw the sales figures, he was shocked to find that the numbers had dropped sharply.","ex_zh":"當經理看到銷售數字時，他很驚訝地發現銷售數字急遽下滑。","level":3},{"word":"success","phon":"səkˈsɛs","pos":"n.","meaning":"成功，成功的事物","ex_en":"Success never comes easy. You need to work very hard for it and sometimes also need a little luck.","ex_zh":"成功從來就不是件容易的事。你需要努力，有時還需要點運氣。","level":3},{"word":"base","phon":"bes","pos":"vt./n.","meaning":"根據，基於／底部、基地（棒球運動的）壘","ex_en":"The writer said that her novel was based on her own life story.","ex_zh":"這位作家說的小說是根據她自己的人生故事撰寫的。","level":3},{"word":"offer","phon":"ˈɔfɚ","pos":"vt./n.","meaning":"提供，給予／供應，供給","ex_en":"This trip to the museum offers us a great chance to see what people's lives were like one thousand years ago.","ex_zh":"這趟博物館之旅提供我們一個大好機會一窺一千年前人們的生活樣貌。","level":3},{"word":"truth","phon":"truθ","pos":"n.","meaning":"真相，真理","ex_en":"No one tells Grandpa the truth. He still doesn't know the house has been sold.","ex_zh":"沒有人告訴爺爺真相。他仍不知道自己的房子已經給賣掉了。","level":3},{"word":"recent","phon":"'risnt","pos":"adj.","meaning":"最近的，近來的","ex_en":"The issue of environmental protection has not received much attention until recent years.","ex_zh":"環保議題直到近年來才獲得許多關注。","level":3},{"word":"pain","phon":"pen","pos":"n.","meaning":"痛苦","ex_en":"When John fell off the tree, he hurt his right foot. Three days later, he was still in pain.","ex_zh":"John從樹上掉下來時傷了右腳。三天後，他仍感覺疼痛。","level":3},{"word":"growth","phon":"groθ","pos":"n.","meaning":"成長，生長","ex_en":"As more and more people like drinking coffee, there has been a fast growth of coffee shops in Taiwan.","ex_zh":"隨著愈來愈多的人喜歡喝咖啡，臺灣的咖啡店迅速發展。","level":3},{"word":"culture","phon":"'kʌltʃɚ","pos":"n.","meaning":"文化","ex_en":"It's impossible to learn a language without understanding its culture.","ex_zh":"在不了解一個地方的文化之下，學習其語言是不可能的。","level":3},{"word":"respect","phon":"rɪ'spɛkt","pos":"vt./n.","meaning":"尊重，尊敬，重視／尊重，尊敬，方面","ex_en":"My grandparents told me that the secret to their happy marriage is that they always trust and respect each other.","ex_zh":"我祖父母告訴我他們婚姻幸福的秘訣是他們始終信任並尊重彼此。","level":3},{"word":"standard","phon":"'stændɚd","pos":"n./adj.","meaning":"標準／標準的，通常的","ex_en":"Living standards in distant villages in the mountains are not good, so young people have to move to cities to find jobs.","ex_zh":"山區偏遠村莊的生活水準不佳，因此年輕人不得不搬到城市找工作。","level":3},{"word":"album","phon":"ˈælbəm","pos":"n.","meaning":"專輯，相本","ex_en":"In her latest album, the singer redid many famous songs in her own style.","ex_zh":"在她最新的專輯中，這位歌手以她自己的風格重新演繹了許多名曲。","level":3},{"word":"peace","phon":"pis","pos":"n.","meaning":"平靜，安寧，和平","ex_en":"After living in the city for years, Mary has decided to move to the countryside for some peace and quiet.","ex_zh":"在城市住了多年之後，Mary 決定搬到鄉下享受平靜安寧。","level":3},{"word":"track","phon":"træk","pos":"n./vi./vt.","meaning":"軌道，小徑，（田徑等）賽道／蹤跡","ex_en":"It's dangerous for people to walk on train tracks as trains may come at any second.","ex_zh":"人們在鐵軌上行走是危險的，因為火車隨時可能駛進。","level":3},{"word":"charge","phon":"tʃardʤ","pos":"vi./vt./n.","meaning":"收費／（警方）指控／充電／收費，指控","ex_en":"This all-you-can-eat restaurant makes it clear that it will charge an extra fee for any unfinished plate.","ex_zh":"這家吃到飽餐廳清楚表明會對任何沒吃完的菜餚加收費用。","level":3},{"word":"create","phon":"kri'et","pos":"vt.","meaning":"創造，創作","ex_en":"The shoe company will design and create a kind of shoes that would \"grow\" with people's feet.","ex_zh":"這家製鞋公司即將設計並創造出一種會隨著人們的腳「長大」的鞋款。","level":3},{"word":"effect","phon":"ɪ'fɛkt","pos":"n.","meaning":"效果，影響","ex_en":"The failure has had a big effect on Irene. She thinks she will never dance on the stage again.","ex_zh":"這次失敗對 Irene 產生了重大影響。她認為自己再也不會在舞臺上跳舞了。","level":3},{"word":"century","phon":"ˈsɛntʃʊri","pos":"n.","meaning":"世紀，一百年","ex_en":"Computers have been around for more than half a century, and they make humans' life more convenient.","ex_zh":"電腦已經存在超過半個世紀了，它們讓人們的生活更便利。","level":3},{"word":"network","phon":"'nɛt.wɝk","pos":"n./vt.","meaning":"網狀組織，網路／（使）連結，建立網路","ex_en":"The United States has a large network of highways, and a lot of people enjoy using them to make road trips.","ex_zh":"美國有很大的公路網，許多人喜歡使用它們來公路旅行。","level":3},{"word":"beat","phon":"bit","pos":"vt./vi.","meaning":"打，打敗，攪拌","ex_en":"The mother next door beats her kids very often, and we can hear them crying loudly.","ex_zh":"隔壁的媽媽常打小孩，我們都能聽到他們大聲哭叫。","level":3},{"word":"expect","phon":"ɪkˈspɛkt","pos":"vt.","meaning":"預期，期待","ex_en":"Helen didn't expect to get presents from us on her birthday, so she was very surprised.","ex_zh":"Helen並沒有預期會在生日時收到我們的禮物，因此她非常驚喜。","level":3},{"word":"normal","phon":"'nɔrml","pos":"adj.","meaning":"正常的","ex_en":"As a famous movie star, it's impossible for Angie to lead a normal life.","ex_zh":"身為知名電影明星，Angie 要過著正常的生活是不可能的。","level":3},{"word":"capital","phon":"'kæpɪtl","pos":"adj./n.","meaning":"致死的，大寫的／資金","ex_en":"Lots of people mistake Zurich for the capital of Switzerland, but in fact, it's Bern.","ex_zh":"許多人誤以為蘇黎世是瑞士首都，但實際上首都是伯恩。","level":3},{"word":"addition","phon":"ə'dɪʃən","pos":"n.","meaning":"添加","ex_en":"The new secretary, Terry, is a useful addition to the team in this office.","ex_zh":"新任秘書 Terry 的加入有助於該辦公室團隊的工作。","level":3},{"word":"difference","phon":"ˈdɪfərəns","pos":"n.","meaning":"不同，差別","ex_en":"After watching the Superhero movies, Natt wishes to do something to help make a difference in the world.","ex_zh":"看了超級英雄電影之後，Natt希望自己也能做些事情來為這個世界帶來改變。","level":3},{"word":"population","phon":".papjə'leʃən","pos":"n.","meaning":"人口、某物種數量","ex_en":"The population of Taiwan is over 23 million. That is, there are more than 23 million people living in Taiwan.","ex_zh":"臺灣人口超過 2,300 萬。也就是說，有超過 2,300 萬人住在臺灣。","level":3},{"word":"sort","phon":"sɔrt","pos":"n./vi./vt.","meaning":"類別，種類／分類，整理，揀選","ex_en":"We have all sorts of films available here, including horror movies, comedies and romances.","ex_zh":"我們這裡提供各種類型的電影，包含恐怖片、喜劇片和浪漫愛情片。","level":4},{"word":"focus","phon":"ˈfokəs","pos":"n./vi./vt.","meaning":"焦點／聚焦於，專注在...之上","ex_en":"Don likes to be the focus of attention and always does strange things to get others to notice him.","ex_zh":"Don喜歡成為眾人的焦點，並且總是做一些奇怪的事情來吸引人注意。","level":4},{"word":"speed","phon":"spid","pos":"n./vi.","meaning":"速度／疾駛，奔馳","ex_en":"Puyuma Express can travel at a very high speed, so it takes less than 2 hours to go from Taipei to Hualien.","ex_zh":"普悠瑪號可以高速行駛，所以從臺北到花蓮不超過2小時。","level":4},{"word":"region","phon":"'ridʤən","pos":"n.","meaning":"區域，地區","ex_en":"Be careful when you hike on this mountain! There are lots of snakes in this region.","ex_zh":"在這座山健行要小心！這個地區有很多蛇。","level":4},{"word":"message","phon":"'mɛsɪdʤ","pos":"n.","meaning":"訊息，信息","ex_en":"I will be in a meeting in an hour and won't be able to answer phone calls, so let's talk through text messages then.","ex_zh":"我一小時後要開會，不能講電話，所以我們到時候用簡訊交談吧。","level":4},{"word":"section","phon":"'sɛkʃən","pos":"n.","meaning":"部分，區域，段","ex_en":"This is the busiest section of the city. The traffic here is always jam-packed during the day.","ex_zh":"這裡是城市最繁忙的區段。白天時候交通總是擁擠不堪。","level":4},{"word":"individual","phon":".ɪndə'vɪdʤuəl","pos":"n./adj.","meaning":"個人，個體／個別的，各自的","ex_en":"Every individual in the society should do his / her part to help make our country a better place.","ex_zh":"社會上的每個人都應盡自己的本分，共同讓我們國家變的更好。","level":4},{"word":"particular","phon":"pɚˈtɪkjəlɚ","pos":"adj.","meaning":"特別的，挑剔的","ex_en":"For no particular reason, I just love to watch the sunset.","ex_zh":"沒什麼特殊原因，我就是喜歡看日落。","level":4},{"word":"fair","phon":"fɛr","pos":"adj.","meaning":"公平的，合理的，漂亮的","ex_en":"Honestly, it is hard for teachers to be fair with every student. There will always be some favorite students.","ex_zh":"老實說，老師很公平對待每位學生是很困難的。總會有一些特別受老師喜愛的學生。","level":4},{"word":"tour","phon":"tʊr","pos":"n./vi./vt.","meaning":"旅遊／旅遊","ex_en":"My family had a wonderful tour while visiting Rome.","ex_zh":"我們全家在造訪羅馬時享受了愉快的旅程。","level":4},{"word":"contact","phon":"'kantækt","pos":"n./vt.","meaning":"接觸，聯絡，聯絡人／搜觸，聯絡","ex_en":"It is essential for us to maintain constant contact with our friends to ensure that we have someone to talk to in times of need.","ex_zh":"對於我們而言，與朋友保持聯繫很重要，這樣遇到困難時，才能得到朋友的幫忙。","level":4},{"word":"consider","phon":"kənˈsɪdɚ","pos":"vt.","meaning":"考慮，認為","ex_en":"Jim is considering buying a car, but his parents think a car is not a must in Taipei.","ex_zh":"Jim正在考慮買車，但他的父母認為汽車在臺北非必需品。","level":4},{"word":"positive","phon":"ˈpɑzɪtɪv","pos":"adj.","meaning":"正面的，積極的／肯定的","ex_en":"Having a positive image is important to Nancy. That's why she doesn't want others to know that she smokes.","ex_zh":"擁有良好的形象對Nancy來說很重要。這就是為什麼她不希望別人知道她吸菸。","level":4},{"word":"throughout","phon":"θru'aʊt","pos":"adv./prep.","meaning":"在各處，從頭到尾","ex_en":"English is spoken throughout the world and is the most widely-used language in the business world.","ex_zh":"世界各地的人們都說英文，且它是商業世界裡被廣泛使用的語言。","level":4},{"word":"extra","phon":"ˈɛkstrə","pos":"adj.","meaning":"額外的，多餘的","ex_en":"They were behind schedule and needed extra manpower to finish their project in time.","ex_zh":"他們進度落後，需要額外的人力幫助他們及時完成計畫。","level":4},{"word":"scene","phon":"sin","pos":"n.","meaning":"景色，場景，（意外等）現場","ex_en":"The director wants to shoot the scene once again, so we have to start over.","ex_zh":"導演想重新拍攝那一幕場景，所以我們必須重新開始。","level":4},{"word":"income","phon":"ˈɪnkʌm","pos":"n.","meaning":"收入","ex_en":"With such a low income, James finds it impossible to buy a house in Taipei.","ex_zh":"在低收入的狀況下，James認為要在臺北買房是不可能的。","level":4},{"word":"safety","phon":"ˈseftɪ","pos":"n.","meaning":"安全","ex_en":"For your own safety, please follow all traffic rules when you are driving.","ex_zh":"為了你自己的安全，請在開車時遵守所有交通規則。","level":4},{"word":"justice","phon":"'dʤʌstɪs","pos":"n.","meaning":"正義，公正，司法制度","ex_en":"If people can do whatever they want to cause others pain, there won't be justice in the world.","ex_zh":"如果人們可以為所欲為去傷害別人，那世界上就無正義可言。","level":4},{"word":"coach","phon":"kotʃ","pos":"n./vt.","meaning":"教練，長途公車【英式】／訓練，輔導","ex_en":"In the first lesson, my tennis coach taught me how to serve and hit the ball.","ex_zh":"我的網球教練在第一堂課教我如何發球和擊球。","level":4},{"word":"search","phon":"sɝtʃ","pos":"n./vt./vi.","meaning":"搜索，搜尋，搜查","ex_en":"Not knowing what to have for dinner, Ian did a search for nice restaurants in downtown Hsinchu.","ex_zh":"不知道晚餐要吃什麼，Ian搜尋了一下新竹市中心的好餐廳。","level":4},{"word":"subject","phon":"ˈsʌbdʤɪkt","pos":"n.","meaning":"科目，話題，主詞／受試者","ex_en":"Of all the school subjects, math has always been the biggest trouble to Denny.","ex_zh":"所有學校的科目中，數學一直都是Denny最大的困擾。","level":4},{"word":"fit","phon":"fɪt","pos":"vi./vt./adj.","meaning":"適合，符合，勝任／適合、合身，健壯的、合適的","ex_en":"The new employee finds it hard to fit in and get along with others in the office, so he wants to quit the job.","ex_zh":"那位新員工發現要融入辦公室並和其他人相處困難，所以他想要離職。","level":4},{"word":"fear","phon":"fɪr","pos":"n./vt.","meaning":"恐懼，害怕／懼怕","ex_en":"In the movie, when ghosts show up, all the characters usually stand where they are in fear.","ex_zh":"在電影中，當鬼魅出現時，所有角色通常都會害怕地站在原地。","level":4},{"word":"unit","phon":"'junɪt","pos":"n.","meaning":"單位，單元","ex_en":"There are 18 units in the book. We will read one each week, so that you can learn step by step.","ex_zh":"這本書中有18個單元。我們每週都會閱讀一個單元，如此我們可以循序漸進地學習。","level":4},{"word":"claim","phon":"klem","pos":"vt.","meaning":"宣稱，主張，聲稱領有","ex_en":"The company claims that the materials they use are of good quality.","ex_zh":"該公司聲稱他們使用的材料品質極佳。","level":4},{"word":"judge","phon":"dʤʌdʤ","pos":"n./vt.","meaning":"裁判，評審，法官／判斷，評估","ex_en":"Patty sang very well in the talent show, and all the judges gave her a very high score.","ex_zh":"Patty在才藝競賽中唱得非常好，所有評審都給她高分。","level":4},{"word":"author","phon":"ˈɔθɚ","pos":"n.","meaning":"作者","ex_en":"Kevin Kwan is the author of Crazy Rich Asians, which is about the stories of his grandfather's family in Singapore.","ex_zh":"Kevin Kwan是《瘋狂亞洲富豪》的作者。這小說是根據他祖父在新加坡的家族故事寫成的。","level":4},{"word":"regular","phon":"'rɛgjəlɚ","pos":"adj.","meaning":"規律的，定期的，固定的","ex_en":"Keeping regular hours can help us stay healthy and keep us in a good mood.","ex_zh":"作息正常可以幫助我們維持健康並保持良好的心情。","level":4},{"word":"material","phon":"məˈtɪrɪəl","pos":"n.","meaning":"材料，原料，素材","ex_en":"Houses become more and more expensive as the price of building materials have gone up these days.","ex_zh":"因為最近建築材料價格的上漲，房屋變得愈來愈貴。","level":4},{"word":"secretary","phon":"ˈsɛkrəˌtɛri","pos":"n.","meaning":"祕書","ex_en":"The boss is too busy, so he wants a secretary to help him deal with some office work.","ex_zh":"老闆太忙了，所以他想要一位祕書幫他處理辦公室事務。","level":4},{"word":"opportunity","phon":".apɚ'tjunəti","pos":"n.","meaning":"（期待中的）機會","ex_en":"I got a job offer in Paris, and my father encouraged me to take this opportunity and become a great designer.","ex_zh":"我得到一份巴黎的工作，父親鼓勵我把握此機會成為偉大的設計師。","level":4},{"word":"brain","phon":"bren","pos":"n.","meaning":"頭腦，大腦","ex_en":"Come on! Use your brain! This math question is easy, you should be able to solve it.","ex_zh":"來吧！動動你的腦！這道數學問題很簡單，你應該能夠解出來。","level":4},{"word":"image","phon":"ˈɪmɪdʤ","pos":"n.","meaning":"形象，影像","ex_en":"For young women who suffer from an eating disorder, body image is often what they care about the most.","ex_zh":"對於患有飲食障礙的年輕女性而言，身體形象通常是她們最關切的事情。","level":4},{"word":"battle","phon":"'bætl","pos":"n./vi.","meaning":"戰役，戰鬥／對抗，打鬥","ex_en":"Leo's grandpa lost his battle against lung cancer and passed away several weeks ago.","ex_zh":"Leo 的祖父對抗肺癌失敗後，於數週前去世了。","level":4},{"word":"degree","phon":"dɪ'gri","pos":"n.","meaning":"程度，學位，度數","ex_en":"The disease is out of control to such a terrible degree that more than one hundred people die of it every day.","ex_zh":"這個疾病已失控到一個可怕的程度，每天有超過一百人因此病死。","level":4},{"word":"opinion","phon":"əˈpɪnjən","pos":"n.","meaning":"意見","ex_en":"Helen's doctor wanted her to have a heart surgery. But she decided to ask for a second opinion from another doctor.","ex_zh":"Helen的醫生要她動心臟手術，但她決定要諮詢另一位醫生的第二意見。","level":4},{"word":"contract","phon":"'kantrækt","pos":"n./vi./vt.","meaning":"合約，契約／簽署契約／收縮，感染（罹患）疾病","ex_en":"After you read the contract and agree with the terms and conditions on it, you may sign your name below.","ex_zh":"在你閱讀完合約且同意上面的條款及項目之後，你就可以在下方簽名了。","level":4},{"word":"active","phon":"ˈæktɪv","pos":"adj.","meaning":"活躍的，主動的","ex_en":"It's hard to believe that Judy, the shy girl in senior high, becomes active and makes many friends after going to college.","ex_zh":"很難想像高中時期害羞的Judy在上了大學以後變得活潑且交了許多朋友。","level":4},{"word":"cancer","phon":"'kænsɚ","pos":"n.","meaning":"癌症","ex_en":"Brain cancer used to be considered deadly, but nowadays, a lot of treatments can successfully fight the disease.","ex_zh":"腦癌過去被視為是致命的，但現在有許多治療法可以成功地抵抗那個疾病。","level":4},{"word":"master","phon":"'mæstɚ","pos":"n./vt.","meaning":"主人，大師／精通，熟練","ex_en":"All the people working for the master have to follow the order and do as they are told.","ex_zh":"所有為主人工作的人都需要遵從他的指令並照他的話做。","level":5},{"word":"wonder","phon":"ˈwʌndɚ","pos":"vi./vt./n.","meaning":"想知道／驚嘆，奇蹟","ex_en":"I wonder why Kevin always leaves the meeting early.","ex_zh":"我不知道為什麼Kevin總是提前離開會議。","level":5},{"word":"approach","phon":"ə'protʃ","pos":"vi./vt./n.","meaning":"接近／方法，接近","ex_en":"Many students find it hard to focus on their studies when holidays are approaching.","ex_zh":"許多學生發現假期接近時，很難專注在課業上。","level":5},{"word":"cash","phon":"kæʃ","pos":"n./vt.","meaning":"現金，現款／（支票等）兌現","ex_en":"Customers may choose to pay cash or use a credit card in major department stores.","ex_zh":"在大型百貨公司裡，顧客可以選擇支付現金或使用信用卡。","level":5},{"word":"lack","phon":"læk","pos":"vt./n.","meaning":"缺乏","ex_en":"Many Taiwanese students do not like to express their opinions in public because they lack confidence.","ex_zh":"許多臺灣學生在公開場合不喜歡表達意見，因為他們缺乏自信。","level":5},{"word":"effort","phon":"ˈɛfət","pos":"n.","meaning":"努力","ex_en":"The employees put a lot of effort into the project. They worked very hard.","ex_zh":"員工們對於這份計畫投入許多努力。他們非常認真。","level":5},{"word":"imagine","phon":"ɪˈmædʤɪn","pos":"vt.","meaning":"想像","ex_en":"Can you imagine living in the 19th century? I'd be bored to death because there were no TV and Internet back then.","ex_zh":"你能想像生活在19世紀嗎？因為當時沒有電視和網路，我肯定會無聊得要死。","level":5},{"word":"protect","phon":"prə'tɛkt","pos":"vt.","meaning":"保護","ex_en":"When in danger, most parents will do what they can to protect their children from getting hurt.","ex_zh":"有危險時，大多數父母會盡其所能保護孩子免受傷害。","level":5},{"word":"commercial","phon":"kə'mɝʃəl","pos":"adj./n.","meaning":"商業的／電視廣告","ex_en":"Most businessmen are more interested in the commercial success of their products than their educational values.","ex_zh":"大部分的商人都對產品的商業成功比較有興趣，勝過它們的教育價值。","level":5},{"word":"luck","phon":"lʌk","pos":"n.","meaning":"運氣，幸運","ex_en":"The young girl moved to Hollywood from a small town to try her luck, hoping to become a superstar someday.","ex_zh":"這位年輕的女孩從一個小鎮搬到好萊塢碰運氣，希望有朝一日能成為超級巨星。","level":5},{"word":"grand","phon":"grænd","pos":"adj.","meaning":"重大的，雄偉的","ex_en":"Burj Khalifa is a grand building in Dubai; it's the world's tallest building.","ex_zh":"哈里發塔是杜拜的宏偉建築；它是世界上最高的建築物。","level":5},{"word":"direct","phon":"də'rɛkt","pos":"adj./vt.","meaning":"直接的，直達的，直白的／引導、指導、管理","ex_en":"The manager decided to take direct control of this project and allow no one to have a say.","ex_zh":"經理決定直接掌管這個計畫，並且不容任何人置喙。","level":5},{"word":"address","phon":"ə'drɛs","pos":"n./vt.","meaning":"地址／向…發表演說，對…說話，處理（問題等）","ex_en":"The address on the envelope was not written clearly, so the postman didn't know where to deliver it.","ex_zh":"信封上的地址寫得不清楚，因此郵差不知道把它送到哪裡。","level":5},{"word":"necessary","phon":"'nɛsə.sɛri","pos":"adj.","meaning":"必需的","ex_en":"Water, sunlight and air are necessary for plants to grow. Without any of them, plants would die.","ex_zh":"水、陽光及空氣對於植物的成長來說都是必需的。缺乏任何其中一項，植物就會死亡。","level":5},{"word":"doubt","phon":"daʊt","pos":"n./vt.","meaning":"懷疑","ex_en":"Even though Max says that he will be on time, I still have doubts about his words because he oversleeps quite often.","ex_zh":"雖然Max承諾他會準時，但我仍對他的話有所懷疑，因為他經常睡過頭。","level":5},{"word":"damage","phon":"ˈdæmɪdʤ","pos":"n./vt.","meaning":"損害／損害，損壞","ex_en":"The typhoon caused great damage to many houses in the village. A lot of people became homeless.","ex_zh":"颱風對村莊裡很多房屋造成了嚴重破壞。許多人無家可歸。","level":5},{"word":"disease","phon":"dɪˈziz","pos":"n.","meaning":"疾病","ex_en":"Dirty water can cause lots of diseases, and some of them could even kill us.","ex_zh":"髒汙的水質會造成許多疾病，某些甚至會使我們喪命。","level":5},{"word":"male","phon":"mel","pos":"n./adj.","meaning":"男性／男性的","ex_en":"When I called my girlfriend last night, a strange male answered her phone, and I wondered who that guy was.","ex_zh":"我昨晚打電話給女友，一位陌生男人接了電話。我很好奇那個男的到底是誰。","level":5},{"word":"spot","phon":"spat","pos":"n./vt.","meaning":"斑點，地點／看見","ex_en":"This is the spot where I found this poor puppy. I waited here for a long time, but no one returned to claim him.","ex_zh":"這是我發現這隻可憐小狗的地方。我等了很久，但沒有人前來領走牠。","level":5},{"word":"crime","phon":"kraɪm","pos":"n.","meaning":"罪，罪行","ex_en":"Whoever commits a crime has to face the music and take the responsibility for what he / she has done.","ex_zh":"任何犯罪的人都要面對犯罪後自己的責任。","level":5},{"word":"highly","phon":"ˈhaɪli","pos":"adv.","meaning":"非常地，極其地","ex_en":"Doctors and lawyers are highly paid, and that's why many people try to become doctors or lawyers to make more money.","ex_zh":"醫生和律師都是高薪的工作，而那正是為什麼許多人努力成為醫生和律師來賺更多的錢。","level":5},{"word":"captain","phon":"'kæptɪn","pos":"n.","meaning":"隊長，船長，機長，上尉","ex_en":"Sam is the captain of the basketball team; he is not only skillful but also good at leading the team.","ex_zh":"Sam 是籃球隊的隊長，他不僅技術嫻熟，而且具備領導隊伍。","level":5},{"word":"reality","phon":"ri'æləti","pos":"n.","meaning":"現實，真實","ex_en":"As technology continues to develop, a flying car may become a reality in the next century.","ex_zh":"隨著科技不斷發展，飛行汽車可能在下一世紀成為現實。","level":5},{"word":"advice","phon":"əd'vaɪs","pos":"n.","meaning":"建議","ex_en":"Mrs. Larry is a mother of five, so she often gives people advice on childcare.","ex_zh":"Larry 女士是五個孩子的媽，因此她常給人們有關育兒的建議。","level":5},{"word":"nation","phon":"ˈneʃən","pos":"n.","meaning":"國家","ex_en":"The news that some meat is not safe to eat has shocked the whole nation.","ex_zh":"某些肉品不安全的消息震驚了整個國家。","level":5},{"word":"primary","phon":"'praɪ.mɛri","pos":"adj.","meaning":"主要的，初級的，最初的","ex_en":"Many people living in this village grow and sell potatoes as their primary source of income.","ex_zh":"許多居住在這個村落裡的村民種植和販售馬鈴薯為主要收入來源。","level":5},{"word":"purpose","phon":"'pɝpəs","pos":"n.","meaning":"目的，意圖","ex_en":"Vicky said something strange to us yesterday, and none of us knew what her real purpose was.","ex_zh":"Vicky 昨天對我們說了奇怪的事情，我們沒人知道她的真正究竟是什麼。","level":5},{"word":"challenge","phon":"'tʃælɪndʒ","pos":"n./vt.","meaning":"挑戰","ex_en":"Tom got the job because he showed how much he would like to take on new challenges in the interview.","ex_zh":"因為 Tom 在面試時表現出他多麼想接受新挑戰的樣子，因此他得到了這份工作。","level":5},{"word":"responsible","phon":"rɪ'spansəbl","pos":"adj.","meaning":"負責的","ex_en":"Airplane pilots are responsible for the safety of hundreds of people on board.","ex_zh":"飛機駕駛需要對機上數百名乘客的安全負責。","level":5},{"word":"drug","phon":"drʌg","pos":"n.","meaning":"藥物，毒品","ex_en":"As I had a terrible headache this morning and was in a hurry to go to a meeting, I could only take some pain-killing drugs.","ex_zh":"因為我今早嚴重頭痛且趕著去參加會議，我只能吃點止痛藥。","level":5},{"word":"hall","phon":"hɔl","pos":"n.","meaning":"大廳，禮堂，走廊","ex_en":"The couple will get married in the City Hall because they don't want to spend a lot of money on their wedding.","ex_zh":"這對新人將在市政廳結婚，因為他們不想花大錢在婚禮上。","level":5},{"word":"mass","phon":"mæs","pos":"n./adj.","meaning":"大量，團，塊，質量／大規模的，大的","ex_en":"Because of global warming, a mass of iceberg in the Atlantic Ocean is now melting.","ex_zh":"因為全球暖化的緣故，大西洋上大量的冰山正在融化中。","level":5},{"word":"avoid","phon":"əˈvɔɪd","pos":"vt.","meaning":"避免","ex_en":"The dog can bite you at any minute, so you should avoid standing too close to it.","ex_zh":"那隻狗隨時都可能咬你一口，所以你應該避免離牠太近。","level":5},{"word":"trial","phon":"'traɪəl","pos":"n.","meaning":"試用，試驗，審判","ex_en":"Before you are officially employed, there is a three-month trial period, in which we will see whether you are suitable for the job.","ex_zh":"在你被正式僱用之前，會有三個月的試用期，我們會看你是否適合這份工作。","level":5},{"word":"meaning","phon":"'minɪŋ","pos":"n./adj.","meaning":"意義／忠實的","ex_en":"If you don't know the meaning of the word, look it up in the dictionary.","ex_zh":"如果你不知道這個字的意思，請查字典。","level":5},{"word":"environment","phon":"ɪn'vaɪrənmənt","pos":"n.","meaning":"環境","ex_en":"Some parents choose to live near schools in order to give their children a better learning environment.","ex_zh":"有些父母選擇住在學區，為的是要給孩子更好的學習環境。","level":5},{"word":"flight","phon":"flaɪt","pos":"n.","meaning":"航班","ex_en":"All the flights were delayed because of the typhoon. People had no choice but to wait in the airport.","ex_zh":"所有的航班都因颱風而延誤了。人們不得已只好在機場等待。","level":5},{"word":"murder","phon":"'mɝdɚ","pos":"vt./n.","meaning":"謀殺／謀殺案","ex_en":"It is reported that the famous actress has been murdered, but no one knows the identity of the killer.","ex_zh":"據報導那位知名女演員已被謀殺，但沒人知道凶手的身分。","level":5},{"word":"complex","phon":"kəm'plɛks","pos":"adj./n.","meaning":"複雜的／情結、心理負擔、複合式建築","ex_en":"The human brain is a very complex system. So far, we haven't completely figured out how it functions.","ex_zh":"人腦是一個非常複雜的系統。到目前為止，我們還沒有完全弄清它是如何運作的。","level":5},{"word":"freedom","phon":"'fridəm","pos":"n.","meaning":"自由","ex_en":"This is a free country; people enjoy the freedom to say and do what they want.","ex_zh":"這是一個自由國家；人們享有發言和做自己想做的事的自由。","level":5},{"word":"location","phon":"lo'keʃən","pos":"n.","meaning":"位置，地點","ex_en":"The new stadium was built at a convenient location, close to an MRT station and within walking distance to a popular shopping center.","ex_zh":"新體育場建在便利的位置，靠近捷運站、步行就可到達受歡迎的購物中心。","level":6},{"word":"condition","phon":"kən'dɪʃən","pos":"n.","meaning":"狀況，健康狀態，情況，條件","ex_en":"You are having a fever. Don't go to school in that condition.","ex_zh":"你正在發燒。不要以這樣的狀態去上學。","level":6},{"word":"royal","phon":"'rɔɪəl","pos":"adj./n.","meaning":"王室的，皇家的／皇室成員（常用複數）","ex_en":"The British royal family have been the center of attention around the world.","ex_zh":"英國王室一直是全球矚目的焦點。","level":6},{"word":"serve","phon":"sɝv","pos":"vi./vt.","meaning":"提供（飲食），招待，服務","ex_en":"The restaurant makes it clear that they will not serve any customer who shouts at their waiters or waitresses.","ex_zh":"這家餐廳清楚地表明他們將不會服務任何對他們服務生大叫大吼的客人。","level":6},{"word":"accept","phon":"əkˈsɛpt","pos":"vt.","meaning":"接受","ex_en":"I applied to only one university, but if I don't get accepted, I won't go to college.","ex_zh":"我只申請一間大學，如果我沒被錄取，我就不念大學了。","level":6},{"word":"actual","phon":"ˈæktʃʊəl","pos":"adj.","meaning":"實際的，確切的","ex_en":"There will be at least one thousand people taking part in the activity, but the actual number is still unknown.","ex_zh":"至少會有一千人參加這項活動，但實際的數字還未知。","level":6},{"word":"screen","phon":"skrin","pos":"n./vt.","meaning":"螢幕／篩選、篩檢","ex_en":"Sitting in front of the computer and staring at the screen for hours, I felt my eyes dry and sore.","ex_zh":"坐在電腦前、盯著螢幕好幾小時後，我覺得眼睛乾乾又痛。","level":6},{"word":"speech","phon":"spitʃ","pos":"n.","meaning":"演說，說話","ex_en":"Cindy has to give a speech in class, so she needs to practice speaking many times in front of the mirror.","ex_zh":"Cindy 必須在課堂上演講，因此她需要在鏡子前多練習講稿幾次。","level":6},{"word":"attempt","phon":"ə'tɛmpt","pos":"vi./n.","meaning":"嘗試，企圖","ex_en":"Past failures did not stop Josephine. She still attempted to work on her project no matter what.","ex_zh":"過去的失敗並沒有停 Josephine 放棄。無論如何，她仍試圖繼續她的計畫。","level":6},{"word":"channel","phon":"'tʃænl","pos":"n./vt.","meaning":"電視頻道，海峽，管道／引導，把…導入","ex_en":"In Taiwan, some cable TV companies have up to 70 or 80 channels.","ex_zh":"在臺灣，許多有線電視公司擁有高達七、八十個電視頻道。","level":6},{"word":"receive","phon":"rɪ'siv","pos":"vt.","meaning":"收到，接待","ex_en":"If you did not receive a phone call from that company, it means you did not get the job.","ex_zh":"如果你沒有接到那家公司的電話，那表示你未得到這份工作。","level":6},{"word":"distance","phon":"'dɪstəns","pos":"n.","meaning":"距離","ex_en":"The coffee shop is not far — it's within walking distance. Let's walk there.","ex_zh":"咖啡店距離不遠，步行即可到達。我們走過去吧。","level":6},{"word":"exchange","phon":"ɪks'tʃendʤ","pos":"vt./n.","meaning":"交換／交換","ex_en":"If you are not satisfied with the dress, you may exchange it for another item of the same value.","ex_zh":"若你對這洋裝不滿意，你可以換成其他等值的品。","level":6},{"word":"powerful","phon":"ˈpaʊɚfl","pos":"adj.","meaning":"強大的，有力量的","ex_en":"TV programs can have a powerful influence on kids, so we'd better choose them carefully.","ex_zh":"電視節目對孩童可能有強大的影響力，因此我們須慎選節目。","level":6},{"word":"engine","phon":"'ɛndʤən","pos":"n.","meaning":"引擎","ex_en":"When you drive, preventing unnecessary idling of engines can help cut down on the carbon footprints.","ex_zh":"當你開車時，避免不必要的引擎空轉可以幫助減少碳足跡。","level":6},{"word":"partner","phon":"ˈpɑrtnɚ","pos":"n.","meaning":"夥伴，合夥人","ex_en":"One day, Ben's business partner disappeared, and then he found that all the company money was gone.","ex_zh":"有一天，Ben的商業夥伴消失了，然後他發現公司所有的錢都不見了。","level":6},{"word":"brand","phon":"brænd","pos":"n.","meaning":"品牌，廠牌","ex_en":"Starbucks and Louisa are two brands of coffee shops. Most people in Taiwan know them.","ex_zh":"星巴克和路易莎是兩個咖啡店的品牌。臺灣大多數人都知道。","level":6},{"word":"score","phon":"skor","pos":"n./vi./vt.","meaning":"分數／得分，達到","ex_en":"The final score of the baseball game was 2 to 0, so we won!","ex_zh":"棒球比賽的最終比分是 2:0，所以我們贏了！","level":6},{"word":"mostly","phon":"'mostli","pos":"adv.","meaning":"大部分地，通常","ex_en":"Foreign workers in Taiwan are mostly from Southeast Asia. They are mainly from Indonesia, Vietnam and Thailand.","ex_zh":"臺灣的外籍勞工大部分來自東南亞。他們主要來自於印尼、越南和泰國。","level":6},{"word":"realize","phon":"ˈriəˌlaɪz","pos":"vt.","meaning":"明白／實現","ex_en":"More and more students realize that with better English, they are more likely to find a good job.","ex_zh":"愈來愈多的學生意識到英文程度好，他們更有可能找到好工作。","level":6},{"word":"surface","phon":"'sɝfɪs","pos":"n./vi.","meaning":"表面／浮出水面","ex_en":"On the surface, it's a complex question, but in fact, it's very simple.","ex_zh":"表面上，這是一個複雜的問題，但實際上，它很簡單。","level":6},{"word":"wedding","phon":"'wɛdɪŋ","pos":"n.","meaning":"婚禮","ex_en":"Joe and Lisa are getting married. Their wedding will take place in June next year.","ex_zh":"Joe 和 Lisa 要結婚了。他們的婚禮將於明年 6 月舉行。","level":6},{"word":"separate","phon":"'sɛpə.ret","pos":"vi./vt./adj.","meaning":"（使）分開，拆散／各自的，不同的","ex_en":"The west and the east of Taiwan are separated by Central Mountains Range.","ex_zh":"臺灣的東部和西部被中央山脈分開。","level":6},{"word":"click","phon":"klɪk","pos":"vi./vt./n.","meaning":"按一下（滑鼠）／（短）喀嚦聲","ex_en":"Don't click on the file from a sender that you do not know. There may be a virus in it.","ex_zh":"不要點擊不認識的寄件者所送達的文件，裡面可能有病毒。","level":6},{"word":"metal","phon":"'mɛtl","pos":"n.","meaning":"金屬","ex_en":"You'll burn your hands if you touch the metal part of the pot on the stove. You should carry the pot by holding the wooden handles.","ex_zh":"如果你觸碰爐子上鍋子的金屬部分，你的手會燙傷。你應該抓住木製把手的地方來搬動鍋子。","level":6},{"word":"budget","phon":"'bʌdʤɪt","pos":"n.","meaning":"預算","ex_en":"Peter is now living on a budget of NT$100 per day. He cannot afford any recreational activities.","ex_zh":"Peter 以一天 100 元的預算生活，他負擔不起任何娛樂活動。","level":6},{"word":"target","phon":"'targɪt","pos":"n./vt.","meaning":"（瞄準的、攻擊的）目標，靶／鎖準，針對","ex_en":"Tony's speech problem makes him the target of jokes. Lots of mean boys make fun of him for that.","ex_zh":"Tony 的語言障礙使他成為被嘲弄的目標。許多惡劣的男孩拿此戲弄他。","level":6},{"word":"fashion","phon":"'fæʃən","pos":"n./vt.","meaning":"時尚／方式／形塑、製作、使成形","ex_en":"Don't throw away your baggy clothes. I'm sure they will be back in fashion later.","ex_zh":"別急著把那些寬鬆的衣服扔掉。我相信它們之後會重新流行起來。","level":6},{"word":"feature","phon":"'fitʃɚ","pos":"n./vt.","meaning":"特色，特點，（五官）特徵／以…為特色","ex_en":"The main feature of open courses is that students can complete the course at their own pace.","ex_zh":"開放課程最主要的特色是學生可以自己的步調來完成課程。","level":6},{"word":"village","phon":"'vɪlɪdʤ","pos":"n.","meaning":"村莊","ex_en":"I grew up in a fishing village. There was fish in every meal in my childhood.","ex_zh":"我在漁村長大，小時候我餐餐都有魚肉吃。","level":6},{"word":"gain","phon":"gen","pos":"vi./vt./n.","meaning":"獲得，增加／獲利，增加","ex_en":"The teacher trains his students to make speeches every week, which helps them gain confidence.","ex_zh":"老師每週都讓學生練習演講，這有助於他們建立自信。","level":6},{"word":"soul","phon":"sol","pos":"n.","meaning":"靈魂，人，精力","ex_en":"The kid asked his dad, \"Where does a man's soul go after he dies?\"","ex_zh":"這個孩子問爸爸：「一個人死後靈魂會去哪裡？」","level":6},{"word":"apply","phon":"əˈplaɪ","pos":"vi./vt.","meaning":"申請；適用於／應用，塗抹","ex_en":"Those who are under the age of 20 cannot apply for a credit card.","ex_zh":"未滿20歲者不能向銀行申請信用卡。","level":6},{"word":"memory","phon":"ˈmɛməri","pos":"n.","meaning":"記憶力，回憶","ex_en":"My husband has a poor memory. He always forgets things.","ex_zh":"我丈夫的記憶力很差。他總是忘東忘西。","level":6},{"word":"spread","phon":"sprɛd","pos":"vi./vt./n.","meaning":"散布，展開，擴散，塗抹／傳播，散布","ex_en":"Global warming makes it easier for diseases to spread to new areas and infect more people.","ex_zh":"全球暖化使疾病更容易傳播到新的地區並感染更多的人。","level":6},{"word":"supply","phon":"səˈplaɪ","pos":"vt./n.","meaning":"提供，供給／供給，供應量","ex_en":"Bob was angry to find that his girlfriend had been secretly supplying money to her ex.","ex_zh":"Bob很氣地發現他的女友還秘密提供金錢給她的前男友。","level":6},{"word":"wild","phon":"waɪld","pos":"adj./adv./n.","meaning":"野生的，狂野的／瘋狂地，無控制的／野外","ex_en":"It's important to protect wild animals and plants. Once they die out, they can never come alive again.","ex_zh":"保護野生動植物很重要。它們一旦滅絕，就不可能再活過來。","level":6},{"word":"adult","phon":"əˈdʌlt","pos":"n.","meaning":"成人","ex_en":"The Harry Potter novels, written by J. K. Rowling, are popular with both children and adults.","ex_zh":"J.K.羅琳寫的《哈利波特》小說受到孩子和大人的歡迎。","level":6},{"word":"artist","phon":"ˈɑrtɪst","pos":"n.","meaning":"藝術家","ex_en":"The artist became famous at a young age, and his works can be seen in lots of museums.","ex_zh":"那位藝術家成名得很早，他的作品在很多博物館都看得到。","level":6},{"word":"method","phon":"'mɛθəd","pos":"n.","meaning":"方法","ex_en":"The new farming method will help farmers grow vegetables more easily.","ex_zh":"新的耕種方法將幫助農民更容易地種植蔬菜。","level":6},{"word":"prison","phon":"'prɪzn","pos":"n.","meaning":"監獄","ex_en":"Andy's uncle was put in prison for breaking into a few stores and taking away all the money and valuables.","ex_zh":"Andy 的叔叔因闖入數家商店帶走所有金錢和貴重物品而入獄。","level":7},{"word":"edition","phon":"ɪ'dɪʃən","pos":"n.","meaning":"版本","ex_en":"This recipe book written ten years ago has been so popular that it is in its fifth edition now.","ex_zh":"這本十年前寫的食譜書如此受歡迎，以至於現在已是第五版了。","level":7},{"word":"firm","phon":"fɝm","pos":"adj./n./adv.","meaning":"牢固的，堅定的／（法律、會計等）公司／堅定地，牢固地","ex_en":"When teaching children to obey rules, you have to be gentle but firm.","ex_zh":"在教小孩遵守規則時，你必須溫柔但要堅定。","level":7},{"word":"handle","phon":"ˈhændl","pos":"n./vt.","meaning":"把手／處理","ex_en":"The heavy box over there is full of glasses, so you need to handle it with care when lifting it.","ex_zh":"那個裝滿玻璃杯的箱子很重，所以你抬起它時要小心拿取。","level":7},{"word":"indeed","phon":"ɪnˈdid","pos":"adv.","meaning":"的確地，確實地","ex_en":"The main dish was great indeed, but the coffee and desserts were not that good.","ex_zh":"主餐的確很棒，但是咖啡和甜點卻不怎麼樣。","level":7},{"word":"spirit","phon":"'spɪrɪt","pos":"n.","meaning":"精神，心靈，鬼魂","ex_en":"The basketball players have a very strong team spirit, and they are full of confidence.","ex_zh":"籃球員有很強的團隊精神，且充滿了信心。","level":7},{"word":"improve","phon":"ɪmˈpruv","pos":"vi./vt.","meaning":"改善，改進，使進步","ex_en":"The first thing that the mayor did after he was elected was to improve the bus service of the city.","ex_zh":"市長獲選後所做的第一件事就是改善市裡的公車服務。","level":7},{"word":"prevent","phon":"prɪ'vɛnt","pos":"vt.","meaning":"預防，妨礙，阻止","ex_en":"For the domestic pork industry, the government has made efforts to prevent African swine fever from spreading.","ex_zh":"對國內養豬業來說，政府已經很努力防防止非洲豬瘟的擴散。","level":7},{"word":"wood","phon":"wʊd","pos":"n.","meaning":"木頭，木柴","ex_en":"Teressa wanted us to gather some wood to start a fire, and she would cook fish for dinner.","ex_zh":"Teressa要我們去蒐集木柴來生火，她會煮魚當晚餐。","level":7},{"word":"aware","phon":"ə'wɛr","pos":"adj.","meaning":"知道的，察覺到的","ex_en":"Due to numerous accidents that occurred while people were playing Pokémon GO, players were advised to be aware of possible dangers in the environment.","ex_zh":"有鑒於人們在玩寶可夢時發生了多起意外，玩家們被警告要注意周遭環境潛在的危險。","level":7},{"word":"produce","phon":"prə'djus","pos":"vt.","meaning":"生產，製造，產生","ex_en":"This place is famous for its grapes, and the finest wine in our country is produced here.","ex_zh":"此地以葡萄聞名，而以國家極優質的酒在這裡生產。","level":7},{"word":"require","phon":"rɪ'kwaɪr","pos":"vt.","meaning":"（有條件、因規定）需要、要求","ex_en":"This job requires 10 years of work experience and the ability to speak three languages.","ex_zh":"這項工作需要 10 年的工作經驗，並具備說三種語言的能力。","level":7},{"word":"function","phon":"'fʌŋkʃən","pos":"n./vi.","meaning":"功能／運作，作用","ex_en":"Since the TV program is designed for kids, its function is mainly to educate them.","ex_zh":"因為這個電視節目是設計給小孩的，它主要的目的是教育他們。","level":7},{"word":"progress","phon":"'pragrɛs","pos":"n./vi.","meaning":"進步，前進／進步，前進","ex_en":"If you make up your mind and practice playing the piano for five hours a day, you will make a lot of progress.","ex_zh":"如果你下定決心每天練習彈鋼琴五個小時，你將會有長足的進步。","level":7},{"word":"advantage","phon":"əd'væntɪdʤ","pos":"n.","meaning":"優勢，好處","ex_en":"An obvious advantage of living in a city is its convenience.","ex_zh":"住在都市的一個明顯好處就是便利性。","level":7},{"word":"host","phon":"host","pos":"n.","meaning":"主人，主持人（女：hostess）","ex_en":"The hostess greeted her friends warmly at the door by saying, 'Welcome to the party.'","ex_zh":"女主人在門口熱情地問候她的朋友們，說：「歡迎參加聚會。」","level":7},{"word":"rare","phon":"rɛr","pos":"adj.","meaning":"稀少的，罕見的，（肉類）一至二分熟的","ex_en":"This is a type of rare disease; only one in every one million people might have it.","ex_zh":"這是一種罕見疾病，一百萬人中可能只有一人會患病。","level":7},{"word":"prove","phon":"pruv","pos":"vt.","meaning":"證明，結果是","ex_en":"The clerk tried to prove that he did not kill his boss, but no one believed him.","ex_zh":"店員試圖證明他沒有殺死他的老闆，但是沒人相信他。","level":7},{"word":"tough","phon":"tʌf","pos":"adj.","meaning":"困難的，嚴厲的，（肉）老的／堅強的","ex_en":"The job is too tough for a 10-year-old boy to finish alone. He needs some help.","ex_zh":"這項工作要一個十歲的男孩獨力完成太困難了。他需要一些幫助。","level":7},{"word":"length","phon":"ˈlɛŋθ","pos":"n.","meaning":"長度","ex_en":"The rope is less than one meter in length; it is way too short to tie a horse to the tree.","ex_zh":"這條繩子的長度小於一公尺；它太短了，無法把馬綁在樹上。","level":7},{"word":"patient","phon":"'peʃənt","pos":"adj./n.","meaning":"有耐心的／病人","ex_en":"When making a cake, you need to be very patient. One step wrong and the cake will not taste great.","ex_zh":"做蛋糕時要有耐心。一個步驟錯誤，蛋糕就沒那麼好吃了。","level":7},{"word":"background","phon":"'bæk.graʊnd","pos":"n.","meaning":"（出身）背景，（事件）背景，場景","ex_en":"Even if students are from the same country, they may come from very different family and educational backgrounds.","ex_zh":"即便學生們來自相同的國家，他們卻可能來自相當不同的家庭及不同的教育背景。","level":7},{"word":"leadership","phon":"'lidɚ.ʃɪp","pos":"n.","meaning":"領導能力，領導","ex_en":"Jack is a good captain of our basketball team, and we have never doubted his leadership.","ex_zh":"Jack 是個稱職的籃球隊隊長，我們從未懷疑過他的領導能力。","level":7},{"word":"alive","phon":"əˈlaɪv","pos":"adj.","meaning":"活著的","ex_en":"To keep the plants alive, you need to give them enough water and sunlight.","ex_zh":"為了讓植物存活，你需要給它們足夠的水和陽光。","level":7},{"word":"stick","phon":"stɪk","pos":"n./vi./vt.","meaning":"棍子，棒狀物／附著，堅持／黏","ex_en":"When you go hiking in the mountains, it's better that you have a stick at hand. It helps protect you from wild animals.","ex_zh":"當你在山裡健行時，最好手上有根手杖。它能保護你防禦野生動物。","level":7},{"word":"fellow","phon":"'fɛlo","pos":"adj./n.","meaning":"同伴的，同事的／人，男人，成員","ex_en":"Will is not very brilliant, so he studies hard in order not to fall behind his fellow classmates.","ex_zh":"Will 不是很聰明，所以為了不落後同伴，他認真用功。","level":7},{"word":"balance","phon":"ˈbæləns","pos":"n./vi./vt.","meaning":"平衡，（帳戶）結餘／（使）平衡","ex_en":"Kevin had been standing on a ladder when he lost his balance and fell to the ground.","ex_zh":"Kevin站在梯子上時失去平衡，摔到地上。","level":7},{"word":"request","phon":"rɪ'kwɛst","pos":"n./vt.","meaning":"（較禮貌、正式的）要求，逗出請求／（客氣）請求，要求","ex_en":"Free samples of our factory's products are available upon request. Please feel free to contact us for more information.","ex_zh":"我們工廠產品的免費樣本本是根據要求即可索取的。請隨時和我們聯絡以尋求更多資訊。","level":7},{"word":"connection","phon":"kə'nɛkʃən","pos":"n.","meaning":"連結","ex_en":"Based on their study results, scientists have found that there is a close connection between difficult jobs and increased illness.","ex_zh":"根據研究結果，科學家發現困難的工作和疾病增加之間有緊密連結。","level":7},{"word":"aid","phon":"ed","pos":"n./vt.","meaning":"幫助，援助","ex_en":"Because of crop failure, millions of people are hungry and in need of food aid.","ex_zh":"因為作物歉收，數百萬人挨餓且需要食物援助。","level":7},{"word":"guide","phon":"gaɪd","pos":"n./vt.","meaning":"指南／引導，指引，帶…到處參觀","ex_en":"This travel guide will teach you how to plan a trip to Korea with ease.","ex_zh":"這本旅遊指南將會教你如何輕鬆地規劃一趟到韓國的旅程。","level":7},{"word":"treat","phon":"trit","pos":"vt./n.","meaning":"請客；對待；治療／樂事，美食","ex_en":"As we won the basketball game, our homeroom teacher treated all of us to ice cream.","ex_zh":"因為我們贏得籃球比賽，導師請我們大家吃冰淇淋。","level":7},{"word":"youth","phon":"juθ","pos":"n.","meaning":"年輕人（總稱），青年時期","ex_en":"The youth are the future of our country, and we have high hopes for them.","ex_zh":"年輕人是我們國家的未來，我們對他們有極高的期望。","level":7},{"word":"billion","phon":"ˈbɪljən","pos":"n.","meaning":"十億","ex_en":"Alan dreams of earning billions of dollars and becoming one of the richest men in Taiwan.","ex_zh":"Alan夢想賺數十億元，成為臺灣最有錢的人之一。","level":7},{"word":"develop","phon":"dɪ'vɛləp","pos":"vi./vt.","meaning":"發展，開發，形成","ex_en":"Over the decade, this small fishing village has developed into a popular tourist attraction.","ex_zh":"這十年來，這個小漁村已發展成為一個受歡迎的旅遊勝地。","level":7},{"word":"conversation","phon":".kanvɚ'seʃən","pos":"n.","meaning":"對話，交談","ex_en":"Peter is shy and quiet. He doesn't really know how to carry on a conversation with girls.","ex_zh":"Peter 害羞且安靜。他和女孩聊天時不太知道怎麼繼續話題。","level":7},{"word":"edge","phon":"ɛdʤ","pos":"n.","meaning":"邊緣","ex_en":"The mother was sitting on the edge of the bed, reading a story for her little girl.","ex_zh":"母親坐在床邊，為她的小女兒唸故事。","level":7},{"word":"evil","phon":"'ivl","pos":"adj./n.","meaning":"邪惡的／邪惡","ex_en":"The evil queen put poison in an apple and hoped that Snow White would eat it and die.","ex_zh":"邪惡的皇后在蘋果下毒，希望白雪公主會吃了死掉。","level":7},{"word":"injury","phon":"'ɪndʤəri","pos":"n.","meaning":"受傷，傷害","ex_en":"All passengers riding in cars are required to fasten their seatbelts in order to reduce the risk of injury in case of an accident.","ex_zh":"為了降低一發生車禍時受傷的風險，乘坐汽車的所有乘客要繫上安全帶。","level":7},{"word":"magazine","phon":".mægə'zin","pos":"n.","meaning":"雜誌","ex_en":"This fashion magazine introduces the latest designer clothes, brand name bags and makeup every month.","ex_zh":"這本時尚雜誌每個月會介紹最新的設計師服裝、名牌包及彩妝品。","level":7},{"word":"religion","phon":"rɪ'lɪdʤən","pos":"n.","meaning":"宗教","ex_en":"In Taiwan, people can enjoy the freedom of religion and have their own beliefs.","ex_zh":"在臺灣，人們享有宗教自由並可以擁有自己的
