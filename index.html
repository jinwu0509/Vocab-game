信仰。","level":8},{"word":"appreciate","phon":"ə'priʃi.et","pos":"vt.","meaning":"欣賞，感激","ex_en":"Today our art teacher showed us several famous works and taught us how to appreciate them.","ex_zh":"今天美術老師讓我們看了好幾幅名作，並教我們如何鑑賞它們。","level":8},{"word":"exist","phon":"ɪgˈzɪst","pos":"vi.","meaning":"存在，存活","ex_en":"People are not sure whether the Loch Ness Monster really exists, but many people say that they have seen it.","ex_zh":"人們不確定尼斯湖水怪是否真的存在，但許多人宣稱他們曾經見過牠。","level":8},{"word":"guard","phon":"gard","pos":"n./vt.","meaning":"守衛／保護","ex_en":"Without your ID card, the guard of the building will not let you in.","ex_zh":"你若沒有身分證，大樓守衛不會讓你進去的。","level":8},{"word":"reduce","phon":"rɪ'dʤus","pos":"vt.","meaning":"減少","ex_en":"Football players usually wear helmets and lots of thick pads to reduce the risk of getting hurt.","ex_zh":"橄欖球員通常會戴頭盔及穿戴許多厚軟墊以降低受傷的風險。","level":8},{"word":"stress","phon":"strɛs","pos":"n./vt.","meaning":"壓力／強調，重視","ex_en":"People have different ways of fighting stress. Some do yoga while others listen to soft music to relax.","ex_zh":"人們有不同的抗壓方式。有些人做瑜珈，有些人則聽輕音樂放鬆。","level":8},{"word":"mention","phon":"'mɛnʃən","pos":"vt./n.","meaning":"提及，說到／提及","ex_en":"Smoking gives you bad breath, not to mention the ill effect it has on your health.","ex_zh":"抽菸會讓你有口臭，更別提對健康造成的負面影響。","level":8},{"word":"flat","phon":"flæt","pos":"adj./n.","meaning":"平坦的，洩了氣的／公寓【英式】","ex_en":"The top of the hill is quite flat, so it's a perfect place for building tennis courts.","ex_zh":"山丘頂端相當平坦，因此是個適合建造網球場的好地方。","level":8},{"word":"upper","phon":"'ʌpɚ","pos":"adj.","meaning":"上面的","ex_en":"To make the \"f\" sound, you just need to use your upper teeth to touch your lower lip and then breathe out.","ex_zh":"要發出「f」的音，你只需要用上方牙齒觸碰你的下唇，然後呼出氣即可。","level":8},{"word":"proper","phon":"'prapɚ","pos":"adj.","meaning":"合適的，恰當的","ex_en":"It's important for young children to know the proper way of washing their hands to keep away from diseases.","ex_zh":"為了遠離疾病，小孩知道正確的洗手方式是很重要的。","level":8},{"word":"valley","phon":"'væli","pos":"n.","meaning":"山谷，溪谷","ex_en":"When I stood on the top of the hill and looked down at the valley, I felt I could do anything.","ex_zh":"當我站在山頂上，俯視山谷時，我覺得自己什麼都做得到。","level":8},{"word":"classic","phon":"'klæsɪk","pos":"adj./n.","meaning":"經典的、一流的、典型的／經典作品","ex_en":"\"Traffic\" is a classic example of people's excuses for being late.","ex_zh":"「交通」是人們遲到的典型藉口。","level":8},{"word":"failure","phon":"ˈfeljɚ","pos":"n.","meaning":"失敗，無法做到","ex_en":"My parents wanted me to keep going and never give up just because of one failure.","ex_zh":"我的父母要我繼續努力，不要因為僅僅一次失敗就放棄。","level":8},{"word":"willing","phon":"'wɪlɪŋ","pos":"adj.","meaning":"願意的","ex_en":"Mr. Lin is a kind person. He is always willing to help those in need.","ex_zh":"林先生是個好人。他總是願意幫助那些需要幫助的人。","level":8},{"word":"emergency","phon":"ɪ'mɝdʤənsi","pos":"n.","meaning":"緊急狀況","ex_en":"There should be two exit doors on each floor in case of emergency.","ex_zh":"每層樓應有兩個逃生門，以免有緊急情況。","level":8},{"word":"mix","phon":"mɪks","pos":"vt./vi.","meaning":"混合，搭配","ex_en":"Mix the soda powder with hot water, and then you can use it to clean the dirty cups and plates.","ex_zh":"將小蘇打粉和熱水混合，接著你就能用此清潔髒污的杯盤。","level":8},{"word":"path","phon":"pæθ","pos":"n.","meaning":"路，路徑","ex_en":"People living in the path of the typhoon must be prepared to get to a safer place as soon as possible.","ex_zh":"住在颱風路徑上的人們必須盡快準備好遷移到安全的地方。","level":8},{"word":"joint","phon":"'dʤɔɪnt","pos":"adj./n.","meaning":"共有的，共同的／關節，接合處","ex_en":"This project was a joint effort of John and Lisa. They had worked together on the project for three months.","ex_zh":"這項計畫是 John 和 Lisa 共同合作的。他們兩人共同進行了這項計畫三個月。","level":8},{"word":"steel","phon":"stil","pos":"n./vt.","meaning":"鋼，鋼鐵／使⋯堅上鋼，使下決心","ex_en":"Houses made of steel bars can withstand earthquakes and typhoons better than those made of wood.","ex_zh":"鋼筋建造的房子比起木造的屋子更能承受地震及颱風。","level":8},{"word":"remove","phon":"rɪˈmuv","pos":"vt.","meaning":"除去，移除","ex_en":"Your desk is crowded with too many things that you don't need. You have to remove some of them.","ex_zh":"你的書桌擺滿太多你不需要的東西。你必須移除其中一些。","level":8},{"word":"climate","phon":"ˈklaɪmɪt","pos":"n.","meaning":"氣候","ex_en":"Because of climate change, the winter in Taiwan is not as cold as it was 30 years ago.","ex_zh":"因為氣候變遷的緣故，臺灣的冬天已不像三十年前那樣寒冷。","level":8},{"word":"promise","phon":"ˈprɑmɪs","pos":"vi./vt./n.","meaning":"承諾，保證","ex_en":"John had promised to call his girlfriend every night when he was on a business trip, but he seemed to have forgotten about it.","ex_zh":"John答應女友出差時每晚都會打電話給她，但他似乎已經忘記這件事了。","level":8},{"word":"accident","phon":"'æksədənt","pos":"n.","meaning":"意外","ex_en":"A young mother and her daughter were killed in the terrible car accident on the highway last night.","ex_zh":"昨晚，一位年輕的母親和她的女兒在高速公路一場可怕的車禍中喪生。","level":8},{"word":"beer","phon":"bɪr","pos":"n.","meaning":"啤酒","ex_en":"Simon is thinking about drinking beer on the day when he turns 18.","ex_zh":"Simon 考慮在滿 18 歲那一天暢飲啤酒。","level":8},{"word":"suit","phon":"sut","pos":"vt./n.","meaning":"適合／套裝，一套衣服","ex_en":"That shirt really suits you because blue goes well with your eyes.","ex_zh":"那件襯衫真的很適合你，因為藍色和你的眼睛很搭。","level":8},{"word":"enemy","phon":"'ɛnəmi","pos":"n.","meaning":"敵人，仇人","ex_en":"The dead man had a few enemies. The police thought one of them must have attacked and killed him.","ex_zh":"死者有幾名仇家。警察認為一定是其中一人襲擊並殺死了他。","level":8},{"word":"limit","phon":"ˈlɪmɪt","pos":"vt./n.","meaning":"限制，上限，限度","ex_en":"The boss limits each group's report in the meeting to ten minutes only, so we should try to make it short.","ex_zh":"老闆限制每組在會議上的報告時間只十分鐘，所以我們應該說得簡短點。","level":8},{"word":"border","phon":"'bɔrdɚ","pos":"n.","meaning":"邊界，國境","ex_en":"The train is going to cross the border between Spain and France, so you have to get ready for the passport check.","ex_zh":"火車即將穿越西班牙和法國之間的邊界，因此你必須準備好護照檢查。","level":8},{"word":"command","phon":"kə'mænd","pos":"vt./n.","meaning":"命令，指揮／命令，指揮，（對知識的）運用能力","ex_en":"The president commanded that all soldiers in Asia should return home right away.","ex_zh":"總統命令在亞洲的所有士兵盡立即返回家鄉。","level":8},{"word":"debt","phon":"dɛt","pos":"n.","meaning":"債務","ex_en":"She wasted so much money on luxuries that she ran into debt very soon.","ex_zh":"她在奢侈品上浪費了太多錢，很快就負債累累。","level":8},{"word":"domestic","phon":"də'mɛstɪk","pos":"adj.","meaning":"國內的，家庭的","ex_en":"If you fly from Taipei to Tokyo, you'll be taking an international, rather than a domestic flight.","ex_zh":"如果你要搭機從臺北飛往東京，你將乘坐國際航班，而不是國內航班。","level":8},{"word":"appearance","phon":"ə'pɪrəns","pos":"n.","meaning":"外觀，外表，出現","ex_en":"There is no denying that your attractive appearance can sometimes open up more chances for you.","ex_zh":"無可否認的，吸引人的外表有時會替你開拓更多機會。","level":8},{"word":"historical","phon":"hɪs'tɔrɪkl","pos":"adj.","meaning":"與歷史有關的","ex_en":"Some of the events in this historical play are made up. They never happened in history.","ex_zh":"這部歷史劇的某些事件是虛構的。它們未曾發生在歷史中。","level":8},{"word":"flow","phon":"flo","pos":"vi./n.","meaning":"流動，泌，落／流動，流量","ex_en":"The Danube goes through 10 countries before flowing into the Black Sea.","ex_zh":"多瑞河流經十個國家，然後流入黑海。","level":8},{"word":"hero","phon":"'hɪro","pos":"n.","meaning":"英雄","ex_en":"Kyle is a hero in this town because he saved a kid from a burning building last week.","ex_zh":"Kyle 是這個小鎮上的英雄，因為他上週從火災的建築物中救了一個孩子。","level":8},{"word":"planet","phon":"ˈplænɪt","pos":"n.","meaning":"星球，行星","ex_en":"In the solar system, Earth is the only planet to have living beings.","ex_zh":"在太陽系中，地球是唯一擁有生命體存在的星球。","level":8},{"word":"ancient","phon":"'enʃənt","pos":"adj.","meaning":"古代的，古老的","ex_en":"In ancient times, people believed there was a man and a rabbit living on the moon.","ex_zh":"在古代，人們認為月球上住著一個人和一隻兔子。","level":8},{"word":"express","phon":"ɪk'sprɛs","pos":"vt.","meaning":"表達","ex_en":"The public speaking courses teach us how to express ourselves effectively.","ex_zh":"這些公開演說課程教會我們如何有效地表達自己。","level":8},{"word":"transport","phon":"træns'port","pos":"vt./n.","meaning":"運輸，運送，遞送／交通工具【美式】，運輸","ex_en":"The transport from the airport to the hotel we stay in will be taken care of by the travel agency.","ex_zh":"從機場到我們下榻飯店的交通將由旅行社負責。","level":8},{"word":"drama","phon":"ˈdrɑmə","pos":"n.","meaning":"戲劇，戲劇性事件","ex_en":"We couldn't decide whether we're going to watch Little Red Riding Hood or The Three Little Pigs in the drama contest.","ex_zh":"我們無法決定要在戲劇競賽看《小紅帽》還是《三隻小豬》。","level":8},{"word":"factor","phon":"'fæktɚ","pos":"n.","meaning":"因素","ex_en":"In a job interview, attitude and personality are usually important factors that influence the decision of the interviewers.","ex_zh":"在工作面試中，態度和人格特質通常是影響主考官決定的重要因素。","level":9},{"word":"schedule","phon":"ˈskɛdʤʊl","pos":"n./vt.","meaning":"計畫表，日程表／排定","ex_en":"Mr. Peters has a tight schedule. He has lots of things to deal with every day.","ex_zh":"Peters先生的行程滿檔。他每天有很多事情要處理。","level":9},{"word":"hole","phon":"hol","pos":"n.","meaning":"洞","ex_en":"There is a big hole on the ground, so you should be careful not to fall into it when you walk by.","ex_zh":"地上有一個大洞，所以你走過去時要小心別跌進去。","level":9},{"word":"storm","phon":"stɔrm","pos":"n./vi.","meaning":"暴風雨／大發雷霍，突顯","ex_en":"The storm hit the island yesterday. The strong wind and heavy rain that came along caused at least ten deaths.","ex_zh":"昨天暴風雨襲擊了該座小島。伴隨而來的強風驟雨造成至少十死。","level":9},{"word":"strike","phon":"straɪk","pos":"n./vi./vt.","meaning":"打、擊，（棒球）揮棒落空、突襲／罷工／擊，打、攻擊，罷工，（時鐘）敲響／（想法）突然閃現腦海","ex_en":"Since Taiwan may easily suffer from the strikes of typhoons and earthquakes, people should be well-prepared for such natural disasters.","ex_zh":"因為臺灣容易受到颱風及地震的襲擊，人們應該隨時準備好對這樣的天然災害。","level":9},{"word":"concern","phon":"kən'sɝn","pos":"n./vt.","meaning":"和⋯有關係／使擔心，關心","ex_en":"The news concerns some companies that use illegal chemicals in their food products.","ex_zh":"這篇新聞報導是關於一些在食品裡使用非法化學物質的公司。","level":9},{"word":"discuss","phon":"dɪˈskʌs","pos":"vt.","meaning":"討論","ex_en":"Experts from more than 20 countries met in India to discuss climate change and food safety.","ex_zh":"來自超過二十個國家的專家們在印度碰面，共同討論氣候變遷及食物安全議題。","level":9},{"word":"liberal","phon":"'lɪbərəl","pos":"adj.","meaning":"開明的，自由的，慷慨的","ex_en":"My parents hold a liberal attitude toward my choice of friends, and they never judge my friends.","ex_zh":"我父母對我的交友選擇持開明的態度，且從不批判我的朋友。","level":9},{"word":"perform","phon":"pɚ'fɔrm","pos":"vi./vt.","meaning":"表演，表現／施行，做","ex_en":"Hseu Fang-yi, a Taiwanese dancer, recently performed at Lincoln Center in New York and won a great deal of praise.","ex_zh":"臺灣舞蹈家許芳宜最近在紐約林肯中心表演並獲得好評。","level":9},{"word":"internal","phon":"ɪn'tɝnl","pos":"adj.","meaning":"（實體）內部的","ex_en":"The results of these tests show that most of Jack's internal organs, such as his heart and kidneys, are fine.","ex_zh":"Jack 的檢查結果顯示他大部分的內臟器官，例如心臟、腎臟都沒什麼問題。","level":9},{"word":"fake","phon":"fek","pos":"adj./n./vi./vt.","meaning":"假的，偽造的／假貨，贊品／假裝","ex_en":"I didn't find Leo's joke funny, so when he asked me if it was funny, I just gave him a fake smile.","ex_zh":"我不覺得 Leo 的笑話好笑，所以當他問我是否覺得笑話好笑時，我對他假笑了一下。","level":9},{"word":"task","phon":"tæsk","pos":"n.","meaning":"任務，工作","ex_en":"Finding a nice, high-paying job in the countryside is no easy task.","ex_zh":"在鄉下要找到一份高薪的工作不是件容易的事。","level":9},{"word":"chain","phon":"tʃen","pos":"n./vt.","meaning":"鏈子，鎖鍊／用鏈子拴住，束縛","ex_en":"The big angry dog is tied up with a heavy chain so that it won't hurt the neighbors.","ex_zh":"這隻凶猛的大狗被一條沉重的鋼鐵鐵鍊綁起來，這樣牠就不會傷害到鄰居。","level":9},{"word":"equal","phon":"'ikwəl","pos":"adj./vt.","meaning":"平等的，平的／等於，比得上","ex_en":"We believe people are born equal, so everyone should have the same rights.","ex_zh":"我們相信人生而平等，因此每個人都享有相同的權利。","level":9},{"word":"advance","phon":"əd'væns","pos":"vi./vt.","meaning":"使前進，進步","ex_en":"Those tennis players who win in the first round of the Grand Slam are usually shortly advance into the next round.","ex_zh":"那些在大滿貫賽事第一輪賽中獲勝的網球選手們可以晉級下一輪。","level":9},{"word":"chapter","phon":"ˈtʃæptɚ","pos":"n.","meaning":"章節，回，篇","ex_en":"In Ms. Lee's class, students have to read three chapters of a novel each week.","ex_zh":"李老師的課堂裡，學生每週必須閱讀一部小說的三個章節。","level":9},{"word":"journey","phon":"'dʤɝni","pos":"n./vi.","meaning":"旅程（尤指長途）／旅行","ex_en":"It is a long journey for many birds that live near the Bering Sea to fly to the Kenting National Park for winter.","ex_zh":"對許多住在白令海的鳥類而言，飛到墾丁國家公園過冬是一段很漫長的旅程。","level":9},{"word":"measure","phon":"'mɛʤɚ","pos":"vt./n.","meaning":"測量，衡量／措施（常用複數）","ex_en":"Before we buy a big bed, we have to measure the room and make sure that it fits the room.","ex_zh":"在購買大床之前，我們必須測量房間大小，並確保它合適。","level":9},{"word":"identity","phon":"aɪ'dɛntəti","pos":"n.","meaning":"身分","ex_en":"Someone in town was killed today, and the identity of the killer is still unknown.","ex_zh":"今天鎮上有人被殺害了，而凶手的身分仍舊未知。","level":9},{"word":"maintain","phon":"men'ten","pos":"vt.","meaning":"維持，維護","ex_en":"It is important to maintain good health and fitness by regular exercise.","ex_zh":"藉由規律運動來維持健康以及身體健康是很重要的。","level":9},{"word":"debate","phon":"dɪ'bet","pos":"vi./vt./n.","meaning":"辯論，爭論","ex_en":"The two parties have very different ideas toward the topic and have been debating for hours without result.","ex_zh":"兩黨派對於該話題有很不同的看法，雙方已經爭辯好幾個小時但無結論。","level":9},{"word":"escape","phon":"ə'skep","pos":"vi./vt./n.","meaning":"逃走／躲過／脱逃","ex_en":"Nick tried to escape from prison, but he was caught right away.","ex_zh":"Nick 試著逃獄，但是馬上被抓到了。","level":9},{"word":"aircraft","phon":"'ɛr.kræft","pos":"n.","meaning":"飛行器，飛機","ex_en":"Aircraft are machines that can fly in the air, including planes, jets and even hot air balloons.","ex_zh":"航空機指的是可以在空中飛行的器械，包含飛機、噴射機，甚至是熱氣球。","level":9},{"word":"conflict","phon":"'kanflɪkt","pos":"n./vi.","meaning":"衝突，爭執／不一致，衝突，打架","ex_en":"The conflict between the goverment and the general people of Egypt caused the President to step down.","ex_zh":"埃及政府和民眾之間的衝突導致總統下臺。","level":9},{"word":"temperature","phon":"'tɛmprətʃɚ","pos":"n.","meaning":"溫度，體溫","ex_en":"Due to global warming, the average temperature of the earth has been rising.","ex_zh":"由於全球暖化，地球的平均溫度一直在上升。","level":9},{"word":"blame","phon":"blem","pos":"vt.","meaning":"責備，責怪","ex_en":"The husband blamed his failure in business on his wife.","ex_zh":"丈夫把生意失敗的責怪在妻子身上。","level":9},{"word":"false","phon":"fɔls","pos":"adj.","meaning":"假的，錯誤的","ex_en":"I think he had given us a false number because when I called, I was told that I had a wrong number.","ex_zh":"我覺得他給了我們假的電話號碼，因為當我撥號時，我被告知打錯電話了。","level":9},{"word":"novel","phon":"ˈnɑvl","pos":"n./adj.","meaning":"小說／新奇的，新穎的","ex_en":"I like reading short stories but not novels, which are usually too long with too much going on.","ex_zh":"我喜歡閱讀短篇故事而非小說。小說通常太長，且裡面有太多事。","level":9},{"word":"vision","phon":"'vɪʤən","pos":"n.","meaning":"視力，幻覺／眼光，遠見","ex_en":"Mrs. Huang has poor vision. She cannot see things clearly without her glasses.","ex_zh":"黃太太的視力很差。沒有戴上眼鏡她就看不清楚東西。","level":9},{"word":"display","phon":"dɪ'sple","pos":"vt./n.","meaning":"陳列，展示／顯露，顯露／陳列品，展示，表露，顯示","ex_en":"At the Book Fair, many publishers will display textbooks, novels, and comic books.","ex_zh":"在書展上，許多出版社將展示教科書、小說和漫畫書。","level":9},{"word":"determine","phon":"dɪ'tɝmɪn","pos":"vt./vi.","meaning":"決定／下定決心","ex_en":"Some experts believe a person's character is determined by the age of three.","ex_zh":"有些專家相信一個人的性格在三歲前就決定了。","level":9},{"word":"mayor","phon":"'meɚ","pos":"n.","meaning":"市長","ex_en":"The mayor has built a few more parks for children in the city, which will win him more votes in the next election.","ex_zh":"市長在城市中為兒童建造了更多公園，這將為他在下次選舉中贏得更多選票。","level":9},{"word":"usual","phon":"'juʤʊəl","pos":"adj.","meaning":"通常的","ex_en":"Mary walked into the café and ordered a cup of latte as usual. This is what she normally has here.","ex_zh":"Mary 走進咖啡廳，一如往常地點了一杯拿鐵。這是她在這裡通常會點的。","level":9},{"word":"crisis","phon":"'kraɪsɪs","pos":"n.","meaning":"危機，極其困難的時刻","ex_en":"Since water shortage in many places is getting worse, it is clear that the world will be facing a water crisis soon.","ex_zh":"由於許多地方的缺水問題日益嚴重，世界顯然很快就會面臨缺水危機。","level":9},{"word":"stream","phon":"strim","pos":"n./vi.","meaning":"小溪流，人流，流動／流出，湧出","ex_en":"There is a stream near our campsite, and we can catch some fish in it for dinner.","ex_zh":"我們營地附近有一條小溪，我們可以在裡面抓魚來當晚餐。","level":9},{"word":"kingdom","phon":"'kɪŋdəm","pos":"n.","meaning":"王國，（動、植物）界","ex_en":"As the king wins lots of wars against his neighboring countries, his kingdom grows bigger and bigger.","ex_zh":"隨著國王屢勝於與鄰國的戰役，他的王國日漸強盛。","level":9},{"word":"champion","phon":"'tʃæmpɪən","pos":"n.","meaning":"冠軍，優勝者","ex_en":"Henry has beaten all the other players and becomes the youngest world chess champion.","ex_zh":"Henry 打敗了其他選手，並成為最年輕的西洋棋世界冠軍。","level":9},{"word":"struggle","phon":"'strʌgl","pos":"vi./n.","meaning":"奮鬥，努力，挣扎","ex_en":"The bus was full of people. I had to struggle to get to the front.","ex_zh":"公車擠滿了人。我必須用力擠才能走到前面。","level":9},{"word":"seek","phon":"sik","pos":"vi./vt.","meaning":"尋找","ex_en":"The little boy sought attention by shouting, kicking and rolling on the floor.","ex_zh":"小男孩藉由又踢又叫，以及在地上滾，來博取注意。","level":9},{"word":"wing","phon":"wɪŋ","pos":"n.","meaning":"翅膀，機翼，（建築）一側","ex_en":"Look at the butterfly over there! It has beautiful patterns on its wings.","ex_zh":"看那邊的蝴蝶！牠的翅膀上有漂亮的圖案。","level":9},{"word":"upset","phon":"ʌpˈsɛt","pos":"adj.","meaning":"難過的，生氣的，心煩意亂的","ex_en":"Maria didn't want to tell David about the bad news of her failing the job interview. Maria herself was quite upset about it.","ex_zh":"Maria不想告訴David她沒能通過面試的壞消息。她自己也對此感到很難過。","level":10},{"word":"desire","phon":"dɪ'zaɪr","pos":"vt./n.","meaning":"想要／欲望","ex_en":"The kid is from a rich family. His parents give him anything he desires.","ex_zh":"這孩子來自富裕的家庭。他的父母給予他任何他想要的東西。","level":10},{"word":"capable","phon":"'kepəbl","pos":"adj.","meaning":"有能力的，能幹的","ex_en":"Young children are not mature enough. Thus, they are not capable of making decisions on their own.","ex_zh":"兒童不夠成熟，因此，他們不能夠自己做決定。","level":10},{"word":"customer","phon":"ˈkʌstəmɚ","pos":"n.","meaning":"顧客","ex_en":"This supermarket usually has big sales, so it is always full of customers.","ex_zh":"這家超市常常有大特賣，所以總是擠滿了顧客。","level":10},{"word":"familiar","phon":"fə'mɪljɚ","pos":"adj.","meaning":"熟悉的","ex_en":"This town looks familiar to me. I may have been here when I was little.","ex_zh":"這個城鎮看起來很熟悉。我小時候可能來過。","level":10},{"word":"cycle","phon":"'saɪkl","pos":"n./vi.","meaning":"循環、反覆／騎腳踏車","ex_en":"The washing machine has a two-hour cycle, starting from soaking to washing, and then drying.","ex_zh":"這臺洗衣機的洗衣循環是用兩小時，從浸泡到洗衣，接著烘乾。","level":10},{"word":"switch","phon":"swɪtʃ","pos":"vi./vt./n.","meaning":"打開（開關），轉換","ex_en":"Having worked as a clerk in a bookstore for years, Nancy is thinking about switching to another job.","ex_zh":"在書店當店員多年後，Nancy考慮換另一個工作。","level":10},{"word":"extreme","phon":"ɪk'strim","pos":"adj./n.","meaning":"極端的／極端","ex_en":"Daniel is fond of extreme sports and often takes part in dangerous activities. His mother is worried about him.","ex_zh":"Daniel 喜愛極限運動，常參加危險活動，他的媽媽很擔心他。","level":10},{"word":"painting","phon":"ˈpentɪŋ","pos":"n.","meaning":"畫，畫作","ex_en":"Picasso's paintings are one-of-a-kind, and most of them are world-famous.","ex_zh":"畢卡索的畫作都獨樹一格，且大部分都是世界知名的。","level":10},{"word":"affect","phon":"ə'fɛkt","pos":"vt.","meaning":"影響","ex_en":"In general, having too many students in a class will affect the quality of education.","ex_zh":"一般而言，一個班級有太多學生會影響教育的品質。","level":10},{"word":"motion","phon":"'moʃən","pos":"n.","meaning":"動作，移動，運行","ex_en":"Eddie watched Federer's serve in slow motion on YouTube, trying to copy his powerful serve.","ex_zh":"Eddie 在 YouTube 上看著德倫球的慢動作影片，試著模仿他強而有力的發球。","level":10},{"word":"typical","phon":"ˈtɪpɪkl","pos":"adj.","meaning":"典型的","ex_en":"Leo is a typical Taiwanese high school student, who spends hours studying every day.","ex_zh":"Leo是個典型的臺灣高中生，每天花數小時的時間讀書。","level":10},{"word":"universe","phon":"'junə.vɝs","pos":"n.","meaning":"宇宙，世界","ex_en":"Some people believe that we are not alone in the universe. There must be life out there.","ex_zh":"有些人認為我們在宇宙裡並不孤單。宇宙裡一定還有其他生命。","level":10},{"word":"reasonable","phon":"'rizənəbl","pos":"adj.","meaning":"合理的","ex_en":"The price of this brand of washing machine is not reasonable. We will not consider buying it.","ex_zh":"這個牌子的洗衣機價格不合理，我們不考慮購買。","level":10},{"word":"flag","phon":"flæg","pos":"n.","meaning":"旗幟","ex_en":"A lot of students who have studied in America or Europe for years feel moved when they see our national flag.","ex_zh":"許多在美國或歐洲留學多年的學生看到我們的國旗會很感動。","level":10},{"word":"load","phon":"lod","pos":"n./vi./vt.","meaning":"負重，載重，工作量／裝載","ex_en":"The safe load of the elevator is only 500 kg, so it's not a good idea for all of us to get in at the same time.","ex_zh":"電梯的安全承載重量只有五百公斤，所以我們大家同時搭進去不太好。","level":10},{"word":"rent","phon":"rɛnt","pos":"vt./n.","meaning":"租，租賃／租金，出租","ex_en":"Unable to buy a high-priced house, many young people can only rent an apartment.","ex_zh":"因無力負擔昂貴的房子，許多年輕人只能租公寓住。","level":10},{"word":"admit","phon":"əd'mɪt","pos":"vi./vt.","meaning":"承認／准許進入、允許入學","ex_en":"After the film was posted online, Nick finally admitted having entered his neighbor's house illegally.","ex_zh":"這段影片在網路發布後，Nick 終於承認他非法闖入鄰居的房子。","level":10},{"word":"favor","phon":"'fevɚ","pos":"n./vt.","meaning":"恩惠，支持，偏袒／偏袒，贊同","ex_en":"I am in favor of the idea that high school graduates work for one or two years before going to college.","ex_zh":"我贊成高中畢業生上大學之前先工作個一兩年的想法。","level":10},{"word":"guest","phon":"gɛst","pos":"n.","meaning":"客人","ex_en":"Stella has invited lots of guests to her daughter's birthday party and prepared lots of food for them.","ex_zh":"Stella邀請了許多客人參加她女兒的生日派對，並為他們準備了很多食物。","level":10},{"word":"branch","phon":"bræntʃ","pos":"n.","meaning":"樹枝，分店、派系","ex_en":"After winter, new branches start to grow on the tree, and soon there will be flowers, too.","ex_zh":"冬天過後，樹上長出新枝芽，不久之後也將會開花。","level":10},{"word":"heaven","phon":"'hɛvən","pos":"n.","meaning":"天堂","ex_en":"It is believed that good people go to heaven after they die, and thus people are told to do good things when alive.","ex_zh":"據信好人死後會上天堂，因此人們在生時被教導要多行善。","level":10},{"word":"definition","phon":".dɛfə'nɪʃən","pos":"n.","meaning":"定義","ex_en":"The teacher asked the students to write down the definition of love, and he knew their answers might vary.","ex_zh":"老師要學生寫下愛的定義，他知道每個人的答案都會不一樣。","level":10},{"word":"diet","phon":"'daɪət","pos":"n./vi.","meaning":"飲食／節食","ex_en":"A balanced diet can help people keep in shape while junk food may cause health problems.","ex_zh":"均衡飲食可幫助人們保持健康，而垃圾食物會引發健康問題。","level":10},{"word":"afford","phon":"ə'fɔrd","pos":"vt.","meaning":"負擔得起／承擔得起","ex_en":"Actually, I can't afford the house because it is too expensive.","ex_zh":"事實上，我買不起這棟房子，因為它太貴了。","level":10},{"word":"detail","phon":"'ditel","pos":"n./vt.","meaning":"細節／詳細說明","ex_en":"Mr. Jones explained the new product to us in detail, and we were all satisfied.","ex_zh":"Jones 先生詳細跟我們說明新產品，而我們都很滿意。","level":10},{"word":"prefer","phon":"prɪˈfɝ","pos":"vt.","meaning":"較喜歡","ex_en":"In summer, I prefer to stay at home because it's too hot outside.","ex_zh":"夏天時，我比較喜歡待在家，因為外面太熱了。","level":10},{"word":"achieve","phon":"ə'tʃiv","pos":"vt.","meaning":"達到","ex_en":"Because of his hard work, my cousin finally achieved his goal and entered the university he had dreamed of.","ex_zh":"因為表哥努力，他最終達到目標，進入夢想中的大學。","level":10},{"word":"chemical","phon":"'kɛmɪkl","pos":"adj./n.","meaning":"化學的／化學物質","ex_en":"Chemical waste should be carefully dealt with. Do not throw it away at will.","ex_zh":"應小心處理化學廢棄物。不要隨意丟棄。","level":10},{"word":"expert","phon":"'ɛkspɝt","pos":"n./adj.","meaning":"專家／專業的","ex_en":"I think a computer expert can fix our computer very soon.","ex_zh":"我認為一個電腦專家可以很快地修復我們的電腦。","level":10},{"word":"object","phon":"'abdʤɪkt","pos":"n./vi.","meaning":"物體／反對","ex_en":"Ted said that he had seen a strange object flying in the sky and thought it might have been a UFO.","ex_zh":"Ted 說他看到一個奇怪的物體在空中飛，認為那可能是幽浮。","level":10},{"word":"victim","phon":"'vɪktɪm","pos":"n.","meaning":"受害者","ex_en":"Older people, younger children and people who do not eat or sleep well often fall victim to the seasonal flu.","ex_zh":"老年人、幼童及飲食睡眠不佳的人常常深受季節流感之害。","level":10},{"word":"pattern","phon":"'pætɚn","pos":"n.","meaning":"形式，模式／圖案","ex_en":"Some people prefer to follow a fixed pattern in their life: school, then marriage and children.","ex_zh":"有些人喜歡遵循固定的生活模式：求學、結婚、接著生子。","level":10},{"word":"suppose","phon":"sə'poz","pos":"vt.","meaning":"猜想，假設","ex_en":"It is supposed that having too much pressure is related to some health problems.","ex_zh":"一般認為壓力太大和一些健康問題有關。","level":10},{"word":"describe","phon":"dɪ'skraɪb","pos":"vt.","meaning":"描述，描繪","ex_en":"Though I am deeply in love with Ellen, I don't know how to describe my strong feelings in words to let her know.","ex_zh":"雖然我深愛著 Ellen，但我不知道如何用言語描述這強烈的情感讓她知道。","level":10},{"word":"depth","phon":"dɛpθ","pos":"n.","meaning":"深度","ex_en":"The depth of the swimming pool is over 2 meters, so it's not good for kids to practice swimming there.","ex_zh":"這個游泳池的深度超過兩公尺，因此不適合小孩在此練習游泳。","level":10},{"word":"shame","phon":"ʃem","pos":"n.","meaning":"羞恥，恥辱，可惜（的事）","ex_en":"Shame on those students who cheat on exams. They should be sorry for themselves.","ex_zh":"那些考試作弊的學生真可恥。他們該為自己的行為感到羞恥。","level":10},{"word":"attend","phon":"ə'tɛnd","pos":"vi./vt.","meaning":"上（大學等），參加，出席／處理、注意（attend to+N）","ex_en":"All children around the world should have the right to attend school and be educated.","ex_zh":"世界各地的兒童都應有上學並接受教育的權利。","level":10},{"word":"manner","phon":"ˈmænɚ","pos":"n.","meaning":"方式，態度舉止","ex_en":"We are all surprised that Jim deals with the job in such a strange manner.","ex_zh":"吉姆以如此奇怪的方式處理這項工作，我們都感到驚訝。","level":10},{"word":"origin","phon":"ˈɔrədʤɪn","pos":"n.","meaning":"起源","ex_en":"It's hard to find the origin of this custom because it has no written history recorded.","ex_zh":"要找到這項習俗的起源很困難，因為沒有書面記載的歷史。","level":10},{"word":"concert","phon":"'kansɝt","pos":"n.","meaning":"音樂會","ex_en":"Posters of the local rock band were displayed in store windows to promote the sale of their concert tickets.","ex_zh":"當地搖滾樂團的海報展示在商店櫥窗，以促銷演唱會門票。","level":11},{"word":"deliver","phon":"dɪˈlɪvɚ","pos":"vt.","meaning":"遞送，給出，分娩","ex_en":"The postman delivers our letters to the office around ten o'clock every morning.","ex_zh":"郵差每天早上大約十點會把我們的信件送到辦公室。","level":11},{"word":"brilliant","phon":"'brɪljənt","pos":"adj.","meaning":"聰明的，光亮的，（顏色）鮮明的","ex_en":"Nicole is a brilliant language learner. Within a short period of time, she has picked up both Chinese and Japanese.","ex_zh":"Nicole 是聰明的語言學習者。短時間內她便學會了中文及日文。","level":11},{"word":"electronic","phon":"ɪ.lɛk'tranɪk","pos":"adj.","meaning":"電子的","ex_en":"Today, many people prefer electronic books to paper ones because they are easier to carry.","ex_zh":"如今，許多人喜愛電子書更勝於紙本書，因為它們更容易攜帶。","level":11},{"word":"calm","phon":"kɑm","pos":"vi./vt./adj.","meaning":"（使）冷靜／冷靜的，平靜的","ex_en":"The young mother is slowly rocking the crying baby, trying to calm him.","ex_zh":"年輕的母親正慢慢搖晃哭鬧的嬰兒，試圖使他平靜下來。","level":11},{"word":"dumb","phon":"dʌm","pos":"adj.","meaning":"啞的，愚蠢的","ex_en":"Curtis was born dumb, so he has learned to communicate with sign language.","ex_zh":"Curtis 天生啞巴，因此他學會了用手語溝通。","level":11},{"word":"manage","phon":"'mænɪdʤ","pos":"vt.","meaning":"管理，經營／設法做到，成功做到","ex_en":"Mr. Wang is a busy restaurant owner, who has lots of things to manage every day.","ex_zh":"王先生是個忙碌的餐館經營者，每天都有很多事要管理。","level":11},{"word":"peak","phon":"pik","pos":"n.","meaning":"尖峰，山峰（尖形）","ex_en":"It's usually very cold on the mountain top, and the peak of the mountain is covered with snow in winter.","ex_zh":"山頂通常很冷，且冬季時，山的尖峰會被白雪覆蓋。","level":11},{"word":"broad","phon":"brɔd","pos":"adj.","meaning":"寬廣的","ex_en":"As there are too many cars on this street, the government is planning to make it into a broad and big road.","ex_zh":"因為有太多車輛在這條街上行駛，政府正計畫將它改建成一條寬廣的大馬路。","level":11},{"word":"sample","phon":"'sæmpl","pos":"n./vt.","meaning":"樣本／品嚐，體驗","ex_en":"Supermarkets sometimes give customers free food samples, hoping that they would buy more.","ex_zh":"超市有時會提供免費試吃，希望藉此鼓勵客多買。","level":11},{"word":"portion","phon":"'pɔrʃən","pos":"n.","meaning":"部分","ex_en":"The company decides to give out a portion of the profits they've earned this season to the charities.","ex_zh":"公司決定將這一季盈收的一部分捐給慈善機構。","level":11},{"word":"respond","phon":"rɪ'spand","pos":"vi.","meaning":"回應，反應","ex_en":"Your printer is not responding to the command. You haven't hooked it up to the computer.","ex_zh":"你的印表機對指令沒有反應。你還沒把它連上電腦。","level":11},{"word":"secondary","phon":"'sɛkən.dɛri","pos":"adj.","meaning":"第二的，次要的","ex_en":"Simon loves his work. To him, work always comes first, and family and friends are secondary.","ex_zh":"Simon 喜歡他的工作。對他而言，工作優先，家人朋友其次。","level":11},{"word":"grab","phon":"græb","pos":"vt.","meaning":"抓取、把握（機會）","ex_en":"As Bill angrily stormed out of the room, I grabbed his hand to stop him from doing something terrible.","ex_zh":"當 Bill 憤怒地離出房間時，我抓住他的手以免他做出可怕的事。","level":11},{"word":"brief","phon":"brif","pos":"adj.","meaning":"簡短的，知識的","ex_en":"It's a brief holiday. How I wish I could stay here longer!","ex_zh":"這是一個短暫的假期。多希望我能待在這裡久一點！","level":11},{"word":"pilot","phon":"'paɪlət","pos":"n./vt.","meaning":"飛行員，（船隻）領航員／駕駛飛機，領航","ex_en":"Joe is an experienced pilot. He has been working for British Airways for nearly 20 years.","ex_zh":"Joe 是個經驗豐富的飛行員。他在英國航空工作將近二十年了。","level":11},{"word":"breath","phon":"brɛθ","pos":"n.","meaning":"呼吸，氣息","ex_en":"Before John got on the stage to give the speech, he took a deep breath to calm himself down.","ex_zh":"John 上臺演說前，做了個深呼吸讓自己冷靜。","level":11},{"word":"destroy","phon":"dɪ'strɔɪ","pos":"vt.","meaning":"破壞，毀滅","ex_en":"The robbers not only took away all the money but also destroyed everything in the store.","ex_zh":"強盜不但拿走所有的錢，還破壞了店裡所有的東西。","level":11},{"word":"survive","phon":"sɚ'vaɪv","pos":"vi.","meaning":"倖存","ex_en":"There was a terrible car accident on the highway, and sadly no one survived.","ex_zh":"高速公路上發生了一起嚴重車禍，遺憾的是沒有人生存。","level":11},{"word":"immediate","phon":"ɪ'midɪət","pos":"adj.","meaning":"立即的，馬上的／接近的","ex_en":"We need to take immediate action once we are informed, or it will be too late.","ex_zh":"一旦接獲通知，我們就需要立即採取行動，否則一切就會太遲。","level":11},{"word":"principal","phon":"ˈprɪnsəpl","pos":"n./adj.","meaning":"校長／最重要的","ex_en":"Though busy at school, our principal makes it a rule to say good morning to each student at the school gate every morning.","ex_zh":"雖然在學校很忙碌，我們校長固定每天早上在校門口跟每位學生道早安。","level":11},{"word":"aim","phon":"em","pos":"n./vi.","meaning":"目標，瞄準／以…為目標、瞄／向…（為目標）","ex_en":"The aim of our new project is to increase the sales by at least 30% next season, and we hope we can do that.","ex_zh":"我們新企劃的目標是要在下一季至少提升百分之三十的銷售量，希望我們可以達成。","level":11},{"word":"fee","phon":"fi","pos":"n.","meaning":"費用","ex_en":"Leo's aunt paid the university fees for him and said that he didn't have to pay her back.","ex_zh":"Leo 的姑姑為他支付了大學學費，並告訴他不必還。","level":11},{"word":"exact","phon":"ɪg'zækt","pos":"adj.","meaning":"確切的，精確的","ex_en":"I need you to give me the exact number of the guests tonight, so that I can prepare food for each of them.","ex_zh":"我需要你給我今晚客人的確切數字，以便我能為他們每個人都準備食物。","level":11},{"word":"quote","phon":"kwot","pos":"vi./vt.","meaning":"引用","ex_en":"In his speech, the speaker quoted a lot from the Bible in order to strengthen his points.","ex_zh":"在演講中，講者引用了許多《聖經》的內容強化他的論點。","level":11},{"word":"campus","phon":"'kæmpəs","pos":"n.","meaning":"校園","ex_en":"In our school, students can connect their smartphones to the Internet. They can use free wi-fi service anytime on campus.","ex_zh":"在我們學校裡，學生可以隨時將智慧手機連接到網路。他們在校園內任何時候都可以使用免費的wi-fi服務。","level":11},{"word":"wealth","phon":"wɛlθ","pos":"n.","meaning":"財富，富裕","ex_en":"The singer gained fame and wealth after his latest album became a huge hit.","ex_zh":"這位歌手最新的專輯大賣之後，她名利雙收。","level":11},{"word":"musical","phon":"ˈmjuzɪkl","pos":"adj./n.","meaning":"音樂的／音樂劇","ex_en":"Ron has great talents; he can play many musical instruments, such as the piano and the violin.","ex_zh":"Ron相當有才華；他可以彈奏許多樂器，像是鋼琴和小提琴。","level":11},{"word":"plastic","phon":"'plæstɪk","pos":"adj.","meaning":"塑膠的","ex_en":"We should stop using plastic bags and containers because they have done damage to the environment.","ex_zh":"我們應停止使用塑膠袋和塑膠容器，因為它們已對環境造成傷害。","level":11},{"word":"childhood","phon":"'tʃaɪld.hʊd","pos":"n.","meaning":"童年","ex_en":"The memories of my childhood are so sweet that I can't forget those good old days.","ex_zh":"童年的記憶對我而言是如此甜蜜，以至於我無法忘懷那些美好的舊日時光。","level":11},{"word":"gang","phon":"gæŋ","pos":"n./vi.","meaning":"幫派，一夥／結黨，聯合起來","ex_en":"Many teenagers join gangs and do illegal things partly because they come from broken families.","ex_zh":"許多青少年加入幫派並為非作歹，部分原因是因為他們來自破碎的家庭。","level":11},{"word":"lift","phon":"lɪft","pos":"vt./n.","meaning":"舉起，提高，撤銷（規定）／搭便車","ex_en":"I need someone to help me lift this big, heavy box and move it to the second floor.","ex_zh":"我需要有人幫我把這個沉重的大箱子，然後搬到二樓。","level":11},{"word":"wheel","phon":"hwil","pos":"n./vt.","meaning":"輪子，方向盤／推，推動（有輪子的東西）","ex_en":"I want to buy a new suitcase with wheels, so that I can carry it around more easily.","ex_zh":"我要買一個有輪子的新行李箱，這樣可以較輕易地移動它。","level":11},{"word":"contain","phon":"kən'ten","pos":"vt.","meaning":"包含，容納／克制（情緒）","ex_en":"This pack of snacks contains all kinds of nuts, so it's not a good idea to give it to small children.","ex_zh":"這包零食中包含各式堅果，所以不適合拿給幼童食用。","level":11},{"word":"operate","phon":"'apə.ret","pos":"vi./vt.","meaning":"操作／動手術","ex_en":"It's dangerous for someone who is drunk to operate a heavy machine or drive a car.","ex_zh":"讓酒醉的人去操作重型機械或開車是很危險的。","level":11},{"word":"graduate","phon":"'grædʤu.et","pos":"vi./n.","meaning":"畢業／畢業生","ex_en":"After I graduate from college, I plan to spend one year traveling and seeing the world for myself.","ex_zh":"大學畢業後，我打算花一年時間旅遊、親眼看看這個世界。","level":11},{"word":"tradition","phon":"trəˈdɪʃən","pos":"n.","meaning":"傳統","ex_en":"It's a Taiwanese tradition for parents with a newborn son to send friends and other family members red eggs.","ex_zh":"臺灣傳統中，產下兒子的父母親會分送紅蛋給朋友和親戚。","level":11},{"word":"neighborhood","phon":"'nebɚ.hʊd","pos":"n.","meaning":"鄰近地區","ex_en":"With a big supermarket in his neighborhood, it is very convenient for him to go grocery shopping.","ex_zh":"鄰近區域有一間大型超市，購買日用品對他來說非常便利。","level":11},{"word":"coal","phon":"kol","pos":"n.","meaning":"煤，煤礦","ex_en":"Without a heater, people in old times put burning hot coal in their rooms to keep warm in winter.","ex_zh":"由於沒有暖爐，古代的人們在冬天時把燒得發燙的煤炭放在房間裡取暖。","level":11},{"word":"tone","phon":"ton","pos":"n.","meaning":"語調，音調，風格（格調），色調","ex_en":"The mother used a gentle tone of voice, patiently asking her kids to finish their meals as soon as possible.","ex_zh":"那位母親用溫柔的語調，耐心地要求孩子們盡快把飯吃完。","level":11},{"word":"pride","phon":"praɪd","pos":"n.","meaning":"驕傲，自尊／獅群","ex_en":"Mrs. Jones takes pride in her three sons, who are all doctors working in the U.S.","ex_zh":"Jones 太太以她三個兒子為傲，他們都在美國當醫生。","level":12},{"word":"highway","phon":"ˈhaɪˌwe","pos":"n.","meaning":"（高速）公路","ex_en":"The speed limit on this highway is 70 kilometers per hour. You are driving way too fast.","ex_zh":"這條公路的限速為每小時70公里。你實在開太快了。","level":12},{"word":"earn","phon":"ɝn","pos":"vi./vt.","meaning":"賺得，贏得","ex_en":"Many parents in Taiwan don't want their kids to become artists because it's hard to earn a living from it.","ex_zh":"臺灣很多父母不想小孩當藝術家，因為要以此謀生很困難。","level":12},{"word":"trick","phon":"trɪk","pos":"n./vt.","meaning":"把戲，騙局，技巧／欺詐，誘騙⋯上當","ex_en":"You can't teach an old dog new tricks.","ex_zh":"老狗變不出新把戲（舊習難改）。","level":12},{"word":"ignore","phon":"ɪg'nor","pos":"vt.","meaning":"（刻意）忽略，不理會","ex_en":"John's father was so busy that he totally ignored his own health.","ex_zh":"John 的父親很忙碌，以至於他完全忽略自己的健康。","level":12},{"word":"practical","phon":"'præktɪkl","pos":"adj.","meaning":"實用的，可施行的，實用的","ex_en":"The solution that Amy proposed in the meeting was not practical enough because it was too costly.","ex_zh":"Amy 在會議中提出的解決方法不夠實際，因為價格太昂貴了。","level":12},{"word":"bone","phon":"bon","pos":"n.","meaning":"骨頭","ex_en":"Don't climb the tall tree. If you fall down, you are sure to break your bones.","ex_zh":"不要爬那棵高大的樹。如果你摔下來，肯定會摔斷骨頭。","level":12},{"word":"chart","phon":"tʃart","pos":"n.","meaning":"圖表，曲線圖","ex_en":"The secretary made a chart of the sales figures for the last season to see if our products sold well.","ex_zh":"秘書把上個月的銷售數字做成圖表，看看我們產品是否賣得好。","level":12},{"word":"occur","phon":"əˈkɝ","pos":"vi.","meaning":"發生","ex_en":"The car accident occurred because the driver was not being careful.","ex_zh":"那場車禍是因為駕駛開車不小心。","level":12},{"word":"mirror","phon":"ˈmɪrɚ","pos":"n./vt.","meaning":"鏡子／反映，與...相似","ex_en":"Every day, Sarah looks at herself in the mirror and tells herself that she is the best.","ex_zh":"每天，Sarah看著鏡子裡的自己，告訴自己她是最棒的。","level":12},{"word":"clothing","phon":"'kloðɪŋ","pos":"n.","meaning":"衣物（單位量詞用 item 或 article）","ex_en":"Shoppers can only bring three articles of clothing into the fitting room to try on.","ex_zh":"顧客只能夠帶三件衣服進更衣間試穿。","level":12},{"word":"technique","phon":"tɛk'nik","pos":"n.","meaning":"技巧，技術（較為專業）","ex_en":"Andy knows all the techniques to play the piano, but he plays with no emotion.","ex_zh":"Andy 知道彈鋼琴的所有技巧，但是他演奏時沒有感情。","level":12},{"word":"impressive","phon":"ɪm'prɛsɪv","pos":"adj.","meaning":"令人印象深刻的","ex_en":"Amy is an impressive TED speaker; she can always grab people's attention and successfully deliver her messages.","ex_zh":"Amy 是個令人印象深刻的 TED 演講家，她總是能抓住人們的注意力並成功地傳達訊息。","level":12},{"word":"membership","phon":"'mɛmbɚ.ʃɪp","pos":"n.","meaning":"會員資格","ex_en":"If you want to join the sports club, you have to apply for membership first.","ex_zh":"如果你想參加運動俱樂部，你必須先申請入會。","level":12},{"word":"hip","phon":"hɪp","pos":"n.","meaning":"臀部，髖部","ex_en":"The jeans Leo were too tight. When he sat down, they split from his hip to the waist accidentally.","ex_zh":"Leo 穿的牛仔褲太緊了。當他坐下時，褲子意外從髖部到腰部裂了一條大縫。","level":12},{"word":"argue","phon":"ˈɑrgju","pos":"vi./vt.","meaning":"爭論，爭吵，爭辯","ex_en":"Because of differing habits and lifestyles, the husband and wife often argue with each other over small things.","ex_zh":"因為習慣及生活模式不同，這對夫婦經常為了小事爭吵。","level":12},{"word":"awful","phon":"'ɔfʊl","pos":"adj.","meaning":"糟糕的，可怕的","ex_en":"Our trip to Hualien was an awful experience. The train was delayed, and every place was crowded with people.","ex_zh":"我們到花蓮旅遊的經驗相當糟糕。火車誤點且到處都擠滿了人。","level":12},{"word":"loose","phon":"lus","pos":"adj.","meaning":"鬆的","ex_en":"Sarah has successfully dropped 20 pounds. Now her old jeans are too loose for her to wear.","ex_zh":"Sarah 已經成功減了 20 磅。她的舊牛仔褲現在鬆到沒辦法穿了。","level":12},{"word":"element","phon":"'ɛləmənt","pos":"n.","meaning":"要素，元素","ex_en":"This TV show is kind of boring, so the producer plans to introduce some new elements into it.","ex_zh":"這個電視節目有點無聊，因此製作人計畫引入一些新元素。","level":12},{"word":"poverty","phon":"'pavɚti","pos":"n.","meaning":"貧窮（不可數）","ex_en":"The single mother and her three children live in poverty; they usually have only one meal a day.","ex_zh":"這位單親母親和三個孩子生活貧困，他們通常每天只吃一餐。","level":12},{"word":"formal","phon":"ˈfɔrml","pos":"adj.","meaning":"正式的","ex_en":"Remember to wear formal clothes when you go to a job interview. Ties and shirts are good choices.","ex_zh":"別忘了去參加工作面試時，記得穿上正式服裝。領帶和襯衫都是好選擇。","level":12},{"word":"palace","phon":"'pælɪs","pos":"n.","meaning":"皇宮，宮殿","ex_en":"The Taj Mahal is a grand palace in India, visited by many tourists every year.","ex_zh":"泰姬瑪哈陵是印度的一座宏偉宮殿，每年有許多遊客造訪。","level":12},{"word":"select","phon":"sə'lɛkt","pos":"vt.","meaning":"選擇","ex_en":"Mr. Chen was selected from a large number of experts to be the leader of the research team.","ex_zh":"陳先生從眾多專家中被選拔出，成為研究團隊的負責人。","level":12},{"word":"silent","phon":"ˈsaɪlənt","pos":"adj.","meaning":"寂靜的，沉默的","ex_en":"Jimmy kept silent all day long. He seemed to have something on his mind.","ex_zh":"Jimmy整天保持沉默。他似乎在想些什麼。","level":12},{"word":"compare","phon":"kəm'pɛr","pos":"vt.","meaning":"比較","ex_en":"Parents should never compare their kids with other children because every child is special.","ex_zh":"父母親不該將自己孩子和別的小孩做比較，因為每位孩子都是特別的。","level":12},{"word":"curious","phon":"'kjʊrɪəs","pos":"adj.","meaning":"好奇的","ex_en":"We are all curious about why Jenny looks so young. She must have some secret to stay so young.","ex_zh":"我們都很好奇為何 Jenny 看起來如此年輕。她一定有保持年輕的祕訣。","level":12},{"word":"mystery","phon":"'mɪstəri","pos":"n.","meaning":"神祕，謎，難理解的事物","ex_en":"Where the COVID-19 virus came from remains a mystery. No one knows its exact origin.","ex_zh":"新冠肺炎病毒的來源是哪裡仍然是個謎。沒有人知道其真正的起源。","level":12},{"word":"encourage","phon":"ɪn'kɝɪdʤ","pos":"vt.","meaning":"鼓勵，激勵，刺激","ex_en":"Many people worry that lotteries encourage people to gamble to become rich instead of working hard to make money.","ex_zh":"許多人擔心樂透彩會鼓勵人們以賺博的方式發富而非努力賺錢。","level":12},{"word":"mood","phon":"mud","pos":"n.","meaning":"心情","ex_en":"If you want to ask your dad for a smartphone, you should do it when he is in a good mood.","ex_zh":"如果你想要跟爸爸要一支智慧型手機，應該在他心情好時跟他要。","level":12},{"word":"ideal","phon":"aɪˈdiəl","pos":"adj.","meaning":"理想的","ex_en":"This building is ideal for a cram school. It's right beside an elementary school and a high school.","ex_zh":"這棟建築是理想的補習地點。它位在一間小學及中學旁邊。","level":12},{"word":"arrival","phon":"əˈraɪvl","pos":"n.","meaning":"抵達，到來","ex_en":"Shortly after my arrival in New York, I got lost and then my wallet was stolen.","ex_zh":"我抵達紐約後不久，我迷路了，然後我的錢包被偷了。","level":12},{"word":"passion","phon":"'pæʃən","pos":"n.","meaning":"熱情","ex_en":"If you want to become a successful dancer, first you need to have a passion for dancing.","ex_zh":"如果你想要成為一位成功的舞者，首先你要對舞蹈充滿熱情。","level":12},{"word":"wire","phon":"waɪr","pos":"n./vt.","meaning":"金屬絲，電線／接上電線，（用金屬線）綑綁","ex_en":"A big bird was accidentally stuck in the wire fence, and the farmer is trying to help free it.","ex_zh":"有一隻大鳥意外卡在鐵絲網中，農夫正試著把牠救出。","level":12},{"word":"plain","phon":"plen","pos":"adj.","meaning":"簡單的，清楚的，樸素的（尤指女性）相貌平平的","ex_en":"The benefits of the system are plain to see. Any smart businessman would choose it over the others.","ex_zh":"該系統的好處顯而易見。任何聰明的商人都會選擇它。","level":12},{"word":"custom","phon":"'kʌstəm","pos":"n.","meaning":"習俗，慣例","ex_en":"In Japan, be sure to follow the local customs, such as taking off your shoes before entering the house.","ex_zh":"在日本，務必遵守當地習俗，例如在進入室內前脫鞋。","level":12},{"word":"confident","phon":"ˈkɑnfədənt","pos":"adj.","meaning":"有信心的，有自信的","ex_en":"Though Randy is very hardworking, he is not confident in himself and needs to be praised.","ex_zh":"雖然Randy很努力，但是他對自己沒有信心，需要被讚美。","level":12},{"word":"electricity","phon":".ɪlɛk'trɪsəti","pos":"n.","meaning":"電力","ex_en":"The power just went out! Did you forget to pay the electricity bill, Jimmy?","ex_zh":"停電了！Jimmy，你忘了付電費嗎？","level":12},{"word":"soil","phon":"sɔɪl","pos":"n.","meaning":"泥土，國土","ex_en":"The soil here has been polluted by heavy metal, so it is not suitable to grow any crop.","ex_zh":"這裡的土壤被重金屬嚴重汙染，所以不適合種植任何作物。","level":12},{"word":"skill","phon":"skɪl","pos":"n.","meaning":"技巧","ex_en":"Writing is a very useful skill for students. In the future, they can use it at different workplaces.","ex_zh":"寫作對學生來說是非常有用的技能。將來，他們可以在不同的工作場所使用它。","level":12},{"word":"solve","phon":"sɑlv","pos":"vt.","meaning":"解決，解答","ex_en":"The problem was so difficult that most students could not solve it.","ex_zh":"這個問題是如此困難以至於大部分學生無法解答。","level":12},{"word":"ordinary","phon":"ˈɔrdnˌɛri","pos":"adj.","meaning":"普通的，一般的","ex_en":"The famous actress has decided to be a housewife and live an ordinary life after she gets married.","ex_zh":"這位著名女演員決定婚後當家庭主婦過平凡的生活。","level":13},{"word":"efficient","phon":"ɪ'fɪʃənt","pos":"adj.","meaning":"有效率的","ex_en":"Cars in the future will be characterized by their efficient use of gasoline.","ex_zh":"未來汽車的特色是有效率地使用石油。","level":13},{"word":"participate","phon":"pɑrˈtɪsəˌpet","pos":"vi.","meaning":"參加，參與","ex_en":"We are happy to see that many people come and participate in big activity.","ex_zh":"我們很高興看到許多人前來參加這個大型活動。","level":13},{"word":"deck","phon":"dɛk","pos":"n.","meaning":"甲板","ex_en":"Frank and his girlfriend sat on the deck of the ship, watching the sunset.","ex_zh":"Frank 和他女友坐在船的甲板上觀賞夕陽。","level":13},{"word":"dust","phon":"dʌst","pos":"n./vi./vt.","meaning":"灰塵／擦灰塵","ex_en":"The old lady left her house long ago, and now the floor is covered with dust.","ex_zh":"這位老太太很久以前就離開這棟房子，現在地板都覆滿灰塵。","level":13},{"word":"lately","phon":"'letli","pos":"adv.","meaning":"最近地，近來地","ex_en":"I have been losing sleep lately. This is strange because I never had sleeping problems before.","ex_zh":"我最近一直有失眠困擾。說也奇怪，我以前從未有睡眠問題。","level":13},{"word":"repair","phon":"rɪˈpɛr","pos":"vt./n.","meaning":"修理，修補","ex_en":"Thank you very much for helping me repair my bicycle yesterday.","ex_zh":"非常感謝你昨天幫我修理腳踏車。","level":13},{"word":"delay","phon":"dɪˈle","pos":"vt./n.","meaning":"拖延，延遲","ex_en":"Due to heavy snow on the runway, all the flights were delayed for nearly eight hours.","ex_zh":"由於跑道上有大雪，所有航班均延遲了近八個小時。","level":13},{"word":"forth","phon":"forθ","pos":"adv.","meaning":"（空間、方向）向前地，向外地／（時間）從⋯之後","ex_en":"When the nurse asked if someone would be willing to donate blood, some men came forth.","ex_zh":"護士詢問是否有人願意捐血時，有一些男人站了出來。","level":13},{"word":"marry","phon":"ˈmæri","pos":"vi./vt.","meaning":"嫁，娶，結婚","ex_en":"The prince married the beautiful princess, and they led a happy life after that.","ex_zh":"王子與美麗的公主結婚，從此過著幸福的生活。","level":13},{"word":"sheet","phon":"ʃit","pos":"n.","meaning":"一張紙，床單","ex_en":"After putting her dirty sheets in the washing machine, Jenny took clean ones to make the bed.","ex_zh":"Jenny 將髒床單放入洗衣機後，拿乾淨的床單鋪床。","level":13},{"word":"desert","phon":"'dɛzɚt","pos":"n.","meaning":"沙漠","ex_en":"In the desert, it is hot in the daytime and cold at night.","ex_zh":"在沙漠中，白天很熱，夜晚很冷。","level":13},{"word":"poetry","phon":"'poətri","pos":"n.","meaning":"詩（總稱）","ex_en":"Many students find it hard to read poetry, as short and seemingly simple lines may be full of deeper meanings.","ex_zh":"許多學生覺得詩很難讀，因為短且看似簡單的句子可能含有更深奧的意涵。","level":13},{"word":"smooth","phon":"smuð","pos":"adj./vt.","meaning":"平滑的，順利的，流暢的／撫平，使順利","ex_en":"It is sunny and the weather condition is good, so we can expect a smooth flight from Osaka to Taipei today.","ex_zh":"今天是晴天且天氣狀況良好，因此可預期今日大阪飛往臺北的航班會相當平順。","level":13},{"word":"string","phon":"strɪŋ","pos":"n.","meaning":"細繩，線","ex_en":"The doll's arms and legs are controlled by thin strings, so when you pull them, the arms and legs will move.","ex_zh":"娃娃的手臂和雙腿都由細繩控制，所以當你拉扯細繩時，娃娃的手腳就會動。","level":13},{"word":"pan","phon":"pæn","pos":"n.","meaning":"平底鍋，煎鍋","ex_en":"If you want to make an omelet for your breakfast, you need to cook the eggs in a frying pan.","ex_zh":"如果你想做歐姆蛋當早餐，你需要用煎鍋來煮雞蛋。","level":13},{"word":"shell","phon":"ʃɛl","pos":"n.","meaning":"（動植物）殼，硬殼","ex_en":"When buying eggs, be sure to pick those that are clean and smooth with strong shells.","ex_zh":"買雞蛋時，一定要挑選乾淨、光滑且具有堅固外殼的雞蛋。","level":13},{"word":"silly","phon":"'sɪli","pos":"adj.","meaning":"愚蠢的","ex_en":"I cannot believe I have made such a silly mistake! How foolish I was.","ex_zh":"我不敢相信我犯了這麼愚蠢的錯誤！我真是愚蠢。","level":13},{"word":"liquid","phon":"'lɪkwɪd","pos":"n./adj.","meaning":"液體，流質／液態的，流動的","ex_en":"Ursula just had one of her bad teeth removed, so she can only drink some liquid for now.","ex_zh":"Ursula 剛剛拔掉了一顆蛀牙，所以她現在只能喝流質食物。","level":13},{"word":"narrow","phon":"ˈnæro","pos":"adj./vt.","meaning":"窄的／使變小，變窄","ex_en":"The street is so narrow. When I drive through it, I feel I will bump into the walls of the houses.","ex_zh":"這條街道好窄。開車經過時，我覺得快撞到兩側的牆了。","level":13},{"word":"refuse","phon":"rɪ'fjuz","pos":"vi./vt.","meaning":"拒絕","ex_en":"The boy refused to put his toys away, so his angry mother decided to throw them all away.","ex_zh":"小男孩拒絕把玩具收起來，所以生氣的媽媽決定把它們都丟掉。","level":13},{"word":"compete","phon":"kəm'pit","pos":"vi.","meaning":"競爭","ex_en":"In the Olympic Games, the best athletes from all over the world try their best to compete with one another.","ex_zh":"奧運會中，來自世界各地的最佳運動員竭力地彼此競爭。","level":13},{"word":"discover","phon":"dɪs'kʌvɚ","pos":"vt.","meaning":"發現","ex_en":"I began to learn the piano when I was at college and soon discovered that I was good at it.","ex_zh":"我上大學時開始學鋼琴，不久就發現自己很擅長。","level":13},{"word":"entrance","phon":"ˈɛntrəns","pos":"n.","meaning":"入口","ex_en":"Since this building has only one entrance, it's impossible for you to get in from other places.","ex_zh":"因為這棟建築物只有一個入口，你不可能從其他方式進入。","level":13},{"word":"lifetime","phon":"'laɪf.taɪm","pos":"n.","meaning":"一輩子，終生（常用單數）","ex_en":"Mother Teresa spent her lifetime helping the poor and the sick in India, and she will always be remembered for her selfless love.","ex_zh":"德蕾莎修女其一生都在印度幫助窮困者及病患，她將會因她無私的愛被人們永遠懷念。","level":13},{"word":"broadcast","phon":"'brɔd.kæst","pos":"vi./vt./n.","meaning":"播報，播送／（電視或廣播）播報、轉播","ex_en":"The final of the US Open will be broadcast live both on FOX channel and the official website at the same time.","ex_zh":"美國網球公開賽的決賽會在福斯頻道和官網同時直播轉播。","level":13},{"word":"occasion","phon":"ə'keʤən","pos":"n.","meaning":"特殊場合，時機","ex_en":"Ian usually wears T-shirts and jeans. He only wears a suit and tie on special occasions.","ex_zh":"Ian 通常穿 T 恤和牛仔褲。只有在特殊場合才會打領帶。","level":13},{"word":"settle","phon":"'sɛtl","pos":"vi./vt.","meaning":"安頓，定居／解決","ex_en":"Tom hates to be alone, and he would like to settle down, get married, and have a family.","ex_zh":"Tom 討厭獨自一個人，他想安定下來組織家庭。","level":13},{"word":"tongue","phon":"tʌŋ","pos":"n.","meaning":"舌頭（mother tongue 母語）","ex_en":"Be careful when you drink the cup of hot chocolate, or you might burn your tongue.","ex_zh":"喝那杯熱巧克力的時候小心點，否則你可能會燙傷舌頭。","level":13},{"word":"introduce","phon":"ɪntrəˈdjus","pos":"vt.","meaning":"介紹／引進","ex_en":"When we meet at Starbucks tomorrow, I will introduce my new boyfriend to you.","ex_zh":"明天我們在星巴克見面時，我將介紹我的新男友。","level":13},{"word":"fate","phon":"fet","pos":"n.","meaning":"命運，厄運","ex_en":"My parents often tell me that fate is in my hands, so I should try hard to make my dreams come true.","ex_zh":"父母常告訴我命運掌握在我手中，因此我應該努力讓夢想成真。","level":13},{"word":"regard","phon":"rɪˈgɑrd","pos":"vt./n.","meaning":"視為／關心，尊重","ex_en":"Debbie is regarded as the most hard-working student in her class.","ex_zh":"Debbie被認為是班上最用功的學生。","level":13},{"word":"headquarters","phon":"'hɛd.kwɔrtɚz","pos":"n.","meaning":"總部（可激辭、複數動詞）","ex_en":"Terrence will leave the Amazon headquarters in Seattle this June and start to work in a branch office in Japan.","ex_zh":"Terrence 今年六月將離開西雅圖的亞馬遜總部，然後開始在日本分公司工作。","level":13},{"word":"tear","phon":"tɛr","pos":"vt./n.","meaning":"撕開，撕裂／裂痕，裂縫／眼淚","ex_en":"After reading the Dear John letter, Wilson angrily tore it into pieces and threw them into the trash can.","ex_zh":"讀完分手信之後，Wilson 憤怒地將它撕碎並丟進垃圾桶。","level":13},{"word":"cotton","phon":"'katn","pos":"n.","meaning":"棉花（不可數）","ex_en":"Cotton is a soft and white material from plants, and it is often used for making clothes.","ex_zh":"棉花是一種取自植物的鬆軟、白色材料，並常被用於製造衣物。","level":13},{"word":"stretch","phon":"strɛtʃ","pos":"vi./vt./n.","meaning":"伸展，伸出，（時間、空間）延伸","ex_en":"Having sat at the desk in the office for two hours, I think I need to get up and stretch my legs.","ex_zh":"在辦公室的辦公桌前坐了兩個小時，我想我必須站起來走走。","level":13},{"word":"discount","phon":"'dɪskaʊnt","pos":"n.","meaning":"折扣","ex_en":"The store offers a 10% discount on their new products in order to attract more customers.","ex_zh":"為了吸引更多客人，商店對於新產品提供 10% 的折扣。","level":13},{"word":"indicate","phon":"'ɪndə.ket","pos":"vt.","meaning":"顯示，表明","ex_en":"Many studies indicate that children who keep pets are happier than those who do not.","ex_zh":"許多研究表明，養寵物的孩子比不養寵物的孩子更快樂。","level":13},{"word":"terrorist","phon":"'tɛrərɪst","pos":"n.","meaning":"恐怖分子","ex_en":"ISIS is a terrorist group, which has been killing lots of people and causing fear in many countries in the Middle East.","ex_zh":"ISIS 是一個恐怖分子組織，已經在中東許多國家殺害了很多人並造成恐慌。","level":13},{"word":"deny","phon":"dɪˈnaɪ","pos":"vt.","meaning":"否認，拒絕","ex_en":"Roger denies stealing his classmate's money. He says he didn't do it.","ex_zh":"Roger否認偷竊同學的錢。他說他沒有這麼做。","level":13},{"word":"ease","phon":"iz","pos":"vt./n.","meaning":"減輕，緩解／容易，放鬆","ex_en":"This kind of medicine can ease your pain very quickly. Why don't you take some and get some rest?","ex_zh":"這種藥物可以很快地緩解你的疼痛。你何不吃些藥，然後好好休息呢？","level":14},{"word":"twin","phon":"twɪn","pos":"n./adj.","meaning":"雙胞胎／雙胞胎的，成雙的","ex_en":"Jane and Mary are twins. No one can tell them apart except their parents.","ex_zh":"Jane 和 Mary 是雙胞胎。除了他們的父母親以外，沒有人能區分出他們。","level":14},{"word":"flood","phon":"flʌd","pos":"n./vi./vt.","meaning":"水災／淹沒，大量湧入","ex_en":"My house was once damaged by the flood, and you can see the water marks on the walls now.","ex_zh":"我的房子曾被水災損毀過，你現在可以在牆上看到水漬。","level":14},{"word":"absence","phon":"'æbsns","pos":"n.","meaning":"缺席","ex_en":"Wilson skipped class again this morning, and our teacher was very angry about his absence.","ex_zh":"Wilson 今早又翹課了，我們老師對他的缺席感到很生氣。","level":14},{"word":"instant","phon":"'ɪnstənt","pos":"adj.","meaning":"立即的，速食的（即溶的）","ex_en":"The movie was an instant success after it hit the theaters. The box office was over 100 million in two weeks.","ex_zh":"這部電影一上映就獲得成功，票房在兩週內就超過一億元。","level":14},{"word":"principle","phon":"'prɪnsəpl","pos":"n.","meaning":"原理，原則","ex_en":"Learning the basic pronunciation principles helps students spell English words more easily.","ex_zh":"學會基本的發音規則可以幫助學生更輕易地拼出英文單字。","level":14},{"word":"trap","phon":"træp","pos":"vt./n.","meaning":"捕捉，困住／陷阱，圈套","ex_en":"The old lady had a flat tire and was trapped on the road. She didn't know what to do.","ex_zh":"那位老太太的輪胎爆胎了，被困在路上，不知道該怎麼辦。","level":14},{"word":"column","phon":"'kaləm","pos":"n.","meaning":"（報章雜誌的）專欄，輝位／圓柱，柱狀體","ex_en":"Terry is a column writer, who writes articles for newspapers and magazines on travel plans.","ex_zh":"Terry 是個專欄作家，他撰寫紙及新誌探旅遊計畫相關文章。","level":14},{"word":"priest","phon":"prist","pos":"n.","meaning":"牧師，神父","ex_en":"Bob's grandfather works as a priest. He performs his religious duties in a church.","ex_zh":"Bob 的祖父是位牧師。他在教堂裡執行與宗教相關的事務。","level":14},{"word":"pretend","phon":"prɪ'tɛnd","pos":"vi./vt.","meaning":"假裝","ex_en":"Cathy pretended to be sick so that she wouldn't have to do housework.","ex_zh":"Cathy 假裝生病，如此她就可以不必做家事。","level":14},{"word":"cure","phon":"kjʊr","pos":"vt./n.","meaning":"治癒（疾病）／治癒方法，對策","ex_en":"AIDS is a disease that can only be controlled, not cured.","ex_zh":"愛滋病是一種只能控制而無法治癒的疾病。","level":14},{"word":"tissue","phon":"'tɪʃu","pos":"n.","meaning":"面紙，衛生紙，（動物或植物的）組織組織","ex_en":"Seeing her crying so sadly, I could only hand her some tissues and stay by her side.","ex_zh":"看到她哭得如此傷心，我能做的就是遞給她紙並陪在她身邊。","level":14},{"word":"courage","phon":"'kɝɪdʤ","pos":"n.","meaning":"勇氣","ex_en":"You should have the courage to stand up for yourself and fight for your rights.","ex_zh":"你應該鼓起勇氣站起來為自己的權利而戰。","level":14},{"word":"ongoing","phon":"'an.goɪŋ","pos":"adj.","meaning":"持續不斷的，進行中的","ex_en":"The discussion is still ongoing, and it will not finish until we reach a conclusion.","ex_zh":"這場討論還在進行中，直到我們達成結論才會結束。","level":14},{"word":"praise","phon":"prez","pos":"vt./n.","meaning":"讚美","ex_en":"Mr. Chen is highly praised for his great skills in training dogs and other pets.","ex_zh":"陳先生因在訓練狗和其他寵物方面的出色技能而受到高度讚揚。","level":14},{"word":"rocket","phon":"'rakɪt","pos":"n./vi.","meaning":"火箭／迅速上升，猛漲","ex_en":"The rocket is scheduled to be sent into space next week, which will be a great achievement for Taiwan.","ex_zh":"火箭預定下週發射到太空，這對臺灣來說將是巨大的成就。","level":14},{"word":"symbol","phon":"'sɪmbl","pos":"n.","meaning":"象徵，標誌，符號","ex_en":"In Taiwan, some high school uniforms are symbols of excellence and honor.","ex_zh":"在臺灣，某些高中校服是卓越和榮譽的象徵。","level":14},{"word":"explore","phon":"ɪk'splor","pos":"vi./vt.","meaning":"探索，探討","ex_en":"Traveling is a good way for us to explore different cultures and broaden our horizons.","ex_zh":"旅行是一個讓我們探索不同文化和拓展視野的好方法。","level":14},{"word":"midnight","phon":"ˈmɪdˌnaɪt","pos":"n.","meaning":"午夜","ex_en":"If I drink too much coffee, I'll wake up at midnight and can't fall asleep anymore.","ex_zh":"如果我喝太多咖啡，我會在午夜醒來，且再也無法入眠了。","level":14},{"word":"slide","phon":"slaɪd","pos":"vi./n.","meaning":"滑行／滑梯，（顯微鏡）投影片，載玻片","ex_en":"As the lake is totally frozen, many kids are happily sliding on the ice.","ex_zh":"湖泊已完全結凍，許多孩子們在冰上開心地滑著。","level":14},{"word":"affair","phon":"ə'fɛr","pos":"n.","meaning":"事情，事務／外遇","ex_en":"Sometimes, foreign affairs are very complicated, so it requires wisdom to handle them well.","ex_zh":"有時，外交事務非常複雜，因此需要智慧才能妥善處理。","level":14},{"word":"invite","phon":"ɪnˈvaɪt","pos":"vt.","meaning":"邀請","ex_en":"To show our kindness, we invite our new neighbors to have dinner with us.","ex_zh":"為了表示善意，我們邀請新鄰居來跟我們一起共進晚餐。","level":14},{"word":"phrase","phon":"frez","pos":"n./vt.","meaning":"詞語，片語／說話措辭，遣詞用字","ex_en":"\"A piece of cake\" is a common English phrase, which is used to describe something very easy.","ex_zh":"「一塊蛋糕」是一句常見的英文詞語，用以形容簡單的事物。","level":14},{"word":"wisdom","phon":"'wɪzdəm","pos":"n.","meaning":"智慧","ex_en":"My mother often gives me words of wisdom, which can help me solve problems in life.","ex_zh":"我母親經常給我智慧的話，這些話語能幫助我解決生活中的問題。","level":14},{"word":"fortune","phon":"'fɔrtʃən","pos":"n.","meaning":"命運，好運／一大筆錢，財富","ex_en":"Daniel doesn't believe that the fortuneteller said. He believes that fortune always favors him.","ex_zh":"Daniel 不相信算命師所告訴他的話。他相信運氣總是眷顧著他。","level":14},{"word":"calendar","phon":"'kæləndɚ","pos":"n.","meaning":"日曆","ex_en":"Mrs. Martha circled \"November eighteenth\" on the calendar to make sure that she would not forget her husband's birthday.","ex_zh":"Martha 太太在日曆上將 11 月 18 日圈起來以確保自己不會忘記丈夫的生日。","level":14},{"word":"tale","phon":"tel","pos":"n.","meaning":"故事","ex_en":"When Tina was little, her mother read stories from fairy tales to her before bed every night.","ex_zh":"Tina 小的時候，母親每晚在她睡前會唸童話故事給她聽。","level":14},{"word":"relax","phon":"rɪ'læks","pos":"vi./vt.","meaning":"使放鬆","ex_en":"Frank is under a lot of pressure. He could use a vacation and relax.","ex_zh":"Frank 壓力很大。他應該去度假，好好放鬆一下。","level":14},{"word":"recover","phon":"rɪ'kʌvɚ","pos":"vi./vt.","meaning":"恢復，復原／找回","ex_en":"After spending a month in hospital, Joe finally recovered from the disease.","ex_zh":"在住院一個月後，Joe 終於從疾病中復原了。","level":14},{"word":"furniture","phon":"'fɝnɪtʃɚ","pos":"n.","meaning":"傢俱","ex_en":"We decide to throw away some old furniture and buy a new table, a sofa and some chairs.","ex_zh":"我們決定丟掉一些舊傢俱，添購新的桌子、沙發和一些椅子。","level":14},{"word":"slip","phon":"slɪp","pos":"vi./n.","meaning":"偷溜出（去）／滑倒／小紙片，（不小心或未注意到）小錯","ex_en":"Gina thought nobody noticed her slipping out of the meeting to make a phone call, but her boss happened to see that.","ex_zh":"Gina 以為沒人注意到她偷溜出會議室到外面打電話，但她的老闆碰巧看見了。","level":14},{"word":"alarm","phon":"ə'larm","pos":"n./vt.","meaning":"警報，鬧鐘（鈴）／令⋯擔心或害怕","ex_en":"When someone breaks into our house, the alarm will go off and make a loud sound.","ex_zh":"當有人闖入我們的房子時，警鈴會響起，並發出很大的聲響。","level":14},{"word":"mature","phon":"mə'tjʊr","pos":"adj.","meaning":"成熟的（人或動物）","ex_en":"According to some studies, children under the age of 12 are generally not mature enough to know what's dangerous.","ex_zh":"根據一些研究，十二歲以下的孩童通常還不夠成熟到能了解什麼是危險的。","level":14},{"word":"dawn","phon":"dɔn","pos":"n./vi.","meaning":"黎明，破曉／開始出現，漸露端兒","ex_en":"Tommy wakes up at dawn and starts selling fish in the market in the morning every day.","ex_zh":"Tommy 每天在黎明時甦醒，早晨便開始在市場上賣魚。","level":14},{"word":"passage","phon":"'pæsɪdʤ","pos":"n.","meaning":"通行，通道／（文章）一段，節","ex_en":"I walked down a narrow passage and found a secret garden at the end of it.","ex_zh":"我沿著一條狹窄的通道走下去，在這條通道盡頭發現了一座祕密花園。","level":14},{"word":"instrument","phon":"'ɪnstrəmənt","pos":"n.","meaning":"儀器，樂器","ex_en":"The nurses had all the instruments ready before the doctor started to operate on the patient.","ex_zh":"在醫生開始對病人進行手術之前，護士們已準備好所有器具。","level":14},{"word":"rude","phon":"rud","pos":"adj.","meaning":"粗魯的，無禮的","ex_en":"It's rude of you to cut in when I haven't finished what I am saying.","ex_zh":"我還沒把話說完你就插嘴，真是無禮。","level":14},{"word":"vary","phon":"'vɛri","pos":"vi./vt.","meaning":"改變，不同","ex_en":"The idea of \"beauty\" varies from generation to generation. A beauty in old times may not be considered pretty nowadays.","ex_zh":"對於「美女」的看法每個世代都不同。古代的美人可能在現今不會被認為是漂亮的。","level":14},{"word":"garage","phon":"gə'radʤ","pos":"n.","meaning":"車庫，修車廠","ex_en":"My mother's car is in the garage, but I just cannot find her in the house. It's so strange.","ex_zh":"我母親的車在車庫裡，但我在房子裡找不到她。真奇怪。","level":14},{"word":"forgive","phon":"fɚˈgɪv","pos":"vt.","meaning":"原諒","ex_en":"Please forgive me for what I have said. I didn't mean to say that to make you angry.","ex_zh":"請原諒我所說的話。我並不是故意那樣來惹你生氣。","level":14},{"word":"gather","phon":"ˈgæðɚ","pos":"vi./vt.","meaning":"集合，聚集，蒐集","ex_en":"An accident just happened on the street, and a crowd gathered to see what was going on.","ex_zh":"街道上剛發生事故，一群人聚在一起觀看發生了什麼事。","level":15},{"word":"relate","phon":"rɪ'let","pos":"vi./vt.","meaning":"使有關聯／理解，認知","ex_en":"Lung cancer, one of the major killers in Taiwan, has long been related to bad air quality and smoking.","ex_zh":"臺灣的主要殺手之一——肺癌，長以來和空氣品質不良及抽菸有關。","level":15},{"word":"tunnel","phon":"'tʌnl","pos":"n./vi.","meaning":"隧道，地道／開鑿隧道，挖地道","ex_en":"Built under the sea in 1994, the tunnel between England and France connects the UK more closely with mainland Europe.","ex_zh":"英國和法國的隧道於 1994 年興建於海底，它把英國和歐洲大陸更緊密地連結了。","level":15},{"word":"deposit","phon":"dɪ'pazɪt","pos":"vt./n.","meaning":"儲存（尤指金錢），存放／存款","ex_en":"Larry deposits one-third of his monthly pay so that he can save enough money to buy a house.","ex_zh":"Larry 把他每個月薪水的三分之一存起來，以便可以存夠錢買房子。","level":15},{"word":"jealous","phon":"'dʤɛləs","pos":"adj.","meaning":"忌妒的","ex_en":"Helena is jealous of her older sister's beauty and her younger sister's talent. She hates herself for being so ordinary.","ex_zh":"Helena 忌妒姊姊的美貌及妹妹的才華。她痛恨自己如此平凡。","level":15},{"word":"palm","phon":"pam","pos":"n.","meaning":"手掌（心），棕櫚樹","ex_en":"The strange old lady in the temple said she could read my palm and tell my future, but I didn't believe it.","ex_zh":"廟裡有一位陌生老婦說她可以看我的手掌並預測未來，但我不相信。","level":15},{"word":"brush","phon":"brʌʃ","pos":"n./vi.","meaning":"刷子，畫筆／刷，刷平滑","ex_en":"Mandy took out several brushes and began to paint the wall of her room by herself.","ex_zh":"Mandy 拿出幾把刷子，並開始自己為房間的牆壁油漆。","level":15},{"word":"essay","phon":"ˈɛse","pos":"n.","meaning":"短文，論文，散文","ex_en":"The teacher asked us to write an essay introducing a famous YouTuber with at least 120 words.","ex_zh":"老師要我們寫一篇至少120字的短文介紹一位有名的YouTuber。","level":15},{"word":"burden","phon":"'bɝdn","pos":"n./vt.","meaning":"負擔／使…負擔","ex_en":"As the eldest son, Thomas had to shoulder the burden of supporting his family after his father's sudden death.","ex_zh":"身為長子，在父親驟然去世後，Thomas 必須肩負起照顧家庭的重擔。","level":15},{"word":"casual","phon":"'kæʤʊəl","pos":"adj.","meaning":"休閒的，隨意的","ex_en":"It's not a good idea to wear casual clothes such as jeans and T-shirts to a job interview.","ex_zh":"穿著像牛仔褲及 T 恤這樣的休閒服裝去面試不是個好主意。","level":15},{"word":"strict","phon":"strɪkt","pos":"adj.","meaning":"嚴格的","ex_en":"Mr. Lin is strict with his children. He will not allow them to have food unless they finish their homework.","ex_zh":"林先生對孩子很嚴格。除非他們完成家庭作業，否則他不允許他們吃東西。","level":15},{"word":"expense","phon":"ɪk'spɛns","pos":"n.","meaning":"花費，開銷","ex_en":"When Emily and her friends went on vacation to Japan, they shared their travel and hotel expenses.","ex_zh":"當 Emily 和友人到日本度假時，他們共同分擔旅費和飯店費用。","level":15},{"word":"complain","phon":"kəm'plen","pos":"vi.","meaning":"抱怨","ex_en":"The old lady often complains to her family about the noise on the streets; she is considering moving to the countryside.","ex_zh":"老太太經常向她家人抱怨街上的噪音；她正考慮搬到鄉下。","level":15},{"word":"photograph","phon":"ˈfotəˌgræf","pos":"n.","meaning":"照片","ex_en":"This photograph was taken 20 years ago, when I was a baby held by my grandmother.","ex_zh":"這張照片攝於20年前，當時是祖母抱著還是嬰兒的我。","level":15},{"word":"folk","phon":"fok","pos":"n./adj.","meaning":"人們，雙親（常用複數）／民俗的","ex_en":"My folks will attend a PTA meeting. They want to ask my homeroom teacher about my studies at school.","ex_zh":"我父母親將參加親師座談會，他們想問我導師關於我在校的學業狀況。","level":15},{"word":"leaf","phon":"lif","pos":"n.","meaning":"葉子","ex_en":"When the leaves on the trees start to turn red, I know it's autumn.","ex_zh":"當樹上的葉子開始變紅時，我知道秋天來了。","level":15},{"word":"fever","phon":"ˈfivɚ","pos":"n.","meaning":"發燒，狂熱","ex_en":"Anyone who runs a high fever had better rest at home as much as he/she can.","ex_zh":"任何發高燒的人最好在家裡盡可能地多休息。","level":15},{"word":"magical","phon":"'mædʤɪkl","pos":"adj.","meaning":"魔術的，神奇的","ex_en":"The fairy God Mother's magical power turned the pumpkin into a carriage, which carried Cinderella to the ball.","ex_zh":"仙杜的魔法把南瓜變成了馬車，載著灰姑娘前往舞會。","level":15},{"word":"pleasant","phon":"'plɛzənt","pos":"adj.","meaning":"令人愉快的，討人喜歡的","ex_en":"We had a pleasant afternoon when we sat by the bay talking about our happy childhood memories.","ex_zh":"我們坐在灣邊，談論快樂的兒時回憶，度過了一個愉快的下午。","level":15},{"word":"skip","phon":"skɪp","pos":"vt./vi.","meaning":"略過，跳過，蹺課，跳過／跳躍，跳躍","ex_en":"Feeling the class quite boring, the college student decided to skip class and stay home to play online games.","ex_zh":"這位大學生覺得課程很無聊，於是決定蹺課待在家玩線上遊戲。","level":15},{"word":"wrap","phon":"ræp","pos":"vi./vt.","meaning":"包，纏，裹","ex_en":"The nurse cleaned the boy's cut on his finger and carefully wrapped a bandage around it.","ex_zh":"護士清潔小男孩手指上的切傷並且小心地在上面纏上繃帶。","level":15},{"word":"depend","phon":"dɪ'pɛnd","pos":"vi.","meaning":"依賴，取決於","ex_en":"Children depend on their parents for everything. They cannot live on their own.","ex_zh":"孩子什麼都要依賴父母親。他們無法獨自生活。","level":15},{"word":"generous","phon":"ˈdʤɛnərəs","pos":"adj.","meaning":"大方的，慷慨的","ex_en":"The businessman is very generous; he gives money to those who are in need of help.","ex_zh":"這位商人非常大方，他經常捐錢給那些需要幫助的人。","level":15},{"word":"communicate","phon":"kə'mjunə.ket","pos":"vi./vt.","meaning":"溝通，交流","ex_en":"As an international language, English allows people of different countries to communicate in a common language.","ex_zh":"作為國際語言，英語使不同國家的人得以用共通的語言溝通。","level":15},{"word":"boot","phon":"but","pos":"n.","meaning":"靴子","ex_en":"Jack usually wears his boots on the farm in order not to make his feet dirty and wet.","ex_zh":"Jack 在農場常穿靴子以免弄濕弄髒他的腳。","level":15},{"word":"coin","phon":"kɔɪn","pos":"n./vt.","meaning":"硬幣／創造（杜撰）新詞","ex_en":"Simply put the coins into the machine, choose the drinks and press the button. You'll soon get what you want.","ex_zh":"只要把硬幣投入這個機器，選擇飲料並按下按鈕，很快就可以拿到你想要的飲料。","level":15},{"word":"corn","phon":"kɔrn","pos":"n.","meaning":"玉米","ex_en":"The chickens on Mr. Lee's farm feed on corn, and they will be sold in the market when they grow up.","ex_zh":"李先生農場上的雞以玉米為食，等牠們長大後就會在市場上出售。","level":15},{"word":"nerve","phon":"nɝv","pos":"n.","meaning":"神經，勇氣","ex_en":"Since the patient's nerves are damaged, there is no feeling or movement in his legs.","ex_zh":"因為病患的神經受到損害，他的腿沒有知覺也無法移動。","level":15},{"word":"emotion","phon":"ɪ'moʃən","pos":"n.","meaning":"情緒，情感","ex_en":"People all over the world show their basic emotions with similar facial expressions.","ex_zh":"全世界的人都用相似的臉部表情來表達基本的情緒。","level":15},{"word":"bacteria","phon":"bæk'tɪrɪə","pos":"n.","meaning":"細菌（複數）","ex_en":"Washing your hands with soap can help remove most of the bacteria and prevent disease.","ex_zh":"用肥皂洗手可以幫助去除大部分的細菌並預防疾病。","level":15},{"word":"lap","phon":"læp","pos":"n.","meaning":"大腿部（常用單數）／（跑道等）一圈","ex_en":"The young mother is reading a story to her two-year-old son sitting on her lap.","ex_zh":"這位年輕的母親正為坐在她膝上的兩歲兒子說故事。","level":15},{"word":"oak","phon":"ok","pos":"n.","meaning":"橡樹","ex_en":"There is a big oak tree in front of my grandfather's house, and he always sits on a chair under it in the afternoon.","ex_zh":"我祖父門前有一棵大橡樹，下午時他總是坐在樹下的椅子上。","level":15},{"word":"grain","phon":"gren","pos":"n.","meaning":"穀物，顆粒，一點，少量","ex_en":"Would you please help me load these bags of grain onto the truck?","ex_zh":"你能幫我把這幾袋穀物搬到卡車上嗎？","level":15},{"word":"cancel","phon":"ˈkænsl","pos":"vi./vt.","meaning":"取消","ex_en":"We had no choice but to cancel our plan for the weekend picnic because of the bad weather.","ex_zh":"因為壞天氣的緣故，我們不得不取消週末野餐的計畫。","level":15},{"word":"ceiling","phon":"'sɪlɪŋ","pos":"n.","meaning":"天花板","ex_en":"There's a hole on our ceiling, and when it rains, water keeps falling down from the top of the house.","ex_zh":"我們家天花板有個洞，下雨時，水一直從屋頂滴落下來。","level":15},{"word":"examine","phon":"ɪg'zæmɪn","pos":"vt.","meaning":"檢查","ex_en":"After the doctor finished examining Kim's eyes, he told her that she needed to wear glasses.","ex_zh":"醫生檢查完 Kim 的眼睛後，告訴她她需要戴眼鏡了。","level":15},{"word":"basement","phon":"'besmənt","pos":"n.","meaning":"地下室","ex_en":"Our storeroom is in the basement. Since it's under our house, it's dark and usually very wet.","ex_zh":"我們的儲藏室在地下室。因為它在房子底下，那裡很暗，且通常十分潮溼。","level":15},{"word":"lens","phon":"lɛnz","pos":"n.","meaning":"鏡片","ex_en":"Martha is extremely nearsighted, so the glasses she wears have very thick lenses.","ex_zh":"Martha 高度近視，所以她的眼鏡鏡片相當的厚。","level":15},{"word":"bless","phon":"blɛs","pos":"vt.","meaning":"祝福，保佑","ex_en":"The island is blessed with a warm climate and lots of water, so farmers can grow nice vegetables and fruits.","ex_zh":"該島擁有溫暖的氣候和充足的水源，因此農民可以種植精美的蔬菜和水果。","level":15},{"word":"barrel","phon":"'bærəl","pos":"n.","meaning":"大（木）桶","ex_en":"I can't believe you bought a barrel of beer instead of six cans! When are you going to drink all of it?","ex_zh":"我不敢相信你買了一大桶啤酒而不是六罐！你什麼時候才喝得完？","level":15},{"word":"cinema","phon":"'sɪnəmə","pos":"n.","meaning":"電影院【英式】","ex_en":"There is a long line outside the cinema. Clearly, everyone is coming to watch the latest hit.","ex_zh":"電影院外大排長龍。顯然大家都是來看那部熱賣的賣座電影。","level":16},{"word":"gentle","phon":"ˈdʤɛntl","pos":"adj.","meaning":"溫柔的，和緩的","ex_en":"The kind man is always gentle with the kids in town, and that's why all kids like him so much.","ex_zh":"那位仁慈的男子對鎮上的小孩很和藹，那正是為什麼小孩都喜歡他的原因。","level":16},{"word":"treasure","phon":"'trɛʤɚ","pos":"n./vt.","meaning":"財富，寶藏／重視，珍藏","ex_en":"If we follow this secret map, we may find the hidden treasure and make a big fortune.","ex_zh":"如果我們依循這張秘密地圖，也許我們可以找到埋藏的寶藏並大賺一筆。","level":16},{"word":"react","phon":"ri'ækt","pos":"vi.","meaning":"反應","ex_en":"I can imagine how Cathy would have reacted to the bad news. She must have burst out crying.","ex_zh":"我能想像 Cathy 對這個壞消息的反應。她當時一定哭得大哭。","level":16},{"word":"rocky","phon":"'raki","pos":"adj.","meaning":"崎嶇的，多岩石的／不穩定的（尤指關係）","ex_en":"The mountain road twists and turns. It is quite rocky, so you need to be careful when you drive on it.","ex_zh":"這條山路彎彎曲曲。路況相當崎嶇，所以開車時要特別小心。","level":16},{"word":"bubble","phon":"'bʌbl","pos":"n./vi.","meaning":"泡泡／冒泡，沸騰，湧現","ex_en":"When goldfish blow bubbles at the surface of the water, they are actually trying to get more air.","ex_zh":"當金魚在水面上吐泡泡時，牠們其實正試圖得到更多空氣。","level":16},{"word":"hammer","phon":"'hæmɚ","pos":"n./vt.","meaning":"鐵錘／（用槓子）敲擊","ex_en":"I wasn't looking at the nail carefully, and then the next second, I accidentally hit my fingers with a hammer.","ex_zh":"我沒仔細看著釘子，然後下一秒，我就不小心用錘子敲到手指了。","level":16},{"word":"apologize","phon":"ə'palə.dʤaɪz","pos":"vi.","meaning":"道歉","ex_en":"The boy apologized to the teacher for his improper behavior.","ex_zh":"男孩為他的不當行為向老師道歉。","level":16},{"word":"burst","phon":"bɝst","pos":"vi./vt.","meaning":"（使）⋯爆裂，（使）爆炸","ex_en":"If you keep blowing air into the balloon, it will become big and then burst.","ex_zh":"如果你繼續往氣球裡灌氣，氣球會變得太大就爆炸。","level":16},{"word":"swift","phon":"swɪft","pos":"adj.","meaning":"（較強調動作）迅速的，快的","ex_en":"When a problem occurred, the technician took swift action to deal with it, and successfully solved it in a short time.","ex_zh":"當問題發生時，技術人員迅速地處理它，並在短時間內就成功解決了。","level":16},{"word":"inform","phon":"ɪn'fɔrm","pos":"vt.","meaning":"通知","ex_en":"A menu serves to inform customers about the varieties and prices of the dishes offered by the restaurant.","ex_zh":"菜單是用來告知顧客餐廳所提供的菜餚的種類和價格。","level":16},{"word":"awake","phon":"ə'wek","pos":"adj./vi./vt.","meaning":"醒著的／醒來（正式或文學用語）／被…吵醒，喚醒","ex_en":"Peter stayed up late last night, so he drank a lot of coffee this morning to keep himself awake in class.","ex_zh":"Peter 昨晚熬夜到很晚，所以他今早喝了很多咖啡讓自己上課時保持清醒。","level":16},{"word":"blank","phon":"blæŋk","pos":"n./adj.","meaning":"空格／空白的，茫然的","ex_en":"After you finish reading the article in this lesson, be sure to fill in the blanks in the workbook.","ex_zh":"閱讀完這課的文章後，務必完成習作中的填空。","level":16},{"word":"organ","phon":"'organ","pos":"n.","meaning":"器官，管風琴","ex_en":"The heart is the most important organ in the human body. Once it stops beating, a person will die.","ex_zh":"心臟是人體最重要的器官。一旦它停止跳動，人就會死亡。","level":16},{"word":"aboard","phon":"ə'bord","pos":"prep./adv.","meaning":"上（船、飛機、火車等）","ex_en":"After hours of delay, we were finally allowed aboard the plane and got ready to take off.","ex_zh":"經過幾小時的延誤後，我們終於被允許登機準備起飛。","level":16},{"word":"thunder","phon":"'θʌndɚ","pos":"n.","meaning":"雷","ex_en":"Did you hear the sound of thunder? I think it will rain in no time.","ex_zh":"你聽到雷聲了嗎？我想很快就要下雨了。","level":16},{"word":"instruction","phon":"ɪn'strʌkʃən","pos":"n.","meaning":"指示，操作指南","ex_en":"Follow the instructions closely, and you will find it easy to put together the bicycle.","ex_zh":"按照說明仔細操作，你會發現組裝腳踏車很容易。","level":16},{"word":"bend","phon":"bɛnd","pos":"vi./vt./n.","meaning":"彎曲，彎腰／向…屈服／轉彎處，彎道","ex_en":"Seeing a piece of paper on the ground, the man bent down to pick it up.","ex_zh":"看到地上有一張紙，那位男士彎下腰把它給拾起。","level":16},{"word":"arrow","phon":"'æro","pos":"n.","meaning":"箭，箭頭，箭號","ex_en":"The hunter found a deer. He pulled out an arrow, pointed it and shot.","ex_zh":"那位獵人發現一隻鹿。他拔出箭，標準瞄並將箭射出。","level":16},{"word":"combine","phon":"kəm'baɪn","pos":"vi./vt.","meaning":"結合","ex_en":"The company combines learning with games and designs an app to help students.","ex_zh":"這家公司將學習與遊戲相結合，並設計了一款可幫助學生的應用程式。","level":16},{"word":"miracle","phon":"'mɪrəkl","pos":"n.","meaning":"奇蹟","ex_en":"The new type of cleaner really worked miracles! It removed the spot on my white shirt.","ex_zh":"這種新型的清潔劑真的像魔術般神奇！它去除了我白襯衫上的污漬。","level":16},{"word":"dive","phon":"daɪv","pos":"vi.","meaning":"跳水（+off）／潛水","ex_en":"A group of women, called \"Ama,\" in Shima area, Japan, dive into the sea to catch fish and seashells.","ex_zh":"一群日本志摩地區的「海女」們潛入海中捕捉魚與貝類。","level":16},{"word":"cruel","phon":"'krʊəl","pos":"adj.","meaning":"殘忍的","ex_en":"It is cruel of the young man to kick that dog. He must have a heart of stone.","ex_zh":"那位年輕人踢狗真是殘忍。他一定是鐵石心腸。","level":16},{"word":"stamp","phon":"stæmp","pos":"n./vi./vt.","meaning":"郵票，戳記，標記／跌腳，重踏／蓋上戳印，蓋頒路","ex_en":"Before mailing the letter, you need to stick a stamp on the envelope.","ex_zh":"信寄出去之前，你需要在信封上貼郵票。","level":16},{"word":"freeze","phon":"friz","pos":"vi./vt.","meaning":"結冰，凝固","ex_en":"Whenever the lake freezes in winter, people will ice-skate on it.","ex_zh":"每當湖泊在冬天結冰時，人們會在上面溜冰。","level":16},{"word":"humble","phon":"'hʌmbl","pos":"adj./vt.","meaning":"謙虛的，卑微的，普通不起眼的／使⋯低聲下氣","ex_en":"Dr. Wu is a humble man who is never proud of his achievement.","ex_zh":"吳博士是謙虛的人，從未因自己的成就而驕傲。","level":16},{"word":"selfish","phon":"ˈsɛlfɪʃ","pos":"adj.","meaning":"自私的","ex_en":"It's selfish of you not to share the snacks with others.","ex_zh":"你真自私，不跟其他人分享零食。","level":16},{"word":"laughter","phon":"'læftɚ","pos":"n.","meaning":"笑，笑聲","ex_en":"After Mr. Lee told a funny joke in class, the whole class burst into laughter and we were all amused by it.","ex_zh":"李老師在課堂上說了一個好笑的笑話之後，全班頓時哄堂大笑，都被笑話逗得很開心。","level":16},{"word":"leak","phon":"lik","pos":"vi./vt./n.","meaning":"滲漏／洩漏（祕密）／滲漏，滲漏","ex_en":"If the lid is not on tight, the water bottle will leak in your backpack.","ex_zh":"如果蓋子沒有蓋緊，水壺放在背包裡會漏水。","level":16},{"word":"diary","phon":"ˈdaɪəri","pos":"n.","meaning":"日記","ex_en":"Anna has been keeping a diary since she was nine. She writes nearly everything in it.","ex_zh":"Anna從9歲起就一直寫日記。她在日記裡幾乎什麼都寫。","level":16},{"word":"anxious","phon":"'æŋkʃəs","pos":"adj.","meaning":"焦慮的，急切的","ex_en":"Anne dreaded giving a speech before three hundred people; even thinking about it made her anxious.","ex_zh":"Anne 害怕在三百人面前演講，甚至想到這件事都讓她焦慮。","level":16},{"word":"disappear","phon":".dɪsə'pɪr","pos":"vi.","meaning":"消失","ex_en":"It was strange that the old man who had talked to us for a while just disappeared into thin air. Where did he go?","ex_zh":"真奇怪，那位和我們交談了一會兒的老人消失得無影無蹤了。他去哪了？","level":16},{"word":"pale","phon":"pel","pos":"adj.","meaning":"（臉色臉色）蒼白的，失去血色的","ex_en":"William looked very pale and kept breathing hard after finishing the marathon. I worried about his condition.","ex_zh":"William 在完馬拉松後看起來臉色發白且不停地大口喘氣。我很擔心他的情況。","level":16},{"word":"poison","phon":"'pɔɪzn","pos":"n./vt.","meaning":"毒，毒藥／下毒，毒害","ex_en":"The drink was found to have deadly poison in it, and this may be the cause of the man's death.","ex_zh":"飲料裡被發現含有致命的毒物，而這可能是造成那位男子死亡的原因。","level":16},{"word":"beard","phon":"bɪrd","pos":"n.","meaning":"鬍子","ex_en":"Ron is growing a beard because he wants to look older.","ex_zh":"Ron 留著鬍子，因為他想看起來更成熟。","level":16},{"word":"flame","phon":"flem","pos":"n.","meaning":"火焰，強烈的感情","ex_en":"Suddenly the car crashed into the shop at the corner and burst into flames.","ex_zh":"車子突然撞上街角的商店，並起火燃燒。","level":16},{"word":"scare","phon":"skɛr","pos":"vt.","meaning":"驚嚇","ex_en":"Ben hides behind the door, trying to scare his sister when she walks close.","ex_zh":"Ben 躲在門後，試試要在妹妹走近時嚇唬她。","level":16},{"word":"altogether","phon":".ɔltə'gɛðɚ","pos":"adv.","meaning":"一共，全部","ex_en":"I made twenty thousand dollars and my wife thirty thousand, so we made fifty thousand dollars altogether this month.","ex_zh":"我賺了兩萬元，而我太太賺了三萬元，我們這個月一共賺進了五萬元。","level":16},{"word":"excellence","phon":"'ɛkslns","pos":"n.","meaning":"優秀，傑出","ex_en":"The school is famous for its excellence in sports. Its baseball and basketball teams have been national champions for years.","ex_zh":"這所學校以卓越的體育運動而聞名。它的棒球和籃球隊多年以來都是全國冠軍。","level":16},{"word":"elder","phon":"ˈɛldɚ","pos":"n./adj.","meaning":"長輩（受尊敬的）老年人／較年長的","ex_en":"Many stories told by the village elders are full of cultural values, and they should be kept and recorded.","ex_zh":"許多村裡長輩們說的故事都具有文化價值，應該被妥善保存及記錄。","level":16},{"word":"laundry","phon":"'lɔndri","pos":"n.","meaning":"（待洗或洗好的）衣物（不可數）／洗衣店","ex_en":"Cindy usually does her laundry and irons her clothes on Sunday because that's the only day she is free.","ex_zh":"Cindy 通常在週日洗衣燙衣服，因為那是她唯一有空閒的一天。","level":17},{"word":"observe","phon":"əb'zɝv","pos":"vt.","meaning":"觀察／遵守（法律或習俗等）","ex_en":"In order to write a report on the stars, we decided to observe the stars in the sky every night.","ex_zh":"為了寫一篇有關星星的報告，我們決定每晚觀察天空中的群星。","level":17},{"word":"password","phon":"'pæs.wɝd","pos":"n.","meaning":"密碼","ex_en":"My mom often forgets her laptop password, so she has to write it down on a piece of paper.","ex_zh":"我媽媽經常忘記電腦的密碼，所以她必須把它抄在一張紙上。","level":17},{"word":"cigarette","phon":"'sɪgə.rɛt","pos":"n.","meaning":"香菸","ex_en":"Even though the doctor advises Jim to stop smoking as soon as possible, he still buys a pack of cigarettes every day.","ex_zh":"即使醫生規勸 Jim 盡早戒菸，他仍每天買一包菸。","level":17},{"word":"beg","phon":"bɛg","pos":"vi./vt.","meaning":"乞求，懇求，乞討","ex_en":"After being caught hanging out with other girls, Leo begged his girlfriend not to break up with him and give him one more chance.","ex_zh":"在被逮到和其他女生出去鬼混後，Leo 懇求女友不要跟他分手，並再給他一次機會。","level":17},{"word":"oven","phon":"'ʌvən","pos":"n.","meaning":"烤箱","ex_en":"After you take the cake out from the oven, leave it for a while. Then you can start to decorate the cake.","ex_zh":"將蛋糕從烤箱中取出後請先靜置一會兒，然後就可開始裝飾了。","level":17},{"word":"subway","phon":"'sʌb.we","pos":"n.","meaning":"地下鐵【美式】","ex_en":"The subway system in New York is quite convenient. People can get to almost anywhere in the city by using it.","ex_zh":"紐約的地下鐵系統相當方便。人們可以搭乘地鐵到城市裡幾乎所有地方。","level":17},{"word":"passport","phon":"'pæs.port","pos":"n.","meaning":"護照","ex_en":"A
